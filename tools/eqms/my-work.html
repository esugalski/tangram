<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Work — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #0B2740;
      --mid-blue:   #304F6B;
      --dark-blue:  #02192F;
      --sidebar-bg: #071e31;
      --aqua:       #0AC0E9;
      --aqua-dark:  #089bbf;
      --light-gray: #F7F8FA;
      --green:      #10B981;
      --amber:      #F59E0B;
      --red:        #EF4444;
      --indigo:     #6366f1;
      --sidebar-w:  220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--light-gray); color: var(--primary); display: flex; height: 100vh; overflow: hidden; }

    /* ─── SIDEBAR ─── */
    .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 100; transition: width 0.2s ease; overflow: hidden; }
    .sidebar.collapsed { width: 56px; }
    .sidebar::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); pointer-events: none; }
    .sidebar-header { padding: 1.25rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .sidebar-brand { display: flex; align-items: center; gap: 0.65rem; }
    .sidebar-t-mark { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; display: block; }
    .sidebar-brand-text { overflow: hidden; transition: opacity 0.15s, width 0.2s; }
    .sidebar.collapsed .sidebar-brand-text { opacity: 0; width: 0; }
    .sidebar-brand-name { font-size: 0.85rem; font-weight: 700; color: white; letter-spacing: -0.01em; line-height: 1.1; white-space: nowrap; }
    .sidebar-brand-sub { font-size: 0.6rem; font-weight: 500; color: rgba(255,255,255,0.28); letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
    .sidebar-nav { flex: 1; padding: 0.5rem 0.5rem 0; overflow-y: auto; overflow-x: hidden; }
    .sidebar-nav::-webkit-scrollbar { width: 0; }
    .sidebar-section { margin-bottom: 0.25rem; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.48rem 0.75rem; border-radius: 7px; font-size: 0.79rem; font-weight: 500; color: rgba(255,255,255,0.70); cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; position: relative; white-space: nowrap; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.88); }
    .sidebar-nav-item.active { background: rgba(10,192,233,0.12); color: #5DDAF5; }
    .sidebar-nav-item.active::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px; background: var(--aqua); border-radius: 0 2px 2px 0; }
    .sidebar-nav-icon { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-nav-label { overflow: hidden; text-overflow: ellipsis; transition: opacity 0.15s; }
    .sidebar.collapsed .sidebar-nav-label { opacity: 0; }
    .sidebar-badge { margin-left: auto; font-size: 0.54rem; font-weight: 700; letter-spacing: 0.06em; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.22); padding: 0.14rem 0.42rem; border-radius: 3px; text-transform: uppercase; flex-shrink: 0; transition: opacity 0.15s; }
    .sidebar.collapsed .sidebar-badge { opacity: 0; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0.5rem 0.75rem; }
    .sidebar-footer { padding: 0.85rem 1rem; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .sidebar-user { display: flex; align-items: center; gap: 0.6rem; }
    .sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(10,192,233,0.15); border: 1.5px solid rgba(10,192,233,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua); flex-shrink: 0; }
    .sidebar-user-info { overflow: hidden; transition: opacity 0.15s, width 0.2s; min-width: 0; flex: 1; }
    .sidebar.collapsed .sidebar-user-info { opacity: 0; width: 0; flex: 0; }
    .sidebar-user-name { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.62); white-space: nowrap; }
    .sidebar-user-role { font-size: 0.63rem; color: rgba(255,255,255,0.25); white-space: nowrap; }
    .sidebar-collapse-btn { margin-left: auto; flex-shrink: 0; background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 5px; transition: background 0.12s; display: flex; align-items: center; justify-content: center; }
    .sidebar-collapse-btn:hover { background: rgba(255,255,255,0.07); }
    .sidebar-collapse-icon { width: 14px; height: 14px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; }
    .sidebar.collapsed .sidebar-collapse-icon { transform: rotate(180deg); }

    /* ─── APP MAIN ─── */
    .app-main { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

    /* ─── TOPBAR ─── */
    .topbar { background: white; border-bottom: 1px solid rgba(11,39,64,0.08); height: 60px; display: flex; align-items: center; flex-shrink: 0; z-index: 10; }
    .topbar-brand-area { width: var(--sidebar-w); flex-shrink: 0; height: 100%; overflow: hidden; }
    .topbar-brand-name, .topbar-brand-sub { display: none !important; }
    .topbar-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 1.5rem; }
    .topbar-search { display: flex; align-items: center; gap: 0.6rem; background: var(--light-gray); border: 1.5px solid rgba(11,39,64,0.1); border-radius: 8px; padding: 0.42rem 0.9rem; width: min(400px, 100%); transition: border-color 0.15s; }
    .topbar-search:focus-within { border-color: rgba(10,192,233,0.4); }
    .topbar-search svg { width: 14px; height: 14px; stroke: rgba(11,39,64,0.3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .topbar-search input { background: transparent; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--primary); width: 100%; }
    .topbar-search input::placeholder { color: rgba(11,39,64,0.35); }
    .topbar-right { display: flex; align-items: center; gap: 0.5rem; padding: 0 1.25rem; flex-shrink: 0; }
    .topbar-icon-btn { width: 34px; height: 34px; border-radius: 8px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; position: relative; }
    .topbar-icon-btn:hover { background: var(--light-gray); }
    .topbar-icon-btn svg { width: 16px; height: 16px; stroke: var(--mid-blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .topbar-notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 1.5px solid white; }
    .topbar-user { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.3rem 0.6rem; border-radius: 8px; transition: background 0.12s; }
    .topbar-user:hover { background: var(--light-gray); }
    .topbar-user-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(10,192,233,0.1); border: 1.5px solid rgba(10,192,233,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua-dark); flex-shrink: 0; }
    .topbar-user-name { font-size: 0.8rem; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .topbar-user-role { font-size: 0.63rem; color: rgba(11,39,64,0.4); white-space: nowrap; }

    /* ─── CONTENT WRAP ─── */
    .content-wrap { flex: 1; display: flex; min-height: 0; overflow: hidden; }

    /* ─── TASK AREA ─── */
    .task-area { flex: 1; overflow-y: auto; padding: 1.5rem 1.75rem 1.5rem 1.75rem; min-width: 0; }
    .task-area::-webkit-scrollbar { width: 5px; }
    .task-area::-webkit-scrollbar-track { background: transparent; }
    .task-area::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 3px; }

    /* ─── PAGE HEADER ─── */
    .page-header { margin-bottom: 1.2rem; }
    .page-heading { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.025em; line-height: 1.2; }
    .page-subtitle { font-size: 0.77rem; color: rgba(11,39,64,0.44); margin-top: 0.22rem; }

    /* ─── SUBTABS ─── */
    .subtabs { display: flex; gap: 0; border-bottom: 1.5px solid rgba(11,39,64,0.08); margin-bottom: 1rem; }
    .subtab { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; color: rgba(11,39,64,0.5); padding: 0.55rem 1rem; border: none; border-bottom: 2px solid transparent; margin-bottom: -1.5px; cursor: pointer; transition: color 0.12s; white-space: nowrap; background: transparent; }
    .subtab:hover { color: var(--primary); }
    .subtab.active { color: var(--aqua-dark); font-weight: 600; border-bottom-color: var(--aqua); }
    .subtab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 15px; background: rgba(11,39,64,0.07); color: rgba(11,39,64,0.45); font-size: 0.59rem; font-weight: 700; padding: 0 0.32rem; border-radius: 10px; margin-left: 0.3rem; }
    .subtab.active .subtab-count { background: rgba(10,192,233,0.12); color: var(--aqua-dark); }

    /* ─── FILTER BAR ─── */
    .filter-bar { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-dropdown { display: inline-flex; align-items: center; gap: 0.3rem; font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 500; color: var(--mid-blue); background: white; border: 1.5px solid rgba(11,39,64,0.12); border-radius: 7px; padding: 0.36rem 0.65rem; cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; white-space: nowrap; }
    .filter-dropdown:hover { border-color: rgba(10,192,233,0.4); background: rgba(10,192,233,0.02); }
    .filter-dropdown svg { width: 11px; height: 11px; stroke: rgba(11,39,64,0.35); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .filter-more-btn { font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 500; color: rgba(11,39,64,0.42); background: transparent; border: none; cursor: pointer; padding: 0.36rem 0.45rem; transition: color 0.12s; }
    .filter-more-btn:hover { color: var(--primary); }
    .filter-bar-right { margin-left: auto; display: flex; align-items: center; gap: 0.45rem; }
    .btn-review-selected { display: none; font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 600; color: var(--aqua-dark); background: rgba(10,192,233,0.08); border: 1.5px solid rgba(10,192,233,0.25); border-radius: 7px; padding: 0.36rem 0.75rem; cursor: pointer; transition: background 0.12s; align-items: center; gap: 0.3rem; }
    .btn-review-selected:hover { background: rgba(10,192,233,0.14); }
    .btn-review-selected.visible { display: inline-flex; }
    .btn-review-selected svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-export { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: white; border: 1.5px solid rgba(11,39,64,0.12); border-radius: 7px; cursor: pointer; transition: border-color 0.12s; flex-shrink: 0; }
    .btn-export:hover { border-color: rgba(10,192,233,0.4); }
    .btn-export svg { width: 12px; height: 12px; stroke: rgba(11,39,64,0.4); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ─── TASK TABLE ─── */
    .task-table-wrap { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; overflow: hidden; margin-bottom: 0.65rem; }
    .task-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .task-table colgroup col:nth-child(1) { width: 36px; }
    .task-table colgroup col:nth-child(2) { width: 28%; }
    .task-table colgroup col:nth-child(3) { width: 10%; }
    .task-table colgroup col:nth-child(4) { width: 12%; }
    .task-table colgroup col:nth-child(5) { width: 11%; }
    .task-table colgroup col:nth-child(6) { width: 11%; }
    .task-table colgroup col:nth-child(7) { width: 9%; }
    .task-table colgroup col:nth-child(8) { width: auto; }
    .task-table th { padding: 0.6rem 0.85rem; font-size: 0.63rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(11,39,64,0.36); border-bottom: 1px solid rgba(11,39,64,0.07); background: rgba(11,39,64,0.015); text-align: left; white-space: nowrap; }
    .task-table th:first-child { padding-left: 1rem; }
    .task-table td { padding: 0.72rem 0.85rem; border-bottom: 1px solid rgba(11,39,64,0.055); vertical-align: middle; }
    .task-table td:first-child { padding-left: 1rem; }
    .task-table tr:last-child td { border-bottom: none; }
    .task-table tbody tr:hover td { background: rgba(10,192,233,0.015); }
    .task-cb { width: 15px; height: 15px; accent-color: var(--aqua); cursor: pointer; }
    .task-type-label { display: inline-block; font-size: 0.57rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.11rem 0.4rem; border-radius: 3px; margin-bottom: 0.18rem; }
    .task-title { font-size: 0.81rem; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .related-item { font-size: 0.74rem; font-weight: 500; color: var(--mid-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .product-label { font-size: 0.72rem; color: rgba(11,39,64,0.52); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .status-badge { display: inline-flex; align-items: center; font-size: 0.64rem; font-weight: 700; padding: 0.17rem 0.52rem; border-radius: 5px; white-space: nowrap; letter-spacing: 0.02em; }
    .due-date { font-size: 0.74rem; color: rgba(11,39,64,0.52); white-space: nowrap; }
    .due-date.overdue { color: var(--red); font-weight: 600; }
    .due-date.soon { color: var(--amber); font-weight: 600; }
    .priority-badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.65rem; font-weight: 700; white-space: nowrap; }
    .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .next-action-link { font-size: 0.74rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; white-space: nowrap; transition: color 0.12s; }
    .next-action-link:hover { color: var(--aqua); text-decoration: underline; }

    /* ─── PAGINATION ─── */
    .pagination { font-size: 0.71rem; color: rgba(11,39,64,0.4); padding: 0.3rem 0; }

    /* ─── EMPTY STATE ─── */
    .task-empty { padding: 3rem 2rem; text-align: center; background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; }
    .task-empty-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.85rem; }
    .task-empty-icon svg { width: 20px; height: 20px; stroke: rgba(11,39,64,0.25); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .task-empty-title { font-size: 0.88rem; font-weight: 700; color: var(--primary); margin-bottom: 0.35rem; }
    .task-empty-desc { font-size: 0.77rem; color: rgba(11,39,64,0.43); line-height: 1.6; }

    /* ─── RIGHT PANEL ─── */
    .right-panel { width: 272px; flex-shrink: 0; border-left: 1px solid rgba(11,39,64,0.07); padding: 1.5rem 1.1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.85rem; background: white; }
    .right-panel::-webkit-scrollbar { width: 0; }

    /* ─── WIDGETS ─── */
    .widget { background: var(--light-gray); border: 1px solid rgba(11,39,64,0.07); border-radius: 10px; padding: 1rem 1.1rem; }
    .widget-title { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(11,39,64,0.36); margin-bottom: 0.9rem; }

    /* Workload Summary */
    .workload-row { display: flex; align-items: center; justify-content: space-between; padding: 0.2rem 0; }
    .workload-label { display: flex; align-items: center; gap: 0.45rem; font-size: 0.75rem; color: rgba(11,39,64,0.58); }
    .workload-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .workload-count { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.035em; color: var(--primary); }
    .workload-divider { height: 1px; background: rgba(11,39,64,0.07); margin: 0.5rem 0; }
    .workload-view-all { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; margin-top: 0.65rem; transition: color 0.12s; }
    .workload-view-all:hover { color: var(--aqua); }

    /* Manager Snapshot */
    .quality-health-wrap { display: flex; align-items: center; gap: 0.9rem; margin-bottom: 0.75rem; }
    .quality-gauge { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
    .quality-gauge svg { transform: rotate(-90deg); }
    .quality-gauge-track { fill: none; stroke: rgba(11,39,64,0.08); stroke-width: 5; }
    .quality-gauge-fill { fill: none; stroke: var(--green); stroke-width: 5; stroke-linecap: round; }
    .quality-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.88rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; }
    .quality-label { font-size: 0.78rem; font-weight: 600; color: var(--primary); }
    .quality-sub { font-size: 0.64rem; color: rgba(11,39,64,0.4); margin-top: 0.15rem; line-height: 1.4; }
    .quality-view-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.71rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; transition: color 0.12s; }
    .quality-view-link:hover { color: var(--aqua); }
  </style>
</head>

      { key:'qms_management_reviews', normalize: function(raw) {
        if (!raw || typeof raw !== 'object') return [];
        return Object.values(raw).map(function(mr) {
          return { id: mr.id||'?', title: mr.title || 'Management Review', category:'Quality Records',
            type:'Management Review', typeKey:'mgmt-review', status: mr.status || 'scheduled',
            version: null, date: mr.date||'', dateLabel: fmtDate(mr.date),
            href:'management-review.html', moduleLabel:'Mgmt Review', sourceKey:'qms_management_reviews' };
        });
      }},
    ];

    // ── GLOBAL STATE ───────────────────────────────────────────────────────────
    var ALL_DOCS = [];
    var MY_TASKS = [];
    var activeTab = 'tasks';
    var filterState = { dueDate:'All Dates', taskType:'All Types', product:'All Products', taskStatus:'All Status' };

    // ── LOAD SOURCES ───────────────────────────────────────────────────────────
    function loadAllSources() {
      ALL_DOCS = [];
      DOCUMENT_SOURCES.forEach(function(src) {
        var raw = null;
        try { raw = JSON.parse(localStorage.getItem(src.key) || 'null') || {}; } catch(e) {}
        try { ALL_DOCS = ALL_DOCS.concat(src.normalize(raw || {})); }
        catch(e) { console.warn('MyWork: normalize failed for ' + src.key, e); }
      });
    }

    // ── STATIC FALLBACK TASKS ─────────────────────────────────────────────────
    function getStaticTasks() {
      return [
        // My Tasks
        { taskType:'CAPA Task',       title:'Complete CAPA Investigation — Sterile Packaging Defect',     relatedItem:'CAPA-003',     product:'CAPA',           status:'investigation', dueDate:addDays(TODAY,14),  priority:'High',   nextAction:'Complete Task →',    href:'capa.html',                   tabGroup:'tasks' },
        { taskType:'Review Due',      title:'Close NCR-012 — Battery cell thickness deviation',           relatedItem:'NCR-012',      product:'Nonconformance', status:'open',          dueDate:addDays(TODAY,-3),  priority:'High',   nextAction:'Start Review →',     href:'nonconformance.html',         tabGroup:'tasks' },
        { taskType:'CAPA Task',       title:'Implement corrective action — Supplier labeling errors',     relatedItem:'CAPA-004',     product:'CAPA',           status:'action',        dueDate:addDays(TODAY,7),   priority:'High',   nextAction:'Complete Task →',    href:'capa.html',                   tabGroup:'tasks' },
        { taskType:'Document Update', title:'Update Design Outputs Specification to Rev 2.1',             relatedItem:'DO-001',       product:'Design Outputs', status:'draft',         dueDate:addDays(TODAY,21),  priority:'Medium', nextAction:'Review Changes →',   href:'design-outputs.html',         tabGroup:'tasks' },
        { taskType:'Document Update', title:'Complete Risk Management Plan Rev 4 — Post-Market update',   relatedItem:'RMP-001',      product:'Risk Mgmt Plan', status:'draft',         dueDate:addDays(TODAY,18),  priority:'Medium', nextAction:'Review Changes →',   href:'risk-management-plan.html',   tabGroup:'tasks' },
        // Approvals
        { taskType:'Pending Approval', title:'Approve Change Request — New Sterile Barrier System',       relatedItem:'CR-007',       product:'Change Control', status:'open',          dueDate:addDays(TODAY,3),   priority:'High',   nextAction:'Review & Approve →', href:'change-control.html',         tabGroup:'approvals' },
        { taskType:'Pending Approval', title:'Approve SOP Revision — Complaint Handling Procedure v6',    relatedItem:'SOP-CH-001',   product:'Process Library',status:'open',          dueDate:addDays(TODAY,10),  priority:'Medium', nextAction:'Review & Approve →', href:'process-library.html',        tabGroup:'approvals' },
        { taskType:'Pending Approval', title:'Approve Updated Device Master Record Rev 3.0',              relatedItem:'DMR-001',      product:'DMR',            status:'under-review',  dueDate:addDays(TODAY,5),   priority:'High',   nextAction:'Review & Approve →', href:'dmr.html',                    tabGroup:'approvals' },
        { taskType:'Pending Approval', title:'Approve Verification Protocol — Electrical Safety v1.2',    relatedItem:'VV-001',       product:'V&V',            status:'open',          dueDate:addDays(TODAY,12),  priority:'Medium', nextAction:'Review & Approve →', href:'vv.html',                     tabGroup:'approvals' },
        // Reviews
        { taskType:'Review Due',      title:'Review NCR-008 — Out-of-spec electrode impedance values',   relatedItem:'NCR-008',      product:'Nonconformance', status:'open',          dueDate:addDays(TODAY,-6),  priority:'High',   nextAction:'Start Review →',     href:'nonconformance.html',         tabGroup:'reviews' },
        { taskType:'Periodic Review', title:'Periodic Review — Document Control Procedure (SOP-DC-001)',  relatedItem:'SOP-DC-001',   product:'Document Control', status:'approved',    dueDate:addDays(TODAY,45),  priority:null,     nextAction:'Start Review →',     href:'document-control.html',       tabGroup:'reviews' },
        { taskType:'Periodic Review', title:'Annual Review — Risk Management Plan',                       relatedItem:'RMP-001',      product:'Risk Mgmt Plan', status:'approved',      dueDate:addDays(TODAY,60),  priority:null,     nextAction:'Start Review →',     href:'risk-management-plan.html',   tabGroup:'reviews' },
        { taskType:'Periodic Review', title:'Annual Management Review Preparation — Q2 2026',             relatedItem:'MR-2026-Q2',   product:'Mgmt Review',    status:'scheduled',     dueDate:addDays(TODAY,22),  priority:'Medium', nextAction:'Start Review →',     href:'management-review.html',      tabGroup:'reviews' },
        // Training
        { taskType:'Document Update', title:'Complete Training — Complaint Handling Procedure v2 Update', relatedItem:'TRN-CH-002',   product:'Training',       status:'draft',         dueDate:addDays(TODAY,14),  priority:'Medium', nextAction:'Complete Training →',href:'training-hub.html',           tabGroup:'training' },
        { taskType:'Document Update', title:'CAPA Root Cause Analysis Training — Module 3',               relatedItem:'TRN-RCA-003',  product:'Training',       status:'in-progress',   dueDate:addDays(TODAY,7),   priority:'High',   nextAction:'Complete Training →',href:'training-hub.html',           tabGroup:'training' },
        { taskType:'Document Update', title:'Annual Regulatory Training — EU MDR 2024 Requirements',      relatedItem:'TRN-REG-2024', product:'Training',       status:'draft',         dueDate:addDays(TODAY,30),  priority:null,     nextAction:'Complete Training →',href:'training-hub.html',           tabGroup:'training' },
        { taskType:'Document Update', title:'Risk Management Awareness Training — New Hires Cohort 4',    relatedItem:'TRN-RM-2026',  product:'Training',       status:'draft',         dueDate:addDays(TODAY,21),  priority:null,     nextAction:'Complete Training →',href:'training-hub.html',           tabGroup:'training' },
        // Audit Requests
        { taskType:'Audit Request',   title:'Prepare Design Control Audit Evidence Package',              relatedItem:'AUD-2026-03',  product:'Audits',         status:'scheduled',     dueDate:addDays(TODAY,15),  priority:null,     nextAction:'Prepare Responses →',href:'audits.html',                 tabGroup:'audit' },
        { taskType:'Audit Request',   title:'Respond to Notified Body Pre-Submission Information Request',relatedItem:'NB-2026-01',   product:'Audits',         status:'planned',       dueDate:addDays(TODAY,30),  priority:null,     nextAction:'Prepare Responses →',href:'audits.html',                 tabGroup:'audit' },
        { taskType:'Audit Request',   title:'Complete Supplier Quality Questionnaire — Sterile Pack Ltd', relatedItem:'AUD-SUP-04',   product:'Audits',         status:'planned',       dueDate:addDays(TODAY,8),   priority:null,     nextAction:'Prepare Responses →',href:'audits.html',                 tabGroup:'audit' },
      ];
    }

    // ── TASK SYNTHESIS ─────────────────────────────────────────────────────────
    function buildMyTasks() {
      MY_TASKS = [];
      var today = new Date(TODAY);

      ALL_DOCS.forEach(function(doc) {
        var task = null;
        var sf = normalizeStatusForFilter(doc.status);

        if (doc.sourceKey === 'qms_change_requests') {
          if (sf === 'open' || sf === 'in-progress') {
            task = { taskType:'Pending Approval', title:doc.title, relatedItem:doc.id,
              product:doc.moduleLabel, status:doc.status,
              dueDate: doc.date ? addDays(doc.date, 7) : addDays(TODAY, 3),
              priority:'High', nextAction:'Review & Approve →', href:doc.href, tabGroup:'approvals' };
          }
        } else if (doc.sourceKey === 'qms_nonconformances') {
          if (sf === 'open') {
            task = { taskType:'Review Due', title:doc.title, relatedItem:doc.id,
              product:doc.moduleLabel, status:doc.status,
              dueDate: doc.date ? addDays(doc.date, 14) : addDays(TODAY, 14),
              priority:'High', nextAction:'Start Review →', href:doc.href, tabGroup:'reviews' };
          }
        } else if (doc.sourceKey === 'qms_capas') {
          var openStages = ['action','investigation','verification','opened','open'];
          if (sf === 'open' || sf === 'in-progress' || openStages.indexOf(doc.status) !== -1) {
            task = { taskType:'CAPA Task', title:doc.title, relatedItem:doc.id,
              product:doc.moduleLabel, status:doc.status,
              dueDate: doc.date ? addDays(doc.date, 30) : addDays(TODAY, 21),
              priority:'Medium', nextAction:'Complete Task →', href:doc.href, tabGroup:'tasks' };
          }
        } else if (doc.sourceKey === 'qms_internal_audits') {
          if (doc.status === 'scheduled' || doc.status === 'planned') {
            task = { taskType:'Audit Request', title:doc.title, relatedItem:doc.id,
              product:doc.moduleLabel, status:doc.status,
              dueDate: doc.date || addDays(TODAY, 10),
              priority:null, nextAction:'Prepare Responses →', href:doc.href, tabGroup:'audit' };
          }
        } else if (doc.sourceKey === 'qms_procedures') {
          if (doc.status === 'draft') {
            task = { taskType:'Document Update', title:doc.title, relatedItem:doc.id,
              product:doc.moduleLabel, status:doc.status,
              dueDate: addDays(TODAY, 30),
              priority:null, nextAction:'Review Changes →', href:doc.href, tabGroup:'tasks' };
          } else if (doc.status === 'approved' && doc.date) {
            var docDate = new Date(doc.date);
            var daysSince = Math.round((today - docDate) / 86400000);
            if (daysSince > 365) {
              task = { taskType:'Periodic Review', title:doc.title, relatedItem:doc.id,
                product:doc.moduleLabel, status:doc.status,
                dueDate: addDays(TODAY, 60),
                priority:null, nextAction:'Start Review →', href:doc.href, tabGroup:'reviews' };
            }
          }
        }

        if (task) MY_TASKS.push(task);
      });

      // Supplement with static fallback tasks for any tab with fewer than 3 items
      var tabCounts = {};
      MY_TASKS.forEach(function(t){ tabCounts[t.tabGroup] = (tabCounts[t.tabGroup]||0)+1; });
      var existingKeys = {};
      MY_TASKS.forEach(function(t){ existingKeys[t.relatedItem+':'+t.tabGroup] = true; });
      getStaticTasks().forEach(function(t){
        var key = t.relatedItem+':'+t.tabGroup;
        if (!existingKeys[key] && (tabCounts[t.tabGroup]||0) < 3) {
          MY_TASKS.push(t);
          existingKeys[key] = true;
          tabCounts[t.tabGroup] = (tabCounts[t.tabGroup]||0)+1;
        }
      });
    }

    // ── FILTER TASKS ───────────────────────────────────────────────────────────
    function getFilteredTasks() {
      return MY_TASKS.filter(function(t) {
        if (t.tabGroup !== activeTab) return false;
        if (filterState.taskType !== 'All Types' && t.taskType !== filterState.taskType) return false;
        if (filterState.taskStatus !== 'All Status') {
          var norm = normalizeStatusForFilter(t.status);
          var fmap = { 'Open':'open', 'In Progress':'in-progress', 'Draft':'draft', 'Planned':'draft' };
          if (norm !== (fmap[filterState.taskStatus] || filterState.taskStatus.toLowerCase())) return false;
        }
        if (filterState.product !== 'All Products' && t.product !== filterState.product) return false;
        if (filterState.dueDate !== 'All Dates') {
          var due = new Date(t.dueDate);
          var now = new Date(TODAY);
          if (filterState.dueDate === 'This Week') {
            var w = new Date(TODAY); w.setDate(w.getDate() + 7);
            if (due > w) return false;
          } else if (filterState.dueDate === 'This Month') {
            var m = new Date(TODAY); m.setDate(m.getDate() + 30);
            if (due > m) return false;
          } else if (filterState.dueDate === 'Overdue') {
            if (due >= now) return false;
          }
        }
        return true;
      });
    }

    // ── DUE DATE DISPLAY ───────────────────────────────────────────────────────
    function dueDateInfo(iso) {
      if (!iso) return { label:'—', cls:'' };
      var due = new Date(iso);
      var now = new Date(TODAY);
      var diff = Math.round((due - now) / 86400000);
      return { label: fmtDate(iso), cls: diff < 0 ? 'overdue' : diff <= 7 ? 'soon' : '' };
    }

    // ── RENDER TASK TABLE ──────────────────────────────────────────────────────
    var TYPE_COLORS = {
      'Pending Approval': { bg:'rgba(249,115,22,0.1)',  color:'#c2410c' },
      'Review Due':       { bg:'rgba(245,158,11,0.1)',  color:'#b45309' },
      'CAPA Task':        { bg:'rgba(5,150,105,0.1)',   color:'#047857' },
      'Audit Request':    { bg:'rgba(3,105,161,0.1)',   color:'#0369a1' },
      'Document Update':  { bg:'rgba(48,79,107,0.1)',   color:'#304F6B' },
      'Periodic Review':  { bg:'rgba(99,102,241,0.1)',  color:'#4338ca' },
    };

    function renderTaskTable(tasks) {
      var area = document.getElementById('taskTableArea');
      var pagEl = document.getElementById('paginationInfo');

      if (tasks.length === 0) {
        area.innerHTML = '<div class="task-empty">' +
          '<div class="task-empty-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 17.5h7M17.5 14v7"/></svg></div>' +
          '<div class="task-empty-title">No tasks in this view</div>' +
          '<div class="task-empty-desc">Tasks appear here as QMS records are assigned to you.</div>' +
          '</div>';
        pagEl.textContent = '';
        return;
      }

      var html = '<div class="task-table-wrap"><table class="task-table">' +
        '<colgroup><col><col><col><col><col><col><col><col></colgroup>' +
        '<thead><tr>' +
        '<th></th><th>Task</th><th>Related Item</th><th>Product</th>' +
        '<th>Status</th><th>Due Date</th><th>Priority</th><th>Next Action</th>' +
        '</tr></thead><tbody>';

      tasks.forEach(function(t) {
        var st = getStatus(t.status);
        var dd = dueDateInfo(t.dueDate);
        var tc = TYPE_COLORS[t.taskType] || { bg:'rgba(11,39,64,0.07)', color:'rgba(11,39,64,0.4)' };
        var priHtml = t.priority === 'High'
          ? '<span class="priority-badge"><span class="priority-dot" style="background:var(--red)"></span><span style="color:var(--red);font-size:0.65rem;font-weight:700">' + esc(t.priority) + '</span></span>'
          : t.priority === 'Medium'
          ? '<span class="priority-badge"><span class="priority-dot" style="background:var(--amber)"></span><span style="color:var(--amber);font-size:0.65rem;font-weight:700">' + esc(t.priority) + '</span></span>'
          : '<span style="color:rgba(11,39,64,0.22);font-size:0.72rem;">—</span>';

        html += '<tr>' +
          '<td><input type="checkbox" class="task-cb" onchange="updateReviewBtn()"></td>' +
          '<td><div>' +
            '<span class="task-type-label" style="background:' + tc.bg + ';color:' + tc.color + '">' + esc(t.taskType) + '</span>' +
            '<div class="task-title" title="' + esc(t.title) + '">' + esc(t.title) + '</div>' +
          '</div></td>' +
          '<td><span class="related-item">' + esc(t.relatedItem) + '</span></td>' +
          '<td><span class="product-label">' + esc(t.product) + '</span></td>' +
          '<td><span class="status-badge" style="background:' + st.bg + ';color:' + st.color + '">' + esc(st.label) + '</span></td>' +
          '<td><span class="due-date ' + dd.cls + '">' + esc(dd.label) + '</span></td>' +
          '<td>' + priHtml + '</td>' +
          '<td><a class="next-action-link" href="' + esc(t.href) + '">' + esc(t.nextAction) + '</a></td>' +
          '</tr>';
      });

      html += '</tbody></table></div>';
      area.innerHTML = html;
      pagEl.textContent = 'Showing 1 to ' + tasks.length + ' of ' + tasks.length + ' task' + (tasks.length !== 1 ? 's' : '');
    }

    // ── RENDER RIGHT PANEL ─────────────────────────────────────────────────────
    function renderRightPanel() {
      var week  = new Date(TODAY); week.setDate(week.getDate() + 7);
      var month = new Date(TODAY); month.setDate(month.getDate() + 30);
      var dueWeek  = MY_TASKS.filter(function(t){ return t.dueDate && new Date(t.dueDate) <= week; }).length;
      var dueMonth = MY_TASKS.filter(function(t){ return t.dueDate && new Date(t.dueDate) <= month; }).length;
      var total = MY_TASKS.length;

      document.getElementById('workloadContent').innerHTML =
        '<div class="workload-row">' +
          '<div class="workload-label"><span class="workload-dot" style="background:var(--amber)"></span>Due This Week</div>' +
          '<span class="workload-count" style="color:var(--amber)">' + dueWeek + '</span>' +
        '</div>' +
        '<div class="workload-row" style="margin-top:0.3rem">' +
          '<div class="workload-label"><span class="workload-dot" style="background:var(--indigo)"></span>Due This Month</div>' +
          '<span class="workload-count" style="color:var(--indigo)">' + dueMonth + '</span>' +
        '</div>' +
        '<div class="workload-divider"></div>' +
        '<div class="workload-row">' +
          '<div class="workload-label">Total Open Tasks</div>' +
          '<span class="workload-count">' + total + '</span>' +
        '</div>' +
        '<a href="#" class="workload-view-all">View all work →</a>';

      var approved = ALL_DOCS.filter(function(d){ return normalizeStatusForFilter(d.status) === 'approved'; }).length;
      var totalDocs = ALL_DOCS.length;
      var pct = totalDocs > 0 ? Math.round(approved / totalDocs * 100) : 0;
      var r = 20;
      var circ = 2 * Math.PI * r;
      var offset = circ * (1 - pct / 100);

      document.getElementById('snapshotContent').innerHTML =
        '<div class="quality-health-wrap">' +
          '<div class="quality-gauge">' +
            '<svg width="54" height="54" viewBox="0 0 54 54">' +
              '<circle class="quality-gauge-track" cx="27" cy="27" r="' + r + '"/>' +
              '<circle class="quality-gauge-fill" cx="27" cy="27" r="' + r + '"' +
                ' stroke-dasharray="' + circ.toFixed(1) + '"' +
                ' stroke-dashoffset="' + offset.toFixed(1) + '"/>' +
            '</svg>' +
            '<div class="quality-pct">' + pct + '%</div>' +
          '</div>' +
          '<div>' +
            '<div class="quality-label">Quality Health</div>' +
            '<div class="quality-sub">' + approved + ' of ' + totalDocs + '<br>docs approved</div>' +
          '</div>' +
        '</div>' +
        '<a href="doc-library.html" class="quality-view-link">View quality dashboard →</a>';
    }

    // ── TAB COUNTS ─────────────────────────────────────────────────────────────
    function updateTabCounts() {
      ['tasks','approvals','reviews','training','audit'].forEach(function(g) {
        var cnt = MY_TASKS.filter(function(t){ return t.tabGroup === g; }).length;
        var el = document.getElementById('cnt-' + g);
        if (el) el.textContent = cnt;
      });
      var badge = document.getElementById('myWorkBadge');
      if (badge) badge.textContent = MY_TASKS.length;
    }

    // ── POPULATE PRODUCT FILTER ────────────────────────────────────────────────
    function buildProductFilter() {
      var products = {};
      MY_TASKS.forEach(function(t){ if (t.product) products[t.product] = true; });
      var opts = ['All Products'].concat(Object.keys(products).sort());
      var btn = document.getElementById('productFilterBtn');
      if (btn) btn.onclick = function(e){ openDropdown(e, btn, 'product', opts); };
    }

    // ── TAB SWITCHING ──────────────────────────────────────────────────────────
    function setTab(btn, tab) {
      activeTab = tab;
      document.querySelectorAll('.subtab').forEach(function(b){
        b.classList.toggle('active', b === btn);
      });
      renderTaskTable(getFilteredTasks());
    }

    // ── FILTER CHANGE HANDLER (called by filter-dropdown.js) ──────────────────
    window.onFilterChange = function(key, value) {
      filterState[key] = value;
      renderTaskTable(getFilteredTasks());
    };

    // ── REVIEW SELECTED ────────────────────────────────────────────────────────
    function updateReviewBtn() {
      var checked = document.querySelectorAll('.task-cb:checked').length;
      var btn = document.getElementById('reviewSelectedBtn');
      if (btn) btn.classList.toggle('visible', checked > 0);
    }

    // ── SIDEBAR COLLAPSE ───────────────────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // ── INIT ───────────────────────────────────────────────────────────────────
    function init() {
      loadAllSources();
      buildMyTasks();
      updateTabCounts();
      buildProductFilter();
      renderTaskTable(getFilteredTasks());
      renderRightPanel();
    }
    init();
  </script>
</body>
