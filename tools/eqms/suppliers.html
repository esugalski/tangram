<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="qms-shared.css?v=1776901546755">
  <style>

    .subtabs { display: flex; gap: 0; border-bottom: 1.5px solid rgba(11,39,64,0.08); margin-bottom: 1rem; }
    .subtab { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; color: rgba(11,39,64,0.5); padding: 0.55rem 1rem; border: none; border-bottom: 2px solid transparent; margin-bottom: -1.5px; cursor: pointer; transition: color 0.12s; white-space: nowrap; background: transparent; }
    .subtab:hover { color: var(--primary); }
    .subtab.active { color: var(--aqua-dark); font-weight: 600; border-bottom-color: var(--aqua); }
    .subtab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 15px; background: rgba(11,39,64,0.07); color: rgba(11,39,64,0.45); font-size: 0.59rem; font-weight: 700; padding: 0 0.32rem; border-radius: 10px; margin-left: 0.3rem; }
    .subtab.active .subtab-count { background: rgba(10,192,233,0.12); color: var(--aqua-dark); }

    .filter-bar { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-dropdown { display: inline-flex; align-items: center; gap: 0.3rem; font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 500; color: var(--mid-blue); background: white; border: 1.5px solid rgba(11,39,64,0.12); border-radius: 7px; padding: 0.36rem 0.65rem; cursor: pointer; }
    .filter-dropdown svg { width: 11px; height: 11px; stroke: rgba(11,39,64,0.35); fill: none; stroke-width: 2; }
    .filter-more-btn { font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 500; color: rgba(11,39,64,0.42); background: transparent; border: none; cursor: pointer; padding: 0.36rem 0.45rem; }

    .doc-table-wrap { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; overflow: hidden; flex: 1; }
    .doc-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .doc-table th { padding: 0.6rem 0.75rem; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(11,39,64,0.36); border-bottom: 1px solid rgba(11,39,64,0.07); background: rgba(11,39,64,0.015); text-align: left; white-space: nowrap; }
    .doc-table th:first-child { padding-left: 1rem; width: 36px; }
    .doc-table th:nth-child(2) { width: 28px; }
    .doc-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(11,39,64,0.055); vertical-align: middle; font-size: 0.79rem; color: var(--primary); }
    .doc-table td:first-child { padding-left: 1rem; }
    .doc-table tr:last-child td { border-bottom: none; }
    .doc-table tbody tr:hover td { background: rgba(10,192,233,0.015); cursor: pointer; }
    .doc-cb { width: 15px; height: 15px; accent-color: var(--aqua); cursor: pointer; }
    .row-num { font-size: 0.7rem; color: rgba(11,39,64,0.35); font-weight: 600; }
    .supplier-name { font-size: 0.81rem; font-weight: 600; color: var(--primary); }
    .supplier-id { font-size: 0.66rem; color: rgba(11,39,64,0.42); margin-top: 0.08rem; }
    .status-badge { display: inline-flex; align-items: center; font-size: 0.63rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 5px; white-space: nowrap; }
    .risk-badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.63rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 5px; white-space: nowrap; }
    .risk-dot { width: 6px; height: 6px; border-radius: 50%; }
    .doc-date { font-size: 0.72rem; color: rgba(11,39,64,0.52); white-space: nowrap; }
    .action-links { display: flex; align-items: center; gap: 0.5rem; }
    .doc-action-link { font-size: 0.72rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; white-space: nowrap; }
    .doc-action-link:hover { color: var(--aqua); text-decoration: underline; }

    .pagination-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0 0; }
    .pagination-info { font-size: 0.72rem; color: rgba(11,39,64,0.4); }
    .empty-state { padding: 3.5rem 2rem; text-align: center; }
    .empty-state-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.85rem; }
    .empty-state-icon svg { width: 20px; height: 20px; stroke: rgba(11,39,64,0.25); fill: none; stroke-width: 1.5; }
    .empty-state-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 0.35rem; }
    .empty-state-desc { font-size: 0.77rem; color: rgba(11,39,64,0.43); line-height: 1.6; }

    .right-panel { width: 272px; flex-shrink: 0; border-left: 1px solid rgba(11,39,64,0.07); padding: 1.5rem 1.1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.85rem; background: white; }
    .right-panel::-webkit-scrollbar { width: 0; }
    .widget { background: var(--light-gray); border: 1px solid rgba(11,39,64,0.07); border-radius: 10px; padding: 1rem 1.1rem; }
    .widget-title { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(11,39,64,0.36); margin-bottom: 0.75rem; }
    .widget-divider { height: 1px; background: rgba(11,39,64,0.07); margin: 0.5rem 0; }
    .widget-view-all { font-size: 0.71rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; display: block; margin-top: 0.6rem; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 0.75rem; }
    .summary-num { font-size: 1.35rem; font-weight: 800; color: var(--primary); letter-spacing: -0.03em; line-height: 1; }
    .summary-num.red { color: var(--red); }
    .summary-num.amber { color: var(--amber); }
    .summary-num.green { color: var(--green); }
    .summary-lbl { font-size: 0.65rem; color: rgba(11,39,64,0.45); margin-top: 0.12rem; }
    .audit-due-row { display: flex; align-items: flex-start; gap: 0.45rem; padding: 0.28rem 0; }
    .audit-due-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 0.38rem; }
    .audit-due-name { font-size: 0.73rem; font-weight: 600; color: var(--primary); line-height: 1.3; }
    .audit-due-date { font-size: 0.63rem; color: rgba(11,39,64,0.42); }
    .risk-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.28rem 0; }
    .risk-row-name { font-size: 0.73rem; font-weight: 600; color: var(--primary); flex: 1; }
    .capa-count-num { font-size: 1.6rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; line-height: 1; }
    .capa-count-lbl { font-size: 0.7rem; color: rgba(11,39,64,0.5); margin-top: 0.15rem; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <div id="topbar-root"></div>
    <div id="module-header-root"></div>
    <nav id="subnav-root"></nav>
    <div class="page-scroll">
    <div class="content-wrap">
      <div class="main-area">
        <div class="page-header">
          <div>
            <div class="page-heading">Suppliers</div>
            <div class="page-subtitle">Supplier qualifications, audits, and performance</div>
          </div>
          <div class="page-actions">
            <button class="btn-outline"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Supplier</button>
            <button class="btn-primary"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Supplier Audit</button>
          </div>
        </div>

        <div class="subtabs">
          <button class="subtab active" onclick="setTab(this,'approved')">Approved Suppliers <span class="subtab-count" id="cnt-approved">0</span></button>
          <button class="subtab" onclick="setTab(this,'qualification')">Qualification <span class="subtab-count" id="cnt-qualification">0</span></button>
          <button class="subtab" onclick="setTab(this,'audits')">Audits</button>
          <button class="subtab" onclick="setTab(this,'scais')">SCAIs</button>
          <button class="subtab" onclick="setTab(this,'performance')">Performance</button>
        </div>

        <div class="filter-bar">
          <button class="filter-dropdown" onclick="openDropdown(event,this,'status',['All Status','Approved','Conditional','In Progress'])"><span class="filter-lbl">Status</span><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="filter-dropdown" onclick="openDropdown(event,this,'qual',['Qualification Status','Approved','Conditional','Pending'])"><span class="filter-lbl">Qualification Status</span><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="filter-dropdown" onclick="openDropdown(event,this,'audit',['Last Audit','Last 90 Days','Last 6 Months','Last Year'])"><span class="filter-lbl">Last Audit</span><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="filter-dropdown" onclick="openDropdown(event,this,'risk',['Risk Level','High','Medium','Low'])"><span class="filter-lbl">Risk Level</span><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="filter-dropdown" onclick="openDropdown(event,this,'region',['All Regions','North America','Europe','Asia'])"><span class="filter-lbl">Region</span><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="filter-more-btn">+ More Filters</button>
        </div>

        <div id="tableArea"></div>
        <div id="paginationArea"></div>
      </div>

      <div class="right-panel">
        <div class="widget">
          <div class="widget-title">Supplier Summary</div>
          <div class="summary-grid" id="summaryGrid"></div>
          <div class="widget-divider"></div>
          <a href="#" class="widget-view-all">View all suppliers →</a>
        </div>
        <div class="widget">
          <div class="widget-title">Audits Due</div>
          <div id="auditsDueContent"></div>
          <a href="#" class="widget-view-all">View all audits due →</a>
        </div>
        <div class="widget">
          <div class="widget-title">High Risk Suppliers</div>
          <div id="highRiskContent"></div>
          <a href="#" class="widget-view-all">View all high risk →</a>
        </div>
        <div class="widget">
          <div class="widget-title">Open CAPAs</div>
          <div class="capa-count-num" id="supplierCapaCount">0</div>
          <div class="capa-count-lbl">supplier-related open CAPAs</div>
          <a href="#" class="widget-view-all">View all CAPAs →</a>
        </div>
      </div>
    </div>
    </div><!-- /page-scroll -->
  </div><!-- /main -->
  <div id="glance-root"></div>

  <script src="seed-demo.js?v=1776901546755"></script>
  <script src="sidebar.js?v=1776901546755"></script>
  <script src="shell.js"></script>
  <script src="filter-dropdown.js"></script>
  <script>
    function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); } catch(e) { return String(iso).slice(0,10); }
    }
    function addDays(iso, n) { var d = iso ? new Date(iso) : new Date(); if(isNaN(d)) d=new Date(); d.setDate(d.getDate()+n); return d; }

    var activeTab = 'approved';
    var filterState = {};
    var allSuppliers = [];

    var STATIC_SUPPLIERS = [
      {id:'SUP-001',name:'PCB Assembly Co',category:'Electronics Manufacturing',qualStatus:'Approved',lastAudit:'2025-09-15',nextReview:'2026-09-15',risk:'High',region:'North America'},
      {id:'SUP-002',name:'Injection Molding Inc',category:'Plastics / Enclosures',qualStatus:'Approved',lastAudit:'2025-11-02',nextReview:'2026-11-02',risk:'Low',region:'North America'},
      {id:'SUP-003',name:'Sterile Packaging Ltd',category:'Sterile Packaging',qualStatus:'Conditional',lastAudit:'2025-07-20',nextReview:'2026-01-20',risk:'High',region:'Europe'},
      {id:'SUP-004',name:'Regulatory Submissions LLC',category:'Regulatory Services',qualStatus:'Approved',lastAudit:'2026-01-10',nextReview:'2027-01-10',risk:'Medium',region:'North America'},
      {id:'SUP-005',name:'Test Lab Partners',category:'Testing / Verification',qualStatus:'Approved',lastAudit:'2026-02-14',nextReview:'2027-02-14',risk:'Low',region:'North America'},
      {id:'SUP-006',name:'OMO Manufacturing',category:'Contract Manufacturing',qualStatus:'Conditional',lastAudit:'2025-06-01',nextReview:'2025-12-01',risk:'Medium',region:'Asia'},
    ];

    var QUAL_STATUS = {
      'Approved':    {bg:'rgba(16,185,129,0.1)',  color:'#047857'},
      'Conditional': {bg:'rgba(245,158,11,0.12)', color:'#b45309'},
      'Pending':     {bg:'rgba(99,102,241,0.12)', color:'#4338ca'},
      'In Progress': {bg:'rgba(99,102,241,0.12)', color:'#4338ca'},
    };
    var RISK_COLORS = {
      High:   {bg:'rgba(239,68,68,0.1)',  color:'#dc2626', dot:'#ef4444'},
      Medium: {bg:'rgba(245,158,11,0.1)', color:'#b45309', dot:'#f59e0b'},
      Low:    {bg:'rgba(16,185,129,0.1)', color:'#047857', dot:'#10b981'},
    };

    function loadData() {
      try { var s = JSON.parse(localStorage.getItem('qms_suppliers')||'null'); if(s&&s.length){allSuppliers=s;return;} } catch(e){}
      allSuppliers = STATIC_SUPPLIERS.slice();

      // Enrich conditional from open CAPAs
      try {
        var capas = JSON.parse(localStorage.getItem('qms_capas')||'[]');
        capas.filter(function(c){ return (c.title||'').toLowerCase().includes('supplier') && ['open','investigation','action'].includes(c.status); })
          .forEach(function(c){ var s = allSuppliers.find(function(s){ return (c.title||'').toLowerCase().includes(s.name.toLowerCase().split(' ')[0]); }); if(s) s.qualStatus='Conditional'; });
      } catch(e){}
    }

    function getTabData() {
      if (activeTab==='approved') return allSuppliers.filter(function(s){ return s.qualStatus==='Approved'; });
      if (activeTab==='qualification') return allSuppliers.filter(function(s){ return ['Conditional','Pending','In Progress'].includes(s.qualStatus); });
      return [];
    }

    function renderTable() {
      var rows = getTabData();
      var tableArea = document.getElementById('tableArea');
      if (['audits','scais','performance'].includes(activeTab)) {
        tableArea.innerHTML = '<div class="doc-table-wrap"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="empty-state-title">Coming soon</div><div class="empty-state-desc">This view is under construction.</div></div></div>';
        document.getElementById('paginationArea').innerHTML = '';
        return;
      }
      var html = '<div class="doc-table-wrap"><table class="doc-table"><colgroup><col style="width:36px"><col style="width:28px"><col><col style="width:14%"><col style="width:13%"><col style="width:11%"><col style="width:11%"><col style="width:8%"><col style="width:16%"></colgroup>';
      html += '<thead><tr><th></th><th>#</th><th>Supplier</th><th>Category</th><th>Qualification</th><th>Last Audit</th><th>Next Review</th><th>Risk</th><th>Actions</th></tr></thead><tbody>';
      rows.forEach(function(s,i){
        var qs = QUAL_STATUS[s.qualStatus]||{bg:'rgba(11,39,64,0.07)',color:'rgba(11,39,64,0.38)'};
        var rk = RISK_COLORS[s.risk]||RISK_COLORS.Medium;
        var overdue = s.nextReview && new Date(s.nextReview) < new Date();
        html += '<tr>';
        html += '<td><input type="checkbox" class="doc-cb"></td>';
        html += '<td><span class="row-num">'+(i+1)+'</span></td>';
        html += '<td><div class="supplier-name">'+esc(s.name)+'</div><div class="supplier-id">'+esc(s.id)+'</div></td>';
        html += '<td><span style="font-size:0.72rem;color:rgba(11,39,64,0.55)">'+esc(s.category)+'</span></td>';
        html += '<td><span class="status-badge" style="background:'+qs.bg+';color:'+qs.color+'">'+esc(s.qualStatus)+'</span></td>';
        html += '<td class="doc-date">'+(s.lastAudit?fmtDate(s.lastAudit):'—')+'</td>';
        html += '<td class="doc-date" style="color:'+(overdue?'#ef4444':'')+'">'+fmtDate(s.nextReview)+'</td>';
        html += '<td><div class="risk-badge" style="background:'+rk.bg+';color:'+rk.color+'"><span class="risk-dot" style="background:'+rk.dot+'"></span>'+esc(s.risk)+'</div></td>';
        html += '<td><div class="action-links"><a class="doc-action-link" href="#">View Profile</a> <span style="color:rgba(11,39,64,0.2)">·</span> <a class="doc-action-link" href="audits.html?supplier=' + encodeURIComponent(s.id) + '">Schedule Audit</a></div></td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      tableArea.innerHTML = html;
      document.getElementById('paginationArea').innerHTML = '<div class="pagination-bar"><span class="pagination-info">Showing 1–'+rows.length+' of '+allSuppliers.length+'</span></div>';
    }

    function updateCounts() {
      var a = allSuppliers.filter(function(s){return s.qualStatus==='Approved';}).length;
      var c = allSuppliers.filter(function(s){return ['Conditional','Pending','In Progress'].includes(s.qualStatus);}).length;
      var el=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
      el('cnt-approved',a); el('cnt-qualification',c);
    }

    function renderRightPanel() {
      var approved = allSuppliers.filter(function(s){return s.qualStatus==='Approved';}).length;
      var conditional = allSuppliers.filter(function(s){return s.qualStatus==='Conditional';}).length;
      var highRisk = allSuppliers.filter(function(s){return s.risk==='High';}).length;

      document.getElementById('summaryGrid').innerHTML =
        '<div><div class="summary-num">'+allSuppliers.length+'</div><div class="summary-lbl">Total</div></div>'+
        '<div><div class="summary-num green">'+approved+'</div><div class="summary-lbl">Approved</div></div>'+
        '<div><div class="summary-num amber">'+conditional+'</div><div class="summary-lbl">Conditional</div></div>'+
        '<div><div class="summary-num red">'+highRisk+'</div><div class="summary-lbl">High Risk</div></div>';

      var due = allSuppliers.filter(function(s){ return s.nextReview && new Date(s.nextReview) < addDays(null,60); }).slice(0,3);
      document.getElementById('auditsDueContent').innerHTML = due.length ? due.map(function(s){
        return '<div class="audit-due-row"><div class="audit-due-dot"></div><div><div class="audit-due-name">'+esc(s.name)+'</div><div class="audit-due-date">Due '+fmtDate(s.nextReview)+'</div></div></div>';
      }).join('') : '<div style="font-size:0.73rem;color:rgba(11,39,64,0.38);font-style:italic">No audits due soon</div>';

      var hrs = allSuppliers.filter(function(s){return s.risk==='High';}).slice(0,3);
      document.getElementById('highRiskContent').innerHTML = hrs.length ? hrs.map(function(s){
        return '<div class="risk-row"><span class="risk-row-name">'+esc(s.name)+'</span><span style="font-size:0.6rem;font-weight:700;padding:0.12rem 0.38rem;border-radius:4px;background:rgba(239,68,68,0.1);color:#dc2626">High</span></div>';
      }).join('') : '<div style="font-size:0.73rem;color:rgba(11,39,64,0.38);font-style:italic">No high risk suppliers</div>';

      var capaCount = 0;
      try { var capas=JSON.parse(localStorage.getItem('qms_capas')||'[]'); capaCount=capas.filter(function(c){return (c.title||'').toLowerCase().includes('supplier')&&['open','opened','investigation','action','in-progress'].includes(c.status);}).length; } catch(e){}
      document.getElementById('supplierCapaCount').textContent = capaCount || 2;
    }

    function setTab(btn,tab){ document.querySelectorAll('.subtab').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); activeTab=tab; renderTable(); }
    window.onFilterChange = function(key, value) { filterState[key] = value; renderTable(); };
    initShell({
      activePage: 'suppliers',
      topbar: { searchPlaceholder: 'Search suppliers…' },
      moduleHeader: 'Suppliers'
    });
    function init(){ loadData(); updateCounts(); renderTable(); renderRightPanel(); }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
  </script>
</body>
</html>
