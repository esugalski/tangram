<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="qms-shared.css?v=1776901546755">
  <style>
    .sup-card { padding: 0.8rem 0.9rem; border-radius: 9px; cursor: pointer; border: 1.5px solid transparent; margin-bottom: 0.3rem; }
    .sup-card:hover { background: rgba(11,39,64,0.03); }
    .sup-card.selected { background: rgba(10,192,233,0.06); border-color: rgba(10,192,233,0.25); }
    .sup-logo { width: 32px; height: 32px; border-radius: 8px; background: rgba(10,192,233,0.12); color: var(--aqua-dark); font-size: 0.76rem; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; margin-right: 0.55rem; flex-shrink: 0; vertical-align: middle; }

    .crit-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.35rem; vertical-align: middle; }
    .crit-dot.critical { background: #dc2626; }
    .crit-dot.significant { background: #f59e0b; }
    .crit-dot.standard { background: #6b7280; }

    .status-pill { display: inline-flex; align-items: center; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.12rem 0.4rem; border-radius: 3px; text-transform: uppercase; }
    .status-pill.approved, .status-pill.qualified { background: rgba(16,185,129,0.12); color: #047857; }
    .status-pill.conditional { background: rgba(245,158,11,0.14); color: #b45309; }
    .status-pill.suspended { background: rgba(239,68,68,0.14); color: #dc2626; }
    .status-pill.evaluation { background: rgba(99,102,241,0.12); color: #4338ca; }
    .status-pill.pending { background: rgba(11,39,64,0.06); color: rgba(11,39,64,0.55); }

    .perf-bar { height: 5px; background: rgba(11,39,64,0.08); border-radius: 3px; overflow: hidden; }
    .perf-fill { height: 100%; background: var(--green); }
    .perf-fill.warn { background: var(--amber); }
    .perf-fill.bad { background: var(--red); }

    .qual-row { display: grid; grid-template-columns: 180px 1fr 110px 110px 30px; gap: 0.5rem; align-items: center; padding: 0.45rem 0.55rem; border-radius: 6px; background: rgba(11,39,64,0.025); margin-bottom: 0.3rem; }
    .qual-row input, .qual-row select { font-family: inherit; font-size: 0.74rem; padding: 0.3rem 0.45rem; border: 1px solid rgba(11,39,64,0.1); border-radius: 5px; background: white; outline: none; min-width: 0; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar-root"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">
        <span class="topbar-crumb">Quality System</span>
        <span class="topbar-sep">/</span>
        Suppliers
      </div>
      <div class="topbar-right">
        <button class="btn-primary" onclick="newSupplier()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add supplier</button>
      </div>
    </header>
    <div class="doc-approval-bar">
      <div class="proc-status-pill draft" id="proc-status-pill"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Draft · Rev A</div>
      <div style="flex:1;"></div>
      <div id="approval-route-panel"></div>
      <button class="btn-approve" id="approve-btn" onclick="initiateApproval()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approve list</button>
    </div>
    <div class="doc-lock-banner" id="doc-lock" style="display:none;"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> This Approved Supplier List is approved. Existing records are locked. New suppliers can still be added.</div>

    <div class="content-cols">
      <div class="list-col">
        <div class="list-col-head"><input class="list-col-search" id="search" placeholder="Search suppliers…" oninput="renderList()"></div>
        <div class="list-col-body" id="list-body"></div>
      </div>
      <div class="detail-col">
        <div class="detail-placeholder" id="placeholder">
          <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          <h2>Select a supplier</h2>
          <p>Pick a row on the left or add a new supplier.</p>
          <div id="intro-slot" style="max-width:640px;margin-top:1.4rem;"></div>
        </div>
        <div class="detail-pane" id="pane" style="display:none;"></div>
      </div>
    </div>
  </main>

  <script src="esign.js?v=1776901546755"></script>
  <script src="approvals.js?v=1776901546755"></script>
  <script src="seed-demo.js?v=1776901546755"></script>

  <script src="learn-mode.js?v=1776901546755"></script>
  <script src="sidebar.js?v=1776901546755"></script>
  <script>
    'use strict';
    const KEY = 'qms_suppliers';
    let DATA = load();
    let currentId = null;

    function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
    function save() { localStorage.setItem(KEY, JSON.stringify(DATA)); }
    function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function initials(name) { return (name||'—').split(/\s+/).map(function(p){return p[0]||'';}).join('').slice(0,2).toUpperCase() || '—'; }
    function newId() {
      let n = 1;
      Object.keys(DATA).forEach(function(id){ const m = id.match(/^SUP-(\d+)$/); if (m) n = Math.max(n, parseInt(m[1],10)+1); });
      return 'SUP-' + String(n).padStart(3,'0');
    }

    function newSupplier() {
      const id = newId();
      DATA[id] = {
        id: id, name: 'New supplier', contact: '', website: '',
        criticality: 'standard',  // critical / significant / standard
        categories: '',            // goods/services
        status: 'evaluation',     // approved / qualified / conditional / suspended / evaluation / pending
        qualifiedOn: '', nextRequalification: '',
        certifications: [], // [{name, expires}]
        agreements: { qualityAgreement: false, confidentiality: false, gmpAgreement: false },
        qualEvidence: [],  // [{type:'audit|cert|questionnaire|sample', ref, date, outcome}]
        metrics: { otd: 100, dpm: 0, returns: 0 },  // on-time delivery %, defects per million
        notes: ''
      };
      save();
      renderList();
      open(id);
    }

    function open(id) {
      currentId = id;
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('pane').style.display = 'flex';
      renderDetail();
      renderList();
      applyLockState();
    }

    function renderList() {
      const q = (document.getElementById('search').value || '').toLowerCase();
      const host = document.getElementById('list-body');
      const list = Object.values(DATA).filter(function(s){ return !q || (s.name+' '+s.id+' '+s.categories).toLowerCase().indexOf(q) !== -1; });
      list.sort(function(a,b){ return (a.name||'') < (b.name||'') ? -1 : 1; });

      if (!list.length) { host.innerHTML = '<div class="list-empty"><div class="list-empty-icon"><svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><div class="list-empty-title">No suppliers yet</div><div class="list-empty-body">Add every supplier whose product or service affects device quality — contract manufacturers, component vendors, sterilization services, calibration labs.</div></div>'; return; }

      host.innerHTML = list.map(function(s){
        const sel = s.id === currentId ? ' selected' : '';
        return '<div class="sup-card'+sel+'" onclick="open(\''+s.id+'\')">' +
          '<div class="item-card-top">' +
            '<span class="sup-logo">'+esc(initials(s.name))+'</span>' +
            '<span style="font-weight:700;font-size:0.82rem;">'+esc(s.name)+'</span>' +
            '<span class="status-pill '+s.status+'" style="margin-left:auto;">'+esc(s.status)+'</span>' +
          '</div>' +
          '<div class="item-card-meta"><span class="crit-dot '+s.criticality+'"></span>'+esc(s.criticality||'')+' · '+esc(s.categories||'—')+'</div>' +
        '</div>';
      }).join('');
    }

    function renderDetail() {
      const s = DATA[currentId]; if (!s) return;
      const pane = document.getElementById('pane');
      const otdClass = s.metrics.otd >= 95 ? '' : (s.metrics.otd >= 85 ? 'warn' : 'bad');
      const dpmClass = s.metrics.dpm < 500 ? '' : (s.metrics.dpm < 3000 ? 'warn' : 'bad');

      pane.innerHTML =
        '<div style="display:flex;align-items:center;gap:0.7rem;">' +
          '<span class="sup-logo" style="width:42px;height:42px;font-size:0.95rem;">'+esc(initials(s.name))+'</span>' +
          '<div style="flex:1;">' +
            '<input class="form-input" value="'+esc(s.name)+'" oninput="u(\'name\',this.value);renderList()" placeholder="Supplier name" style="font-size:0.95rem;font-weight:600;margin-bottom:0.25rem;">' +
            '<input class="form-input" value="'+esc(s.categories||'')+'" oninput="u(\'categories\',this.value);renderList()" placeholder="Goods/services supplied" style="font-size:0.78rem;">' +
          '</div>' +
          '<button class="btn-icon danger" onclick="del()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>' +
        '</div>' +

        '<div class="card"><div class="card-head"><div class="card-title">Classification &amp; status</div></div><div class="card-body">' +
          '<div class="learn-only" style="margin-bottom:0.55rem;">' + LearnMode.hint('ISO 13485 §7.4.1: the type and extent of controls you apply must be proportional to the supplier\'s effect on the device. "Critical" (direct patient contact, functional component) gets deepest scrutiny; "standard" (office supplies, non-impact) gets lightest.') + '</div>' +
          '<div class="form-row-3" style="margin-bottom:0.7rem;">' +
            '<div class="form-field"><label class="form-label">Criticality</label><select class="form-select" onchange="u(\'criticality\',this.value);renderList()">' +
              ['critical','significant','standard'].map(function(t){ return '<option value="'+t+'" '+(s.criticality===t?'selected':'')+'>'+t+'</option>'; }).join('') +
            '</select></div>' +
            '<div class="form-field"><label class="form-label">Status</label><select class="form-select" onchange="u(\'status\',this.value);renderList()">' +
              ['pending','evaluation','qualified','approved','conditional','suspended'].map(function(t){ return '<option value="'+t+'" '+(s.status===t?'selected':'')+'>'+t+'</option>'; }).join('') +
            '</select></div>' +
            '<div class="form-field"><label class="form-label">Next re-qual</label><input class="form-input" type="date" value="'+esc(s.nextRequalification||'')+'" onchange="u(\'nextRequalification\',this.value)"></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Contact</label><input class="form-input" value="'+esc(s.contact||'')+'" oninput="u(\'contact\',this.value)" placeholder="Primary contact name + email"></div>' +
            '<div class="form-field"><label class="form-label">Website</label><input class="form-input" value="'+esc(s.website||'')+'" oninput="u(\'website\',this.value)"></div>' +
          '</div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">Qualification evidence</div><button class="add-row-btn" onclick="addQual()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add record</button></div><div class="card-body">' +
          '<div class="learn-only" style="margin-bottom:0.55rem;">' + LearnMode.hint('Qualification methods scale with criticality. Critical: on-site audit + quality agreement. Significant: questionnaire + ISO 13485 certificate copy. Standard: approved vendor list with periodic re-check.') + '</div>' +
          '<div id="qual-host"></div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">Quality agreements</div></div><div class="card-body">' +
          '<div style="display:flex;gap:1rem;flex-wrap:wrap;">' +
            agreementCheck(s, 'qualityAgreement', 'Quality Agreement signed') +
            agreementCheck(s, 'confidentiality', 'Confidentiality / NDA') +
            agreementCheck(s, 'gmpAgreement', 'GMP / change notification clause') +
          '</div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">Performance metrics</div></div><div class="card-body">' +
          '<div class="form-row-3">' +
            '<div><div class="form-label">On-time delivery</div><input class="form-input" type="number" min="0" max="100" step="any" value="'+esc(s.metrics.otd)+'" oninput="uMetric(\'otd\',this.value)" style="margin-bottom:0.35rem;"><div class="perf-bar"><div class="perf-fill '+otdClass+'" style="width:'+Math.min(100, s.metrics.otd)+'%;"></div></div><div class="subtle" style="margin-top:0.2rem;font-size:0.66rem;">%</div></div>' +
            '<div><div class="form-label">Defects per million (DPM)</div><input class="form-input" type="number" min="0" value="'+esc(s.metrics.dpm)+'" oninput="uMetric(\'dpm\',this.value)" style="margin-bottom:0.35rem;"><div class="perf-bar"><div class="perf-fill '+dpmClass+'" style="width:'+Math.min(100, s.metrics.dpm/100)+'%;"></div></div></div>' +
            '<div><div class="form-label">Returned shipments (YTD)</div><input class="form-input" type="number" min="0" value="'+esc(s.metrics.returns)+'" oninput="uMetric(\'returns\',this.value)"></div>' +
          '</div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">Notes</div></div><div class="card-body">' +
          '<textarea class="form-textarea" rows="3" oninput="u(\'notes\',this.value)">'+esc(s.notes||'')+'</textarea>' +
        '</div></div>';

      renderQuals();
    }

    function agreementCheck(s, field, label) {
      const on = s.agreements[field];
      return '<label style="display:inline-flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.78rem;color:'+(on?'#047857':'rgba(11,39,64,0.6)')+';">' +
        '<span style="width:16px;height:16px;border-radius:4px;border:1.5px solid '+(on?'#10B981':'rgba(11,39,64,0.22)')+';background:'+(on?'#10B981':'white')+';display:inline-flex;align-items:center;justify-content:center;">' +
          (on ? '<svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:white;fill:none;stroke-width:3;"><polyline points="20 6 9 17 4 12"/></svg>' : '') +
        '</span>' +
        '<input type="checkbox" style="display:none;" '+(on?'checked':'')+' onchange="toggleAgreement(\''+field+'\')">' +
        esc(label) +
      '</label>';
    }

    function renderQuals() {
      const host = document.getElementById('qual-host');
      const list = DATA[currentId].qualEvidence || [];
      if (!list.length) { host.innerHTML = '<div class="subtle">No qualification evidence yet.</div>'; return; }
      host.innerHTML = list.map(function(q, i) {
        return '<div class="qual-row">' +
          '<select onchange="uQual('+i+',\'type\',this.value)">' +
            ['audit','certificate','questionnaire','sample','other'].map(function(t){ return '<option value="'+t+'" '+(q.type===t?'selected':'')+'>'+t+'</option>'; }).join('') +
          '</select>' +
          '<input placeholder="Reference / filename" value="'+esc(q.ref||'')+'" oninput="uQual('+i+',\'ref\',this.value)">' +
          '<input type="date" value="'+esc(q.date||'')+'" onchange="uQual('+i+',\'date\',this.value)">' +
          '<select onchange="uQual('+i+',\'outcome\',this.value)">' +
            ['pass','conditional','fail'].map(function(o){ return '<option value="'+o+'" '+(q.outcome===o?'selected':'')+'>'+o+'</option>'; }).join('') +
          '</select>' +
          '<button class="btn-icon danger" onclick="rmQual('+i+')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>' +
        '</div>';
      }).join('');
    }
    function addQual() { DATA[currentId].qualEvidence.push({ type:'audit', ref:'', date:'', outcome:'pass' }); save(); renderQuals(); }
    function rmQual(i) { DATA[currentId].qualEvidence.splice(i,1); save(); renderQuals(); }
    function uQual(i, field, val) { DATA[currentId].qualEvidence[i][field] = val; save(); }

    function u(field, val) { if (!currentId) return; DATA[currentId][field] = val; save(); }
    function uMetric(field, val) { if (!currentId) return; DATA[currentId].metrics[field] = parseFloat(val)||0; save(); renderDetail(); }
    function toggleAgreement(field) { DATA[currentId].agreements[field] = !DATA[currentId].agreements[field]; save(); renderDetail(); }

    function del() {
      if (!confirm('Delete ' + currentId + '?')) return;
      delete DATA[currentId]; save(); currentId = null;
      document.getElementById('pane').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      renderList();
    }

    function renderIntro() {
      document.getElementById('intro-slot').innerHTML = LearnMode.introCard({
        id: 'suppliers-intro',
        tag: 'Purchasing · FDA 21 CFR 820.50, ISO 13485 §7.4',
        title: 'Why supplier control matters',
        what: 'Medtech supply chains are a regulated extension of your own QMS. When your injection-molder ships a bad lot or your contract manufacturer changes a process without notice, YOU are accountable. This registry documents that you\'ve assessed every supplier and are keeping them under control appropriate to risk.',
        why: 'FDA 820.50 and ISO 13485 §7.4 require documented supplier evaluation, defined criteria, controls proportional to impact, and records. The single biggest supplier-control audit finding: "no quality agreement on file."',
        facts: [
          { label: 'Controls by tier', value: 'Critical: audit + QA · Significant: questionnaire · Standard: AVL check' },
          { label: 'Quality Agreement', value: 'Mandatory for critical suppliers (and strongly recommended otherwise)' },
          { label: 'Re-qualification', value: 'Every 1–3 years depending on criticality' },
        ],
        checklist: [
          'Classify every supplier (critical / significant / standard)',
          'Document evaluation evidence (audit, cert, questionnaire)',
          'Execute a Quality Agreement for critical suppliers',
          'Monitor performance (OTD, DPM, returns)',
          'Set re-qualification dates; act on drift',
        ],
        standards: ['FDA 21 CFR 820.50', 'ISO 13485:2016 §7.4', 'MDSAP GHTF/SG4/N28 (supplier audits)']
      });
    }

    // ── Module-level approval ──────────────────────────────────────────────
    const AKEY = 'qms_suppliers_approval';
    let MOD = (function(){ try { return JSON.parse(localStorage.getItem(AKEY)) || { approved:false, revision:'A', approvedAt:null, approvedBy:null, signatures:null, revHistory:[], approvedIds:[] }; } catch(e) { return { approved:false, revision:'A', approvedAt:null, approvedBy:null, signatures:null, revHistory:[], approvedIds:[] }; } })();
    function saveMod() { localStorage.setItem(AKEY, JSON.stringify(MOD)); }

    function applyLockState() {
      if (!MOD.approved) return;
      document.querySelectorAll('#pane .form-input, #pane .form-textarea, #pane .form-select').forEach(function(el){ el.disabled = true; });
      document.querySelectorAll('#pane .btn-icon, #pane .add-row-btn').forEach(function(el){ el.disabled = true; el.style.pointerEvents = 'none'; el.style.opacity = '0.5'; });
    }
    function unlockFields() {
      document.querySelectorAll('#pane .form-input, #pane .form-textarea, #pane .form-select').forEach(function(el){ el.disabled = false; });
      document.querySelectorAll('#pane .btn-icon, #pane .add-row-btn').forEach(function(el){ el.disabled = false; el.style.pointerEvents = ''; el.style.opacity = ''; });
    }

    function updateStatus() {
      var pill = document.getElementById('proc-status-pill');
      var btn = document.getElementById('approve-btn');
      var lock = document.getElementById('doc-lock');
      if (!pill) return;
      var rev = MOD.revision || 'A';
      if (MOD.approved) {
        pill.className = 'proc-status-pill approved';
        pill.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approved · Rev ' + rev;
        if (btn) { btn.className = 'btn-revise'; btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Initiate Revision'; btn.onclick = initiateRevision; }
        if (lock) lock.style.display = '';
        if (window.Approvals) Approvals.renderStatusPanel('suppliers', 'module', document.getElementById('approval-route-panel'));
      } else {
        pill.className = 'proc-status-pill draft';
        pill.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Draft · Rev ' + rev;
        if (btn) { btn.className = 'btn-approve'; btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approve list'; btn.onclick = initiateApproval; }
        if (lock) lock.style.display = 'none';
        unlockFields();
      }
    }

    function initiateApproval() {
      if (!window.Approvals) { alert('Approval module not loaded.'); return; }
      Approvals.initiate({
        recordType: 'suppliers', recordId: 'module',
        meaning: 'I have reviewed and approve this Approved Supplier List as of the date of this signature, in accordance with FDA 21 CFR 820.50 and ISO 13485 §7.4.',
        recordSnapshot: DATA,
        onComplete: function(sigs) {
          MOD.approved = true; MOD.approvedAt = sigs[sigs.length-1].timestamp;
          MOD.approvedBy = sigs[sigs.length-1].signerName; MOD.signatures = sigs;
          MOD.revision = MOD.revision || 'A'; MOD.approvedIds = Object.keys(DATA);
          saveMod(); updateStatus();
        },
        onCancel: function() {}
      });
    }

    function initiateRevision() {
      if (!confirm('Start a new revision? This will unlock all existing supplier records.')) return;
      var hist = MOD.revHistory || [];
      if (MOD.approved) hist.push({ revision: MOD.revision||'A', approvedAt: MOD.approvedAt, approvedBy: MOD.approvedBy });
      var cur = MOD.revision || 'A'; var code = cur.charCodeAt(0);
      var next = (cur.length === 1 && code < 90) ? String.fromCharCode(code + 1) : cur + '1';
      MOD.approved = false; MOD.revision = next; MOD.approvedAt = null;
      MOD.approvedBy = null; MOD.signatures = null; MOD.approvedIds = []; MOD.revHistory = hist;
      saveMod();
      if (window.Approvals) Approvals.clearInstance('suppliers', 'module');
      updateStatus();
    }

    document.addEventListener('qms-learn-mode-changed', function(){ if (currentId) { renderDetail(); applyLockState(); } });
    initSidebar({ activePage: 'suppliers' });
    renderIntro();
    renderList();
    updateStatus();
  </script>
</body>
</html>
