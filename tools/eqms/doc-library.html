<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Library — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #0B2740;
      --mid-blue:   #304F6B;
      --dark-blue:  #02192F;
      --sidebar-bg: #071e31;
      --aqua:       #0AC0E9;
      --aqua-dark:  #089bbf;
      --light-gray: #F7F8FA;
      --sidebar-w:  232px;
      --green:      #10B981;
      --amber:      #F59E0B;
      --red:        #EF4444;
      --indigo:     #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--light-gray); color: var(--primary); display: flex; height: 100vh; overflow: hidden; }

    /* ─── SIDEBAR ─── */
    .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 100; }
    .sidebar::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); pointer-events: none; }
    .sidebar-header { padding: 1.25rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 0.65rem; }
    .sidebar-t-mark { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; display: block; }
    .sidebar-brand-name { font-size: 0.85rem; font-weight: 700; color: white; letter-spacing: -0.01em; line-height: 1.1; }
    .sidebar-brand-sub { font-size: 0.6rem; font-weight: 500; color: rgba(255,255,255,0.28); letter-spacing: 0.07em; text-transform: uppercase; }
    .project-switcher-wrap { padding: 0.75rem 0.75rem 0; }
    .project-switcher { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; padding: 0.55rem 0.75rem; cursor: default; display: flex; align-items: center; gap: 0.55rem; }
    .project-switcher-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--aqua); }
    .project-switcher-text { flex: 1; min-width: 0; }
    .project-switcher-label { font-size: 0.58rem; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 0.1rem; }
    .project-switcher-name { font-size: 0.8rem; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .sidebar-nav { flex: 1; padding: 0.5rem 0.5rem 0; overflow-y: auto; }
    .sidebar-nav::-webkit-scrollbar { width: 0; }
    .sidebar-section { margin-bottom: 0.25rem; }
    .sidebar-section-label { font-size: 0.57rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.18); padding: 0.6rem 0.75rem 0.2rem; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.48rem 0.75rem; border-radius: 7px; font-size: 0.79rem; font-weight: 500; color: rgba(255,255,255,0.70); cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; position: relative; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.88); }
    .sidebar-nav-item.active { background: rgba(10,192,233,0.12); color: #5DDAF5; }
    .sidebar-nav-item.active::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px; background: var(--aqua); border-radius: 0 2px 2px 0; }
    .sidebar-nav-icon { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-badge { margin-left: auto; font-size: 0.54rem; font-weight: 700; letter-spacing: 0.06em; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.22); padding: 0.14rem 0.42rem; border-radius: 3px; text-transform: uppercase; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0.5rem 0.75rem; }
    .sidebar-footer { padding: 0.85rem 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-user { display: flex; align-items: center; gap: 0.6rem; }
    .sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(10,192,233,0.15); border: 1.5px solid rgba(10,192,233,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua); flex-shrink: 0; }
    .sidebar-user-name { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.62); }
    .sidebar-user-role { font-size: 0.63rem; color: rgba(255,255,255,0.25); }
    .sidebar-sign-out { margin-left: auto; }
    .sidebar-sign-out a { font-size: 0.66rem; color: rgba(255,255,255,0.22); text-decoration: none; transition: color 0.2s; }
    .sidebar-sign-out a:hover { color: rgba(255,255,255,0.5); }

    /* ─── MAIN ─── */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

    /* ─── TOPBAR ─── */
    .topbar { background: white; border-bottom: 1px solid rgba(11,39,64,0.08); padding: 0 1.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .topbar-icon svg { width: 16px; height: 16px; stroke: var(--mid-blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .topbar-title { font-size: 0.92rem; font-weight: 700; color: var(--primary); }
    .topbar-subtitle { font-size: 0.75rem; color: rgba(11,39,64,0.4); font-weight: 400; margin-top: 0.1rem; }
    .topbar-right { display: flex; align-items: center; gap: 0.65rem; }
    .btn-action { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: var(--mid-blue); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.78rem; padding: 0.48rem 1rem; border-radius: 7px; border: 1.5px solid rgba(11,39,64,0.18); cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; }
    .btn-action:hover { border-color: var(--aqua); color: var(--aqua-dark); background: rgba(10,192,233,0.04); }
    .btn-action svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ─── CONTENT ─── */
    .content-area { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; }
    .content-area::-webkit-scrollbar { width: 5px; }
    .content-area::-webkit-scrollbar-track { background: transparent; }
    .content-area::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 3px; }

    /* ─── STATS BAR ─── */
    .stats-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; padding: 0.9rem 1.1rem; flex: 1; min-width: 0; }
    .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; line-height: 1; }
    .stat-label { font-size: 0.68rem; font-weight: 600; color: rgba(11,39,64,0.38); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 0.25rem; }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.amber .stat-value { color: var(--amber); }
    .stat-card.indigo .stat-value { color: var(--indigo); }
    .stat-card.red .stat-value { color: var(--red); }

    /* ─── FILTER BAR ─── */
    .filter-wrap { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; padding: 0.85rem 1.1rem; margin-bottom: 1.25rem; }
    .filter-bar { display: flex; align-items: flex-start; gap: 0.75rem; flex-wrap: wrap; }
    .filter-search { font-family: 'Inter', sans-serif; font-size: 0.78rem; color: var(--primary); border: 1.5px solid rgba(11,39,64,0.12); border-radius: 7px; padding: 0.36rem 0.7rem; outline: none; transition: border-color 0.15s; background: white; width: 190px; flex-shrink: 0; }
    .filter-search:focus { border-color: var(--aqua); }
    .filter-search::placeholder { color: rgba(11,39,64,0.3); }
    .filter-divider { width: 1px; height: 28px; background: rgba(11,39,64,0.08); flex-shrink: 0; align-self: center; }
    .filter-group { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .filter-group-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(11,39,64,0.35); white-space: nowrap; margin-right: 0.1rem; }
    .filter-btn { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; padding: 0.26rem 0.65rem; border-radius: 20px; border: 1.5px solid rgba(11,39,64,0.1); background: transparent; color: rgba(11,39,64,0.5); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-btn:hover { border-color: rgba(10,192,233,0.4); color: var(--aqua-dark); }
    .filter-btn.active { background: rgba(10,192,233,0.1); border-color: rgba(10,192,233,0.35); color: var(--aqua-dark); font-weight: 700; }
    .filter-bar-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.55rem; padding-top: 0.55rem; border-top: 1px solid rgba(11,39,64,0.06); }
    .filter-result-count { font-size: 0.7rem; color: rgba(11,39,64,0.38); font-weight: 500; }
    .clear-filters-btn { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; color: rgba(11,39,64,0.4); background: transparent; border: none; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 5px; transition: color 0.12s, background 0.12s; }
    .clear-filters-btn:hover { color: var(--aqua-dark); background: rgba(10,192,233,0.06); }

    /* ─── SECTION GROUP ─── */
    .section-group { margin-bottom: 1.5rem; }
    .section-group-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 0.1rem 0; margin-bottom: 0.6rem; user-select: none; }
    .section-group-header:hover .section-header-title { color: rgba(11,39,64,0.65); }
    .section-header-left { display: flex; align-items: center; gap: 0.6rem; }
    .section-header-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section-header-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(11,39,64,0.5); transition: color 0.12s; }
    .section-header-count { font-size: 0.65rem; font-weight: 700; background: rgba(11,39,64,0.06); color: rgba(11,39,64,0.4); padding: 0.1rem 0.5rem; border-radius: 20px; }
    .section-group-chevron { width: 14px; height: 14px; stroke: rgba(11,39,64,0.28); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; flex-shrink: 0; }

    /* ─── DOC LIST & ROW ─── */
    .doc-list { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 12px; overflow: hidden; }
    .doc-row { display: grid; grid-template-columns: 34px 1fr auto auto auto 28px; align-items: center; gap: 0.75rem; padding: 0.78rem 1.1rem; border-bottom: 1px solid rgba(11,39,64,0.06); transition: background 0.1s; cursor: pointer; text-decoration: none; color: inherit; }
    .doc-row:last-child { border-bottom: none; }
    .doc-row:hover { background: rgba(10,192,233,0.025); }
    .doc-icon-wrap { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .doc-icon-wrap svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .doc-main { min-width: 0; }
    .doc-name { font-size: 0.83rem; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 0.68rem; color: rgba(11,39,64,0.42); margin-top: 0.12rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-module-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(11,39,64,0.35); background: rgba(11,39,64,0.05); padding: 0.12rem 0.45rem; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
    .doc-ver-badge { display: inline-flex; align-items: center; background: rgba(11,39,64,0.05); border: 1px solid rgba(11,39,64,0.1); color: var(--mid-blue); font-size: 0.66rem; font-weight: 700; padding: 0.16rem 0.52rem; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
    .doc-status-badge { display: inline-flex; align-items: center; font-size: 0.66rem; font-weight: 700; padding: 0.16rem 0.55rem; border-radius: 5px; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em; }
    .doc-nav-arrow { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 5px; color: rgba(11,39,64,0.2); font-size: 0.85rem; text-decoration: none; transition: background 0.12s, color 0.12s; flex-shrink: 0; }
    .doc-row:hover .doc-nav-arrow { background: rgba(10,192,233,0.1); color: var(--aqua-dark); }

    /* ─── EMPTY STATE ─── */
    .empty-state { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 12px; padding: 3rem 2rem; text-align: center; }
    .empty-state-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .empty-state-icon svg { width: 24px; height: 24px; stroke: rgba(11,39,64,0.25); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 0.4rem; }
    .empty-state-desc { font-size: 0.78rem; color: rgba(11,39,64,0.45); line-height: 1.6; max-width: 380px; margin: 0 auto; }
    .empty-state-link { display: inline-flex; align-items: center; gap: 0.35rem; margin-top: 1rem; font-size: 0.77rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; padding: 0.45rem 0.9rem; border: 1.5px solid rgba(10,192,233,0.3); border-radius: 7px; transition: background 0.15s; cursor: pointer; background: transparent; font-family: inherit; }
    .empty-state-link:hover { background: rgba(10,192,233,0.06); }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-icon">
          <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <div>
          <div class="topbar-title">Document Library</div>
          <div class="topbar-subtitle">Central registry — all QMS modules</div>
        </div>
      </div>

        <button class="btn-action" onclick="refresh()">

            <button class="filter-btn active" data-filter="category" onclick="setFilter(this,'category','all')">All</button>
            <button class="filter-btn" data-filter="category" onclick="setFilter(this,'category','Quality System')">Quality System</button>
            <button class="filter-btn" data-filter="category" onclick="setFilter(this,'category','Project')">Project</button>
            <button class="filter-btn" data-filter="category" onclick="setFilter(this,'category','Quality Records')">Quality Records</button>
          </div>
          <div class="filter-divider"></div>
          <div class="filter-group">
            <span class="filter-group-label">Status</span>
            <button class="filter-btn active" data-filter="status" onclick="setFilter(this,'status','all')">All</button>
            <button class="filter-btn" data-filter="status" onclick="setFilter(this,'status','approved')">Approved</button>
            <button class="filter-btn" data-filter="status" onclick="setFilter(this,'status','draft')">Draft</button>
            <button class="filter-btn" data-filter="status" onclick="setFilter(this,'status','in-progress')">In Progress</button>
            <button class="filter-btn" data-filter="status" onclick="setFilter(this,'status','open')">Open</button>

          <div class="filter-divider"></div>
          <div class="filter-group" id="typeFilterGroup">
            <span class="filter-group-label">Type</span>

          </div>
        </div>

          <span class="filter-result-count" id="filterResultCount"></span>
          <button class="clear-filters-btn" id="clearFiltersBtn" style="display:none" onclick="clearFilters()">✕ Clear filters</button>

      </div>

      <div id="docListArea"></div>
    </div>
  </div>

  <script src="seed-demo.js?v=1776901546755"></script>

  <script>
    initSidebar({ activePage: 'doc-library' });

    // ── HELPERS ───────────────────────────────────────────────────────────
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
      catch(e) { return String(iso).slice(0,10); }
    }
    function slugify(s) {
      return String(s).toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    }

    // ── TYPE METADATA (icon SVG paths + colors) ───────────────────────────

      'specification':  { bg:'rgba(10,192,233,0.1)', color:'#089bbf',  icon:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>' },
      'design-review':  { bg:'rgba(16,185,129,0.1)', color:'#059669',  icon:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>' },
      'dmr':            { bg:'rgba(99,102,241,0.1)', color:'#4338ca',  icon:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>' },

      'vv-protocol':    { bg:'rgba(147,51,234,0.1)', color:'#7c3aed',  icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
      'change-request': { bg:'rgba(249,115,22,0.1)', color:'#c2410c',  icon:'<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 012 2v7"/><path d="M11 18H8a2 2 0 01-2-2V9"/>' },

    // ── DATA LOADING ──────────────────────────────────────────────────────
    function loadAllSources() {
      ALL_DOCS = [];
      DOCUMENT_SOURCES.forEach(function(src) {
        var raw = null;
        try { raw = JSON.parse(localStorage.getItem(src.key) || 'null') || {}; } catch(e) {}
        try {
          var docs = src.normalize(raw || {});
          ALL_DOCS = ALL_DOCS.concat(docs);

      });

    // ── STATS ─────────────────────────────────────────────────────────────
    function renderStats() {
      var total = ALL_DOCS.length;
      var approved = ALL_DOCS.filter(function(d){ return normalizeStatusForFilter(d.status) === 'approved'; }).length;
      var inFlight = ALL_DOCS.filter(function(d){ var n = normalizeStatusForFilter(d.status); return n === 'draft' || n === 'in-progress'; }).length;
      var openRecs = ALL_DOCS.filter(function(d){ return d.category === 'Quality Records' && normalizeStatusForFilter(d.status) === 'open'; }).length;
      document.getElementById('statsBar').innerHTML =
        '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">Total Documents</div></div>' +

        '<div class="stat-card indigo"><div class="stat-value">' + openRecs + '</div><div class="stat-label">Open Records</div></div>';
    }

    // ── TYPE FILTER CHIPS (dynamic) ───────────────────────────────────────
    function buildTypeFilterChips() {
      var counts = {};
      ALL_DOCS.forEach(function(d) {
        counts[d.typeKey] = (counts[d.typeKey] || 0) + 1;
      });
      var container = document.getElementById('typeFilterGroup');
      while (container.children.length > 1) container.removeChild(container.lastChild); // keep label

      var allBtn = document.createElement('button');
      allBtn.className = 'filter-btn' + (filterState.typeKey === 'all' ? ' active' : '');
      allBtn.setAttribute('data-filter', 'typeKey');
      allBtn.textContent = 'All';
      allBtn.onclick = function(){ setFilter(this, 'typeKey', 'all'); };
      container.appendChild(allBtn);

      Object.keys(counts).sort(function(a,b){ return (TYPE_LABEL[a]||a).localeCompare(TYPE_LABEL[b]||b); }).forEach(function(tk) {
        var btn = document.createElement('button');
        btn.className = 'filter-btn' + (filterState.typeKey === tk ? ' active' : '');
        btn.setAttribute('data-filter', 'typeKey');
        btn.textContent = TYPE_LABEL[tk] || tk;
        btn.onclick = function(){ setFilter(this, 'typeKey', tk); };
        container.appendChild(btn);
      });
    }

    // ── FILTERING ─────────────────────────────────────────────────────────
    function applyFilters(docs) {
      return docs.filter(function(d) {
        if (filterState.category !== 'all' && d.category !== filterState.category) return false;
        if (filterState.status !== 'all' && normalizeStatusForFilter(d.status) !== filterState.status) return false;
        if (filterState.typeKey !== 'all' && d.typeKey !== filterState.typeKey) return false;
        if (filterState.search) {
          var q = filterState.search.toLowerCase();
          var hay = (d.title + ' ' + d.id + ' ' + d.type + ' ' + d.moduleLabel).toLowerCase();
          if (hay.indexOf(q) === -1) return false;
        }
        return true;
      });
    }
    function isFilterActive() {
      return filterState.category !== 'all' || filterState.status !== 'all' || filterState.typeKey !== 'all' || filterState.search !== '';
    }

    // ── RENDER DOC ROW ────────────────────────────────────────────────────
    function renderDocRow(doc) {
      var tm = TYPE_META[doc.typeKey] || DEFAULT_TYPE_META;
      var st = getStatus(doc.status);
      return '<div class="doc-row" onclick="window.location.href=\'' + esc(doc.href) + '\'">' +
        '<div class="doc-icon-wrap" style="background:' + tm.bg + ';color:' + tm.color + '">' +
          '<svg viewBox="0 0 24 24">' + tm.icon + '</svg>' +
        '</div>' +
        '<div class="doc-main">' +
          '<div class="doc-name">' + esc(doc.title) + '</div>' +
          '<div class="doc-meta">' + esc(doc.id) + ' · ' + esc(doc.moduleLabel) + (doc.dateLabel && doc.dateLabel !== '—' ? ' · ' + esc(doc.dateLabel) : '') + '</div>' +
        '</div>' +
        '<span class="doc-module-label">' + esc(doc.moduleLabel) + '</span>' +
        (doc.version ? '<span class="doc-ver-badge">' + esc(doc.version) + '</span>' : '<span></span>') +
        '<span class="doc-status-badge" style="background:' + st.bg + ';color:' + st.color + '">' + esc(st.label) + '</span>' +
        '<a class="doc-nav-arrow" href="' + esc(doc.href) + '" onclick="event.stopPropagation()" title="Open">→</a>' +
      '</div>';
    }

    // ── RENDER DOC LIST ───────────────────────────────────────────────────
    function renderDocList() {
      var area = document.getElementById('docListArea');
      var clearBtn = document.getElementById('clearFiltersBtn');
      var countEl  = document.getElementById('filterResultCount');

      if (clearBtn) clearBtn.style.display = isFilterActive() ? '' : 'none';

      if (ALL_DOCS.length === 0) {
        if (countEl) countEl.textContent = '';
        area.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>' +
            '<div class="empty-state-title">No documents yet</div>' +
            '<div class="empty-state-desc">Documents appear here as you work through the QMS modules. Start by setting up your Quality Manual.</div>' +
            '<a class="empty-state-link" href="quality-manual.html">Go to Quality Manual →</a>' +
          '</div>';
        return;
      }

      var filtered = applyFilters(ALL_DOCS);
      if (countEl) countEl.textContent = filtered.length + ' of ' + ALL_DOCS.length + ' document' + (ALL_DOCS.length !== 1 ? 's' : '');

      if (filtered.length === 0) {
        area.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>' +
            '<div class="empty-state-title">No documents match your filters</div>' +
            '<div class="empty-state-desc">Try broadening your search or changing the active filters.</div>' +
            '<button class="empty-state-link" onclick="clearFilters()">Clear filters</button>' +
          '</div>';
        return;
      }

      var html = '';
      CATEGORIES.forEach(function(cat) {
        var catDocs = filtered.filter(function(d){ return d.category === cat.id; });
        if (!catDocs.length) return;
        catDocs.sort(function(a,b){ return (b.date||'') > (a.date||'') ? 1 : -1; });
        var slug = slugify(cat.id);
        html += '<div class="section-group">' +
          '<div class="section-group-header" onclick="toggleGroup(\'' + esc(cat.id) + '\')">' +
            '<div class="section-header-left">' +
              '<div class="section-header-dot" style="background:' + cat.color + '"></div>' +
              '<div class="section-header-title">' + esc(cat.label) + '</div>' +
              '<span class="section-header-count">' + catDocs.length + '</span>' +
            '</div>' +
            '<svg id="grp-chevron-' + slug + '" class="section-group-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>' +
          '</div>' +
          '<div class="doc-list" id="grp-body-' + slug + '">';
        catDocs.forEach(function(doc){ html += renderDocRow(doc); });
        html += '</div></div>';
      });

      area.innerHTML = html;
      applyCollapseState();
    }

    // ── GROUP COLLAPSE ────────────────────────────────────────────────────
    function loadCollapsedGroups() {
      try { return new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '[]')); } catch(e) { return new Set(); }
    }
    function saveCollapsedGroups(s) {
      localStorage.setItem(COLLAPSE_KEY, JSON.stringify(Array.from(s)));
    }
    function applyCollapseState() {
      var collapsed = loadCollapsedGroups();
      CATEGORIES.forEach(function(cat) {
        var slug = slugify(cat.id);
        var body = document.getElementById('grp-body-' + slug);
        var chev = document.getElementById('grp-chevron-' + slug);
        if (!body) return;
        var isCollapsed = collapsed.has(cat.id);
        body.style.display = isCollapsed ? 'none' : '';
        if (chev) chev.style.transform = isCollapsed ? 'rotate(-90deg)' : '';
      });
    }
    function toggleGroup(categoryId) {
      var slug = slugify(categoryId);
      var body = document.getElementById('grp-body-' + slug);
      var chev = document.getElementById('grp-chevron-' + slug);
      if (!body) return;
      var isNowCollapsed = body.style.display !== 'none';
      var collapsed = loadCollapsedGroups();
      if (isNowCollapsed) { collapsed.add(categoryId); } else { collapsed.delete(categoryId); }
      saveCollapsedGroups(collapsed);
      body.style.display = isNowCollapsed ? 'none' : '';
      if (chev) chev.style.transform = isNowCollapsed ? 'rotate(-90deg)' : '';
    }

    // ── FILTER CONTROLS ───────────────────────────────────────────────────
    function setFilter(btn, dimension, value) {
      filterState[dimension] = value;
      document.querySelectorAll('[data-filter="' + dimension + '"]').forEach(function(b) {
        b.classList.toggle('active', b === btn);
      });
      renderDocList();
    }
    function handleSearch(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() {
        filterState.search = val.trim();
        renderDocList();
      }, 80);
    }
    function clearFilters() {
      filterState = { category:'all', status:'all', typeKey:'all', search:'' };
      var searchEl = document.getElementById('searchInput');
      if (searchEl) searchEl.value = '';
      document.querySelectorAll('.filter-btn').forEach(function(b) {
        var val = b.getAttribute('data-value') || b.textContent;
        b.classList.toggle('active', val === 'all' || b.textContent === 'All');
      });
      // Reset active state properly per group
      ['category','status','typeKey'].forEach(function(dim) {
        var btns = document.querySelectorAll('[data-filter="' + dim + '"]');
        btns.forEach(function(b, i) { b.classList.toggle('active', i === 0); });
      });
      renderDocList();
    }

    // ── REFRESH & INIT ────────────────────────────────────────────────────
    function refresh() {
      loadAllSources();
      renderStats();
      buildTypeFilterChips();
      renderDocList();
    }

    refresh();
  </script>
</body>
</html>
