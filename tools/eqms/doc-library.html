<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #0B2740;
      --mid-blue:   #304F6B;
      --dark-blue:  #02192F;
      --sidebar-bg: #071e31;
      --aqua:       #0AC0E9;
      --aqua-dark:  #089bbf;
      --light-gray: #F7F8FA;
      --green:      #10B981;
      --amber:      #F59E0B;
      --red:        #EF4444;
      --indigo:     #6366f1;
      --sidebar-w:  220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--light-gray); color: var(--primary); display: flex; height: 100vh; overflow: hidden; }

    /* ─── SIDEBAR ─── */
    .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 100; transition: width 0.2s ease; overflow: hidden; }
    .sidebar.collapsed { width: 56px; }
    .sidebar::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); pointer-events: none; }
    .sidebar-header { padding: 1.25rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .sidebar-brand { display: flex; align-items: center; gap: 0.65rem; }
    .sidebar-t-mark { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; display: block; }
    .sidebar-brand-text { overflow: hidden; transition: opacity 0.15s, width 0.2s; }
    .sidebar.collapsed .sidebar-brand-text { opacity: 0; width: 0; }
    .sidebar-brand-name { font-size: 0.85rem; font-weight: 700; color: white; letter-spacing: -0.01em; line-height: 1.1; white-space: nowrap; }
    .sidebar-brand-sub { font-size: 0.6rem; font-weight: 500; color: rgba(255,255,255,0.28); letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
    .sidebar-nav { flex: 1; padding: 0.5rem 0.5rem 0; overflow-y: auto; overflow-x: hidden; }
    .sidebar-nav::-webkit-scrollbar { width: 0; }
    .sidebar-section { margin-bottom: 0.25rem; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.48rem 0.75rem; border-radius: 7px; font-size: 0.79rem; font-weight: 500; color: rgba(255,255,255,0.70); cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; position: relative; white-space: nowrap; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.88); }
    .sidebar-nav-item.active { background: rgba(10,192,233,0.12); color: #5DDAF5; }
    .sidebar-nav-item.active::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px; background: var(--aqua); border-radius: 0 2px 2px 0; }
    .sidebar-nav-icon { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-nav-label { overflow: hidden; text-overflow: ellipsis; transition: opacity 0.15s; }
    .sidebar.collapsed .sidebar-nav-label { opacity: 0; }
    .sidebar-badge { margin-left: auto; font-size: 0.54rem; font-weight: 700; letter-spacing: 0.06em; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.22); padding: 0.14rem 0.42rem; border-radius: 3px; text-transform: uppercase; flex-shrink: 0; transition: opacity 0.15s; }
    .sidebar.collapsed .sidebar-badge { opacity: 0; }
    .sidebar-footer { padding: 0.85rem 1rem; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .sidebar-user { display: flex; align-items: center; gap: 0.6rem; }
    .sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(10,192,233,0.15); border: 1.5px solid rgba(10,192,233,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua); flex-shrink: 0; }
    .sidebar-user-info { overflow: hidden; transition: opacity 0.15s, width 0.2s; min-width: 0; flex: 1; }
    .sidebar.collapsed .sidebar-user-info { opacity: 0; width: 0; flex: 0; }
    .sidebar-user-name { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.62); white-space: nowrap; }
    .sidebar-user-role { font-size: 0.63rem; color: rgba(255,255,255,0.25); white-space: nowrap; }
    .sidebar-collapse-btn { margin-left: auto; flex-shrink: 0; background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 5px; transition: background 0.12s; display: flex; align-items: center; justify-content: center; }
    .sidebar-collapse-btn:hover { background: rgba(255,255,255,0.07); }
    .sidebar-collapse-icon { width: 14px; height: 14px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; }
    .sidebar.collapsed .sidebar-collapse-icon { transform: rotate(180deg); }

    /* ─── APP MAIN ─── */
    .app-main { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

    /* ─── TOPBAR ─── */
    .topbar { background: white; border-bottom: 1px solid rgba(11,39,64,0.08); height: 60px; display: flex; align-items: center; flex-shrink: 0; z-index: 10; }
    .topbar-brand-area { width: var(--sidebar-w); flex-shrink: 0; height: 100%; overflow: hidden; }
    .topbar-brand-name, .topbar-brand-sub { display: none !important; }
    .topbar-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 1.5rem; }
    .topbar-search { display: flex; align-items: center; gap: 0.6rem; background: var(--light-gray); border: 1.5px solid rgba(11,39,64,0.1); border-radius: 8px; padding: 0.42rem 0.9rem; width: min(400px, 100%); transition: border-color 0.15s; }
    .topbar-search:focus-within { border-color: rgba(10,192,233,0.4); }
    .topbar-search svg { width: 14px; height: 14px; stroke: rgba(11,39,64,0.3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .topbar-search input { background: transparent; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--primary); width: 100%; }
    .topbar-search input::placeholder { color: rgba(11,39,64,0.35); }
    .topbar-right { display: flex; align-items: center; gap: 0.5rem; padding: 0 1.25rem; flex-shrink: 0; }
    .topbar-icon-btn { width: 34px; height: 34px; border-radius: 8px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; position: relative; }
    .topbar-icon-btn:hover { background: var(--light-gray); }
    .topbar-icon-btn svg { width: 16px; height: 16px; stroke: var(--mid-blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .topbar-notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 1.5px solid white; }
    .topbar-user { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.3rem 0.6rem; border-radius: 8px; transition: background 0.12s; }
    .topbar-user:hover { background: var(--light-gray); }
    .topbar-user-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(10,192,233,0.1); border: 1.5px solid rgba(10,192,233,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua-dark); flex-shrink: 0; }
    .topbar-user-name { font-size: 0.8rem; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .topbar-user-role { font-size: 0.63rem; color: rgba(11,39,64,0.4); white-space: nowrap; }

    /* ─── CONTENT WRAP ─── */
    .content-wrap { flex: 1; display: flex; min-height: 0; overflow: hidden; }

    /* ─── MAIN AREA ─── */
    .main-area { flex: 1; overflow-y: auto; padding: 1.5rem 1.75rem; min-width: 0; display: flex; flex-direction: column; }
    .main-area::-webkit-scrollbar { width: 5px; }
    .main-area::-webkit-scrollbar-track { background: transparent; }
    .main-area::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 3px; }

    /* ─── PAGE HEADER ─── */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.1rem; gap: 1rem; }
    .page-heading { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.025em; line-height: 1.2; }
    .page-subtitle { font-size: 0.77rem; color: rgba(11,39,64,0.44); margin-top: 0.22rem; }
    .page-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .btn-primary { display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600; color: white; background: var(--aqua-dark); border: none; border-radius: 7px; padding: 0.45rem 0.9rem; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
    .btn-primary:hover { background: var(--aqua); }
    .btn-primary svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .btn-ghost { display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500; color: var(--mid-blue); background: white; border: 1.5px solid rgba(11,39,64,0.12); border-radius: 7px; padding: 0.42rem 0.8rem; cursor: pointer; transition: border-color 0.12s, background 0.12s; white-space: nowrap; }
    .btn-ghost:hover { border-color: rgba(10,192,233,0.4); background: rgba(10,192,233,0.02); }
    .btn-ghost svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ─── SUBTABS ─── */
    .subtabs { display: flex; gap: 0; border-bottom: 1.5px solid rgba(11,39,64,0.08); margin-bottom: 1rem; }
    .subtab { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; color: rgba(11,39,64,0.5); padding: 0.55rem 1rem; border: none; border-bottom: 2px solid transparent; margin-bottom: -1.5px; cursor: pointer; transition: color 0.12s; white-space: nowrap; background: transparent; }
    .subtab:hover { color: var(--primary); }
    .subtab.active { color: var(--aqua-dark); font-weight: 600; border-bottom-color: var(--aqua); }
    .subtab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 15px; background: rgba(11,39,64,0.07); color: rgba(11,39,64,0.45); font-size: 0.59rem; font-weight: 700; padding: 0 0.32rem; border-radius: 10px; margin-left: 0.3rem; }
    .subtab.active .subtab-count { background: rgba(10,192,233,0.12); color: var(--aqua-dark); }

    /* ─── FILTER BAR ─── */
    .filter-bar { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-dropdown { display: inline-flex; align-items: center; gap: 0.3rem; font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 500; color: var(--mid-blue); background: white; border: 1.5px solid rgba(11,39,64,0.12); border-radius: 7px; padding: 0.36rem 0.65rem; cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; white-space: nowrap; }
    .filter-dropdown:hover { border-color: rgba(10,192,233,0.4); background: rgba(10,192,233,0.02); }
    .filter-dropdown svg { width: 11px; height: 11px; stroke: rgba(11,39,64,0.35); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .filter-more-btn { font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 500; color: rgba(11,39,64,0.42); background: transparent; border: none; cursor: pointer; padding: 0.36rem 0.45rem; transition: color 0.12s; }
    .filter-more-btn:hover { color: var(--primary); }
    .filter-search-inline { display: flex; align-items: center; gap: 0.45rem; margin-left: auto; background: white; border: 1.5px solid rgba(11,39,64,0.1); border-radius: 7px; padding: 0.34rem 0.7rem; transition: border-color 0.15s; }
    .filter-search-inline:focus-within { border-color: rgba(10,192,233,0.4); }
    .filter-search-inline svg { width: 12px; height: 12px; stroke: rgba(11,39,64,0.3); fill: none; stroke-width: 2; flex-shrink: 0; }
    .filter-search-inline input { background: transparent; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 0.74rem; color: var(--primary); width: 160px; }
    .filter-search-inline input::placeholder { color: rgba(11,39,64,0.33); }

    /* ─── SORT BAR ─── */
    .sort-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 0.67rem; color: rgba(11,39,64,0.38); }
    .sort-label { font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .sort-chip { font-family: 'Inter', sans-serif; font-size: 0.67rem; font-weight: 500; color: rgba(11,39,64,0.45); background: white; border: 1px solid rgba(11,39,64,0.1); border-radius: 5px; padding: 0.15rem 0.5rem; cursor: pointer; transition: all 0.12s; }
    .sort-chip.active { color: var(--aqua-dark); border-color: rgba(10,192,233,0.3); background: rgba(10,192,233,0.05); font-weight: 600; }

    /* ─── DOC TABLE ─── */
    .doc-table-wrap { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; overflow: hidden; flex: 1; }
    .doc-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .doc-table colgroup col:nth-child(1) { width: 36px; }
    .doc-table colgroup col:nth-child(2) { width: 28%; }
    .doc-table colgroup col:nth-child(3) { width: 11%; }
    .doc-table colgroup col:nth-child(4) { width: 10%; }
    .doc-table colgroup col:nth-child(5) { width: 13%; }
    .doc-table colgroup col:nth-child(6) { width: 12%; }
    .doc-table colgroup col:nth-child(7) { width: 10%; }
    .doc-table colgroup col:nth-child(8) { width: 11%; }
    .doc-table colgroup col:nth-child(9) { width: auto; }
    .doc-table th { padding: 0.6rem 0.85rem; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(11,39,64,0.36); border-bottom: 1px solid rgba(11,39,64,0.07); background: rgba(11,39,64,0.015); text-align: left; white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.12s; }
    .doc-table th:hover { color: rgba(11,39,64,0.6); }
    .doc-table th.sorted { color: var(--aqua-dark); }
    .doc-table th:first-child { padding-left: 1rem; cursor: default; }
    .doc-table th svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: middle; margin-left: 2px; }
    .doc-table td { padding: 0.7rem 0.85rem; border-bottom: 1px solid rgba(11,39,64,0.055); vertical-align: middle; }
    .doc-table td:first-child { padding-left: 1rem; }
    .doc-table tr:last-child td { border-bottom: none; }
    .doc-table tbody tr { cursor: pointer; }
    .doc-table tbody tr:hover td { background: rgba(10,192,233,0.015); }

    /* Table cell styles */
    .doc-cb { width: 15px; height: 15px; accent-color: var(--aqua); cursor: pointer; }
    .doc-icon-cell { display: flex; align-items: center; gap: 0.65rem; }
    .doc-type-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .doc-type-icon svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .doc-title { font-size: 0.81rem; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: none; display: block; }
    a.doc-title:hover { color: var(--aqua-dark); text-decoration: underline; }
    .doc-id { font-size: 0.66rem; color: rgba(11,39,64,0.4); margin-top: 0.1rem; white-space: nowrap; }
    .doc-type-badge { display: inline-flex; align-items: center; font-size: 0.62rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 4px; white-space: nowrap; letter-spacing: 0.02em; }
    .status-badge { display: inline-flex; align-items: center; font-size: 0.64rem; font-weight: 700; padding: 0.17rem 0.52rem; border-radius: 5px; white-space: nowrap; letter-spacing: 0.02em; }
    .cat-chip { display: inline-flex; align-items: center; font-size: 0.63rem; font-weight: 600; padding: 0.14rem 0.45rem; border-radius: 4px; white-space: nowrap; }
    .cat-qs { background: rgba(11,39,64,0.07); color: var(--mid-blue); }
    .cat-proj { background: rgba(2,132,199,0.08); color: #0369a1; }
    .cat-rec { background: rgba(16,185,129,0.08); color: #047857; }
    .doc-owner { font-size: 0.73rem; color: rgba(11,39,64,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-date { font-size: 0.73rem; color: rgba(11,39,64,0.52); white-space: nowrap; }
    .doc-action-link { font-size: 0.74rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; white-space: nowrap; transition: color 0.12s; }
    .doc-action-link:hover { color: var(--aqua); text-decoration: underline; }
    .doc-nav-icon { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 5px; color: rgba(11,39,64,0.22); transition: background 0.12s, color 0.12s; }
    tr:hover .doc-nav-icon { background: rgba(10,192,233,0.1); color: var(--aqua-dark); }

    /* ─── PAGINATION ─── */
    .pagination-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0 0; }
    .pagination-info { font-size: 0.72rem; color: rgba(11,39,64,0.4); }
    .btn-load-more { font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 600; color: var(--aqua-dark); background: rgba(10,192,233,0.06); border: 1.5px solid rgba(10,192,233,0.2); border-radius: 7px; padding: 0.38rem 0.85rem; cursor: pointer; transition: background 0.12s; }
    .btn-load-more:hover { background: rgba(10,192,233,0.12); }

    /* ─── EMPTY STATE ─── */
    .empty-state { padding: 3.5rem 2rem; text-align: center; }
    .empty-state-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.85rem; }
    .empty-state-icon svg { width: 20px; height: 20px; stroke: rgba(11,39,64,0.25); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 0.35rem; }
    .empty-state-desc { font-size: 0.77rem; color: rgba(11,39,64,0.43); line-height: 1.6; }

    /* ─── SMART COLLECTIONS ─── */
    .collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.85rem; }
    .collection-card { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; padding: 1rem 1.1rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .collection-card:hover { border-color: rgba(10,192,233,0.35); box-shadow: 0 2px 12px rgba(10,192,233,0.08); }
    .collection-card-icon { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.65rem; }
    .collection-card-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .collection-card-name { font-size: 0.82rem; font-weight: 600; color: var(--primary); margin-bottom: 0.2rem; }
    .collection-card-count { font-size: 0.7rem; color: rgba(11,39,64,0.45); }

    /* ─── RIGHT PANEL ─── */
    .right-panel { width: 272px; flex-shrink: 0; border-left: 1px solid rgba(11,39,64,0.07); padding: 1.5rem 1.1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.85rem; background: white; }
    .right-panel::-webkit-scrollbar { width: 0; }
    .widget { background: var(--light-gray); border: 1px solid rgba(11,39,64,0.07); border-radius: 10px; padding: 1rem 1.1rem; }
    .widget-title { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(11,39,64,0.36); margin-bottom: 0.75rem; }
    .widget-row { display: flex; align-items: center; gap: 0.55rem; padding: 0.3rem 0; cursor: pointer; text-decoration: none; }
    .widget-row:hover .widget-row-title { color: var(--aqua-dark); }
    .widget-row-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .widget-row-icon svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .widget-row-title { font-size: 0.74rem; font-weight: 500; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; transition: color 0.12s; }
    .widget-row-sub { font-size: 0.62rem; color: rgba(11,39,64,0.38); white-space: nowrap; }
    .widget-divider { height: 1px; background: rgba(11,39,64,0.07); margin: 0.4rem 0; }
    .widget-view-all { font-size: 0.71rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; display: block; margin-top: 0.55rem; transition: color 0.12s; }
    .widget-view-all:hover { color: var(--aqua); }
    .widget-empty { font-size: 0.73rem; color: rgba(11,39,64,0.38); font-style: italic; padding: 0.25rem 0; }
    .fav-star { color: var(--amber); font-size: 0.75rem; flex-shrink: 0; }
  </style>
</head>
<body>

        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
      catch(e) { return String(iso).slice(0,10); }
    }
    function slugify(s) {

      if (activeTab === 'audit-packages') return ALL_DOCS.filter(function(d){ return d.typeKey === 'audit'; });

    function applyFilters(docs) {
      return docs.filter(function(d) {
        if (filterState.docType !== 'All Types' && (TYPE_LABEL[d.typeKey]||d.type) !== filterState.docType) return false;
        if (filterState.status !== 'All Status') {
          var norm = normalizeStatusForFilter(d.status);
          var m = {'Approved':'approved','Draft':'draft','In Progress':'in-progress','Open':'open'};
          if (norm !== (m[filterState.status]||filterState.status.toLowerCase())) return false;
        }
        if (filterState.process !== 'All Processes' && d.moduleLabel !== filterState.process) return false;
        if (filterState.owner !== 'All Owners' && filterState.owner !== 'Sarah Johnson') return false;
        if (filterState.search) {
          var q = filterState.search.toLowerCase();
          var hay = (d.title+' '+d.id+' '+d.type+' '+d.moduleLabel).toLowerCase();
          if (hay.indexOf(q) === -1) return false;
        }
        return true;
      });
    }
    function sortDocs(docs) {
      return docs.slice().sort(function(a,b) {
        var av, bv;
        if (sortState.col === 'date') { av = a.date||''; bv = b.date||''; }
        else if (sortState.col === 'title') { av = a.title||''; bv = b.title||''; }
        else if (sortState.col === 'status') { av = a.status||''; bv = b.status||''; }
        else if (sortState.col === 'type') { av = a.type||''; bv = b.type||''; }
        else { av = a.date||''; bv = b.date||''; }
        var cmp = av < bv ? -1 : av > bv ? 1 : 0;
        return sortState.dir === 'desc' ? -cmp : cmp;
      });
    }

        { name:'Recently Approved', count:recentlyApproved.length, icon:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>', bg:'rgba(16,185,129,0.1)', color:'#047857' },
        { name:'Expiring Soon', count:expiring.length, icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', bg:'rgba(245,158,11,0.1)', color:'#b45309' },
        { name:'In Progress', count:inProgress.length, icon:'<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>', bg:'rgba(99,102,241,0.1)', color:'#4338ca' },
        { name:'Open Quality Records', count:openRecords.length, icon:'<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', bg:'rgba(239,68,68,0.1)', color:'#dc2626' },
        { name:'All Procedures', count:ALL_DOCS.filter(function(d){return d.typeKey==='procedure';}).length, icon:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>', bg:'rgba(48,79,107,0.1)', color:'#304F6B' },
        { name:'Project Documents', count:ALL_DOCS.filter(function(d){return d.category==='Project';}).length, icon:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>', bg:'rgba(2,132,199,0.1)', color:'#0284c7' },
      ];

      var html = '<div class="collections-grid">';
      collections.forEach(function(c) {
        html += '<div class="collection-card">' +
          '<div class="collection-card-icon" style="background:' + c.bg + ';color:' + c.color + '"><svg viewBox="0 0 24 24">' + c.icon + '</svg></div>' +
          '<div class="collection-card-name">' + esc(c.name) + '</div>' +
          '<div class="collection-card-count">' + c.count + ' document' + (c.count !== 1 ? 's' : '') + '</div>' +
          '</div>';
      });
      html += '</div>';
      document.getElementById('tableArea').innerHTML = html;
    }

    // ── TAB COUNTS ─────────────────────────────────────────────────────────────
    function updateTabCounts() {
      var all = document.getElementById('cnt-all');
      var ctrl = document.getElementById('cnt-controlled');
      var audPkg = document.getElementById('cnt-audit-packages');
      if (all) all.textContent = ALL_DOCS.length;
      if (ctrl) ctrl.textContent = ALL_DOCS.filter(function(d){ return CONTROLLED_TYPES.indexOf(d.typeKey) !== -1; }).length;
      if (audPkg) audPkg.textContent = ALL_DOCS.filter(function(d){ return d.typeKey === 'audit'; }).length;
    }

    // ── RIGHT PANEL ────────────────────────────────────────────────────────────
    var FAVORITES = [];
    function renderRightPanel() {
      // Recently Viewed
      var rv = [];
      try { rv = JSON.parse(sessionStorage.getItem('qms_recently_viewed')||'[]'); } catch(e) {}
      var rvEl = document.getElementById('recentlyViewedContent');
      if (rv.length === 0) {
        rvEl.innerHTML = '<div class="widget-empty">No recently viewed documents.</div>';
      } else {
        var html = '';
        rv.slice(0,5).forEach(function(item) {
          var tm = TYPE_META[item.typeKey] || DEFAULT_TYPE_META;
          html += '<a class="widget-row" href="' + esc(item.href) + '">' +
            '<div class="widget-row-icon" style="background:' + tm.bg + ';color:' + tm.color + '"><svg viewBox="0 0 24 24">' + tm.icon + '</svg></div>' +
            '<div class="widget-row-title">' + esc(item.title) + '</div>' +
            '<span class="widget-row-sub">' + esc(item.id) + '</span>' +
            '</a>';
        });
        html += '<a href="#" class="widget-view-all">View all recently viewed →</a>';
        rvEl.innerHTML = html;
      }

      // Favorites (seeded from top approved docs)
      var approved = ALL_DOCS.filter(function(d){ return d.status==='approved'; }).slice(0,3);
      FAVORITES = approved;
      var favEl = document.getElementById('favoritesContent');
      if (FAVORITES.length === 0) {
        favEl.innerHTML = '<div class="widget-empty">No favorites yet.</div>';
      } else {
        var html = '';
        FAVORITES.forEach(function(doc) {
          var tm = TYPE_META[doc.typeKey] || DEFAULT_TYPE_META;
          html += '<a class="widget-row" href="' + esc(doc.href) + '">' +
            '<div class="widget-row-icon" style="background:' + tm.bg + ';color:' + tm.color + '"><svg viewBox="0 0 24 24">' + tm.icon + '</svg></div>' +
            '<div class="widget-row-title">' + esc(doc.title) + '</div>' +
            '<span class="fav-star">★</span>' +
            '</a>';
        });
        favEl.innerHTML = html;
      }

      // Recently Effective
      var recent = ALL_DOCS.filter(function(d){ return d.status==='approved' && d.date; })
        .sort(function(a,b){ return (b.date||'') > (a.date||'') ? 1 : -1; })
        .slice(0,4);
      var reEl = document.getElementById('recentlyEffectiveContent');
      if (recent.length === 0) {
        reEl.innerHTML = '<div class="widget-empty">No recently approved documents.</div>';
      } else {
        var html = '';
        recent.forEach(function(doc) {
          var tm = TYPE_META[doc.typeKey] || DEFAULT_TYPE_META;
          html += '<a class="widget-row" href="' + esc(doc.href) + '">' +
            '<div class="widget-row-icon" style="background:' + tm.bg + ';color:' + tm.color + '"><svg viewBox="0 0 24 24">' + tm.icon + '</svg></div>' +
            '<div>' +
              '<div class="widget-row-title">' + esc(doc.title) + '</div>' +
              '<div class="widget-row-sub">' + fmtDate(doc.date) + '</div>' +
            '</div>' +
            '</a>';
        });
        html += '<a href="#" class="widget-view-all">View all recently effective →</a>';
        reEl.innerHTML = html;
      }
    }

    // ── NAVIGATION + RECENTLY VIEWED TRACKING ─────────────────────────────────
    function navigateDoc(href, id, title, typeKey) {
      try {
        var rv = [];
        try { rv = JSON.parse(sessionStorage.getItem('qms_recently_viewed')||'[]'); } catch(e) {}
        rv = rv.filter(function(x){ return x.id !== id; });
        rv.unshift({ id:id, title:title, typeKey:typeKey, href:href });
        rv = rv.slice(0,10);
        sessionStorage.setItem('qms_recently_viewed', JSON.stringify(rv));
      } catch(e) {}
      window.location.href = href;
    }

    // ── CONTROLS ───────────────────────────────────────────────────────────────
    function setTab(btn, tab) {
      activeTab = tab;
      shownCount = PAGE_SIZE;
      document.querySelectorAll('.subtab').forEach(function(b){ b.classList.toggle('active', b===btn); });
      renderTable();
    }
    function setSort(col) {
      if (sortState.col === col) sortState.dir = sortState.dir === 'desc' ? 'asc' : 'desc';
      else { sortState.col = col; sortState.dir = 'desc'; }
      renderTable();
    }
    function loadMore() {
      shownCount += PAGE_SIZE;
      renderTable();
    }
    function handleSearch(val) {
      filterState.search = val.trim();
      shownCount = PAGE_SIZE;
      renderTable();
    }
    function handleTopbarSearch(val) {
      var el = document.getElementById('libSearch');
      if (el) { el.value = val; handleSearch(val); }
    }
    window.onFilterChange = function(key, value) {
      filterState[key] = value;
      shownCount = PAGE_SIZE;
      renderTable();
    };
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // ── INIT ───────────────────────────────────────────────────────────────────
    function init() {
      loadAllSources();
      buildFilterOptions();
      updateTabCounts();
      renderTable();
      renderRightPanel();
    }
    init();
  </script>
</body>
</html>
