<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Library — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #0B2740;
      --mid-blue:   #304F6B;
      --dark-blue:  #02192F;
      --sidebar-bg: #071e31;
      --aqua:       #0AC0E9;
      --aqua-dark:  #089bbf;
      --gray:       #D2D2D2;
      --light-gray: #F7F8FA;
      --white:      #FFFFFF;
      --sidebar-w:  232px;
      --green:      #10B981;
      --amber:      #F59E0B;
      --red:        #EF4444;
      --indigo:     #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--light-gray); color: var(--primary); display: flex; height: 100vh; overflow: hidden; }

    /* ─── SIDEBAR ─── */
    .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 100; }
    .sidebar::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); pointer-events: none; }
    .sidebar-header { padding: 1.25rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 0.65rem; }
    .sidebar-t-mark { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; display: block; }
    .sidebar-brand-name { font-size: 0.85rem; font-weight: 700; color: white; letter-spacing: -0.01em; line-height: 1.1; }
    .sidebar-brand-sub { font-size: 0.6rem; font-weight: 500; color: rgba(255,255,255,0.28); letter-spacing: 0.07em; text-transform: uppercase; }
    .project-switcher-wrap { padding: 0.75rem 0.75rem 0; }
    .project-switcher { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; padding: 0.55rem 0.75rem; cursor: default; display: flex; align-items: center; gap: 0.55rem; }
    .project-switcher-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--aqua); }
    .project-switcher-text { flex: 1; min-width: 0; }
    .project-switcher-label { font-size: 0.58rem; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 0.1rem; }
    .project-switcher-name { font-size: 0.8rem; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .sidebar-nav { flex: 1; padding: 0.5rem 0.5rem 0; overflow-y: auto; }
    .sidebar-nav::-webkit-scrollbar { width: 0; }
    .sidebar-section { margin-bottom: 0.25rem; }
    .sidebar-section-label { font-size: 0.57rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.18); padding: 0.6rem 0.75rem 0.2rem; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.48rem 0.75rem; border-radius: 7px; font-size: 0.79rem; font-weight: 500; color: rgba(255,255,255,0.70); cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; position: relative; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.88); }
    .sidebar-nav-item.active { background: rgba(10,192,233,0.12); color: #5DDAF5; }
    .sidebar-nav-item.active::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px; background: var(--aqua); border-radius: 0 2px 2px 0; }
    .sidebar-nav-icon { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-badge { margin-left: auto; font-size: 0.54rem; font-weight: 700; letter-spacing: 0.06em; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.22); padding: 0.14rem 0.42rem; border-radius: 3px; text-transform: uppercase; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0.5rem 0.75rem; }
    .sidebar-footer { padding: 0.85rem 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-user { display: flex; align-items: center; gap: 0.6rem; }
    .sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(10,192,233,0.15); border: 1.5px solid rgba(10,192,233,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua); flex-shrink: 0; }
    .sidebar-user-name { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.62); }
    .sidebar-user-role { font-size: 0.63rem; color: rgba(255,255,255,0.25); }
    .sidebar-sign-out { margin-left: auto; }
    .sidebar-sign-out a { font-size: 0.66rem; color: rgba(255,255,255,0.22); text-decoration: none; transition: color 0.2s; }
    .sidebar-sign-out a:hover { color: rgba(255,255,255,0.5); }

    /* ─── MAIN ─── */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

    /* ─── TOPBAR ─── */
    .topbar { background: white; border-bottom: 1px solid rgba(11,39,64,0.08); padding: 0 1.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .topbar-icon svg { width: 16px; height: 16px; stroke: var(--mid-blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .topbar-title { font-size: 0.92rem; font-weight: 700; color: var(--primary); }
    .topbar-subtitle { font-size: 0.75rem; color: rgba(11,39,64,0.4); font-weight: 400; margin-top: 0.1rem; }
    .topbar-right { display: flex; align-items: center; gap: 0.65rem; }
    .btn-action { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: var(--mid-blue); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.78rem; padding: 0.48rem 1rem; border-radius: 7px; border: 1.5px solid rgba(11,39,64,0.18); cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; }
    .btn-action:hover { border-color: var(--aqua); color: var(--aqua-dark); background: rgba(10,192,233,0.04); }
    .btn-action svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ─── CONTENT ─── */
    .content-area { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; }
    .content-area::-webkit-scrollbar { width: 5px; }
    .content-area::-webkit-scrollbar-track { background: transparent; }
    .content-area::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 3px; }

    /* ─── STATS BAR ─── */
    .stats-bar { display: flex; gap: 1rem; margin-bottom: 1.75rem; }
    .stat-card { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 10px; padding: 0.9rem 1.1rem; flex: 1; min-width: 0; }
    .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); letter-spacing: -0.04em; line-height: 1; }
    .stat-label { font-size: 0.68rem; font-weight: 600; color: rgba(11,39,64,0.38); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 0.25rem; }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.amber .stat-value { color: var(--amber); }
    .stat-card.indigo .stat-value { color: var(--indigo); }

    /* ─── SECTION HEADER ─── */
    .section-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; }
    .section-header-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section-header-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(11,39,64,0.5); }
    .section-header-count { font-size: 0.65rem; font-weight: 700; background: rgba(11,39,64,0.06); color: rgba(11,39,64,0.4); padding: 0.1rem 0.5rem; border-radius: 20px; margin-left: 0.25rem; }
    .section-group { margin-bottom: 2rem; }

    /* ─── DOCUMENT ROW ─── */
    .doc-list { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 12px; overflow: hidden; margin-bottom: 0.5rem; }
    .doc-row { display: grid; grid-template-columns: 36px 1fr auto auto auto; align-items: center; gap: 0.75rem; padding: 0.9rem 1.1rem; border-bottom: 1px solid rgba(11,39,64,0.06); transition: background 0.1s; cursor: default; }
    .doc-row:last-child { border-bottom: none; }
    .doc-row:hover { background: rgba(10,192,233,0.02); }
    .doc-icon-wrap { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .doc-icon-wrap svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .doc-icon-wrap.un   { background: rgba(10,192,233,0.1); color: var(--aqua-dark); }
    .doc-icon-wrap.di   { background: rgba(48,79,107,0.1); color: var(--mid-blue); }
    .doc-icon-wrap.do   { background: rgba(249,115,22,0.1); color: #ea580c; }
    .doc-icon-wrap.design-review { background: rgba(16,185,129,0.1); color: #059669; }
    .doc-main { min-width: 0; }
    .doc-name { font-size: 0.85rem; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 0.7rem; color: rgba(11,39,64,0.45); margin-top: 0.15rem; }
    .doc-ver-badge { display: inline-flex; align-items: center; background: rgba(11,39,64,0.06); border: 1px solid rgba(11,39,64,0.1); color: var(--mid-blue); font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
    .doc-status-approved { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #059669; font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.6rem; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
    .doc-status-approved::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
    .doc-expand-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; background: transparent; border: 1px solid rgba(11,39,64,0.12); cursor: pointer; transition: background 0.12s, border-color 0.12s; flex-shrink: 0; }
    .doc-expand-btn:hover { background: rgba(11,39,64,0.05); border-color: rgba(11,39,64,0.2); }
    .doc-expand-btn svg { width: 11px; height: 11px; stroke: rgba(11,39,64,0.4); fill: none; stroke-width: 2.5; transition: transform 0.2s; }
    .doc-expand-btn.open svg { transform: rotate(180deg); }

    /* ─── HISTORY PANEL ─── */
    .doc-history { display: none; border-top: 1px solid rgba(11,39,64,0.07); background: #FAFBFC; }
    .doc-history.open { display: block; }
    .history-inner { padding: 1rem 1.1rem; }
    .history-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(11,39,64,0.35); margin-bottom: 0.65rem; }
    .history-entry { display: flex; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid rgba(11,39,64,0.06); }
    .history-entry:last-child { border-bottom: none; }
    .history-entry-ver { width: 32px; flex-shrink: 0; }
    .history-ver-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 800; }
    .history-ver-dot.current { background: rgba(16,185,129,0.15); color: #059669; border: 1.5px solid rgba(16,185,129,0.3); }
    .history-ver-dot.past { background: rgba(11,39,64,0.07); color: rgba(11,39,64,0.4); border: 1.5px solid rgba(11,39,64,0.12); }
    .history-entry-body { flex: 1; min-width: 0; }
    .history-entry-head { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
    .history-entry-title { font-size: 0.78rem; font-weight: 600; color: var(--primary); }
    .history-entry-date { font-size: 0.7rem; color: rgba(11,39,64,0.4); }
    .history-entry-sig { font-size: 0.71rem; color: rgba(11,39,64,0.5); margin-top: 0.1rem; }
    .history-entry-cr { display: inline-flex; align-items: center; background: rgba(245,158,11,0.1); color: #b45309; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.45rem; border-radius: 4px; margin-top: 0.2rem; }
    .history-snapshot-toggle { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.66rem; color: rgba(11,39,64,0.4); cursor: pointer; margin-top: 0.25rem; user-select: none; }
    .history-snapshot-toggle:hover { color: var(--aqua-dark); }
    .history-snapshot { display: none; background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 7px; padding: 0.75rem; margin-top: 0.4rem; }
    .history-snapshot.open { display: block; }
    .snapshot-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(11,39,64,0.3); margin-bottom: 0.5rem; }
    .snapshot-table { width: 100%; border-collapse: collapse; }
    .snapshot-table td { padding: 0.3rem 0.5rem; font-size: 0.72rem; color: var(--primary); border-bottom: 1px solid rgba(11,39,64,0.05); vertical-align: top; }
    .snapshot-table td:first-child { font-weight: 600; color: rgba(11,39,64,0.5); width: 80px; white-space: nowrap; }
    .snapshot-table tr:last-child td { border-bottom: none; }

    /* ─── EMPTY STATE ─── */
    .empty-state { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 12px; padding: 3rem 2rem; text-align: center; }
    .empty-state-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(11,39,64,0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .empty-state-icon svg { width: 24px; height: 24px; stroke: rgba(11,39,64,0.25); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 0.4rem; }
    .empty-state-desc { font-size: 0.78rem; color: rgba(11,39,64,0.45); line-height: 1.6; max-width: 380px; margin: 0 auto; }
    .empty-state-link { display: inline-flex; align-items: center; gap: 0.35rem; margin-top: 1rem; font-size: 0.77rem; font-weight: 600; color: var(--aqua-dark); text-decoration: none; padding: 0.45rem 0.9rem; border: 1.5px solid rgba(10,192,233,0.3); border-radius: 7px; transition: background 0.15s; }
    .empty-state-link:hover { background: rgba(10,192,233,0.06); }

    /* ─── AUDIT LOG MODAL ─── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(2,25,47,0.55); z-index: 9000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 14px; box-shadow: 0 24px 80px rgba(2,25,47,0.22); width: 680px; max-width: calc(100vw - 2rem); max-height: 80vh; display: flex; flex-direction: column; }
    .modal-head { padding: 1.1rem 1.35rem; border-bottom: 1px solid rgba(11,39,64,0.08); display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .modal-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); flex: 1; }
    .modal-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 7px; border: 1px solid rgba(11,39,64,0.12); background: transparent; cursor: pointer; color: rgba(11,39,64,0.4); font-size: 1rem; transition: background 0.12s; }
    .modal-close:hover { background: rgba(11,39,64,0.06); }
    .modal-body { flex: 1; overflow-y: auto; padding: 1rem 1.35rem; }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 2px; }
    .audit-entry { padding: 0.75rem 0; border-bottom: 1px solid rgba(11,39,64,0.06); }
    .audit-entry:last-child { border-bottom: none; }
    .audit-entry-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; }
    .audit-signer { font-size: 0.82rem; font-weight: 600; color: var(--primary); }
    .audit-role { font-size: 0.72rem; color: rgba(11,39,64,0.45); }
    .audit-ts { font-size: 0.7rem; color: rgba(11,39,64,0.4); white-space: nowrap; }
    .audit-meaning { font-size: 0.74rem; color: var(--mid-blue); margin-top: 0.2rem; font-style: italic; }
    .audit-record { font-size: 0.68rem; color: rgba(11,39,64,0.38); margin-top: 0.15rem; }
    .audit-hash { font-size: 0.65rem; color: rgba(11,39,64,0.28); margin-top: 0.1rem; font-family: monospace; word-break: break-all; }
    .audit-empty { text-align: center; padding: 2rem; font-size: 0.8rem; color: rgba(11,39,64,0.35); }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div>
          <div class="topbar-title">DHF Document Library</div>
          <div class="topbar-subtitle">Approved documents and records for the Design History File</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-action" onclick="openAuditLog()">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Audit Log
        </button>
        <button class="btn-action" onclick="renderAll()">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Audit Log Modal -->
  <div class="modal-overlay" id="auditModalOverlay">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title">Electronic Signature Audit Log</div>
        <button class="modal-close" onclick="closeAuditLog()">✕</button>
      </div>
      <div class="modal-body" id="auditModalBody"></div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script src="esign.js"></script>
  <script src="versions.js"></script>
  <script>
    initSidebar({ activePage: 'doc-library' });

    // ── HELPERS ───────────────────────────────────────────────────────────
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); } catch(e) { return iso.slice(0,10); }
    }
    function fmtDateTime(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch(e) { return iso; }
    }

    const TYPE_META = {
      un:            { label: 'User Needs Specification',    color: '#0AC0E9',  group: 'Design Specifications' },
      di:            { label: 'Design Inputs Specification', color: '#304F6B',  group: 'Design Specifications' },
      do:            { label: 'Design Outputs Specification',color: '#ea580c',  group: 'Design Specifications' },
      'design-review':{ label: 'Design Review Record',       color: '#10B981',  group: 'Governance Records' },
    };

    const TYPE_ICONS = {
      un:  '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
      di:  '<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
      do:  '<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>',
      'design-review': '<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
    };

    // ── RENDER ────────────────────────────────────────────────────────────
    function loadDocuments() {
      try { return JSON.parse(localStorage.getItem('qms_documents') || '{}'); } catch(e) { return {}; }
    }

    function renderDocRow(key, doc) {
      const meta = TYPE_META[doc.type] || { label: doc.type, color: '#304F6B', group: 'Other' };
      const icon = TYPE_ICONS[doc.type] || TYPE_ICONS['di'];
      const typeClass = doc.type.replace(/[^a-z0-9-]/g, '-');
      const sigName = doc.approvalSignature ? doc.approvalSignature.signerName : '—';
      const sigRole = doc.approvalSignature ? doc.approvalSignature.signerRole : '';
      const historyCount = (doc.history || []).length;

      let html = '<div class="doc-list" id="doccard-' + esc(key) + '">';
      html += '<div class="doc-row">';
      html += '<div class="doc-icon-wrap ' + esc(typeClass) + '">' + icon + '</div>';
      html += '<div class="doc-main">';
      html += '<div class="doc-name">' + esc(doc.name) + '</div>';
      html += '<div class="doc-meta">Approved by ' + esc(sigName) + (sigRole ? ' · ' + esc(sigRole) : '') + ' · ' + fmtDate(doc.approvedAt) + (doc.changeRef ? ' · via ' + esc(doc.changeRef) : '') + '</div>';
      html += '</div>';
      html += '<span class="doc-ver-badge">v' + (doc.version || 1) + '</span>';
      html += '<span class="doc-status-approved">Approved</span>';
      if (historyCount > 0) {
        html += '<button class="doc-expand-btn" id="expand-' + esc(key) + '" onclick="toggleHistory(\'' + esc(key) + '\')" title="Version history"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>';
      } else {
        html += '<div style="width:26px;"></div>';
      }
      html += '</div>';

      // History panel
      if (historyCount > 0) {
        html += '<div class="doc-history" id="hist-' + esc(key) + '">';
        html += '<div class="history-inner">';
        html += '<div class="history-label">Version History</div>';

        // Current version first
        html += buildHistoryEntry(doc, doc.version, doc.approvedAt, doc.changeRef, doc.approvalSignature, null, true);

        // Prior versions (reverse order)
        const prior = (doc.history || []).slice().reverse();
        prior.forEach(function(h, i) {
          html += buildHistoryEntry(doc, h.version, h.frozenAt, h.changeRef, h.approvalSignature, h.itemSnapshot, false);
        });

        html += '</div></div>';
      }

      html += '</div>';
      return html;
    }

    function buildHistoryEntry(doc, version, dateIso, changeRef, sig, snapshot, isCurrent) {
      const dotClass = isCurrent ? 'current' : 'past';
      const sigName = sig ? sig.signerName : '—';
      const sigRole = sig ? (sig.signerRole || '') : '';
      const sigTs   = sig ? fmtDateTime(sig.timestamp) : '—';

      let html = '<div class="history-entry">';
      html += '<div class="history-entry-ver"><div class="history-ver-dot ' + dotClass + '">v' + version + '</div></div>';
      html += '<div class="history-entry-body">';
      html += '<div class="history-entry-head"><span class="history-entry-title">' + esc(isCurrent ? 'Current (v' + version + ')' : 'v' + version) + '</span><span class="history-entry-date">' + fmtDate(dateIso) + '</span></div>';
      html += '<div class="history-entry-sig">Approved by: ' + esc(sigName) + (sigRole ? ' · ' + esc(sigRole) : '') + ' · ' + esc(sigTs) + '</div>';
      if (changeRef) {
        html += '<div><span class="history-entry-cr">via ' + esc(changeRef) + '</span></div>';
      }
      if (!isCurrent && snapshot) {
        const snapId = 'snap-' + encodeURIComponent(doc.name || '') + '-v' + version;
        html += '<div class="history-snapshot-toggle" onclick="toggleSnapshot(\'' + esc(snapId) + '\', this)">';
        html += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg> View v' + version + ' snapshot</div>';
        html += '<div class="history-snapshot" id="' + esc(snapId) + '">';
        html += buildSnapshotTable(snapshot, doc.type);
        html += '</div>';
      }
      html += '</div></div>';
      return html;
    }

    function buildSnapshotTable(snapshot, type) {
      if (type === 'design-review') {
        // snapshot is the review record itself
        const r = snapshot;
        return '<div class="snapshot-label">Review Record Snapshot</div>' +
          '<table class="snapshot-table"><tbody>' +
          '<tr><td>Title</td><td>' + esc(r.title||'—') + '</td></tr>' +
          '<tr><td>Phase</td><td>' + esc(r.phase||'—') + '</td></tr>' +
          '<tr><td>Date</td><td>' + esc(r.date||'—') + '</td></tr>' +
          '<tr><td>Outcome</td><td>' + esc(r.outcome||'—') + '</td></tr>' +
          '<tr><td>Participants</td><td>' + esc((r.participants||[]).map(function(p){ return p.name + (p.independent?' (Ind.)':''); }).join(', ') || '—') + '</td></tr>' +
          '</tbody></table>';
      }

      // snapshot is a map of items
      const items = Object.values(snapshot || {});
      if (!items.length) return '<div class="snapshot-label">No items in this snapshot.</div>';
      let rows = items.map(function(item) {
        return '<tr><td>' + esc(item.id||'—') + '</td><td>' + esc((item.statement||item.description||'—').slice(0,80)) + '</td><td>' + esc(item.status||'—') + '</td></tr>';
      }).join('');
      return '<div class="snapshot-label">Item Snapshot (' + items.length + ' items)</div>' +
        '<table class="snapshot-table"><thead><tr><td>ID</td><td>Statement</td><td>Status</td></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function toggleHistory(key) {
      const hist = document.getElementById('hist-' + key);
      const btn  = document.getElementById('expand-' + key);
      if (!hist || !btn) return;
      const isOpen = hist.classList.contains('open');
      hist.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
    }

    function toggleSnapshot(snapId, triggerEl) {
      const snap = document.getElementById(snapId);
      if (!snap) return;
      const isOpen = snap.classList.contains('open');
      snap.classList.toggle('open', !isOpen);
      if (triggerEl) {
        triggerEl.querySelector('svg').style.transform = isOpen ? '' : 'rotate(180deg)';
      }
    }

    function renderAll() {
      const docs = loadDocuments();
      const content = document.getElementById('contentArea');
      const keys = Object.keys(docs);

      if (!keys.length) {
        content.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>' +
            '<div class="empty-state-title">No approved documents yet</div>' +
            '<div class="empty-state-desc">Documents appear here once you finalize and e-sign them. Start by approving your User Needs Specification from the User Needs tool.</div>' +
            '<a class="empty-state-link" href="user-needs.html"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg> Go to User Needs</a>' +
          '</div>';
        return;
      }

      // Compute stats
      const totalDocs = keys.length;
      const specTypes = ['un','di','do'];
      const specDocs = keys.filter(function(k){ return specTypes.indexOf(docs[k].type) !== -1; }).length;
      const reviewDocs = keys.filter(function(k){ return docs[k].type === 'design-review'; }).length;
      const totalVersions = keys.reduce(function(acc, k){ return acc + (docs[k].version || 1); }, 0);

      let statsHtml =
        '<div class="stats-bar">' +
          '<div class="stat-card green"><div class="stat-value">' + totalDocs + '</div><div class="stat-label">Approved Documents</div></div>' +
          '<div class="stat-card"><div class="stat-value">' + specDocs + '</div><div class="stat-label">Specifications</div></div>' +
          '<div class="stat-card indigo"><div class="stat-value">' + reviewDocs + '</div><div class="stat-label">Design Review Records</div></div>' +
          '<div class="stat-card amber"><div class="stat-value">' + totalVersions + '</div><div class="stat-label">Total Versions on File</div></div>' +
        '</div>';

      // Group by type group
      const groups = {};
      keys.forEach(function(k) {
        const doc = docs[k];
        const meta = TYPE_META[doc.type] || { group: 'Other', color: '#304F6B' };
        if (!groups[meta.group]) groups[meta.group] = { color: meta.color, docs: [] };
        groups[meta.group].docs.push({ key: k, doc: doc });
      });

      // Sort within each group by approvedAt desc
      Object.keys(groups).forEach(function(g) {
        groups[g].docs.sort(function(a, b) { return (b.doc.approvedAt||'') > (a.doc.approvedAt||'') ? 1 : -1; });
      });

      let groupsHtml = '';
      const groupOrder = ['Design Specifications', 'Governance Records', 'Other'];
      groupOrder.concat(Object.keys(groups).filter(function(g){ return groupOrder.indexOf(g) === -1; })).forEach(function(groupName) {
        if (!groups[groupName]) return;
        const grp = groups[groupName];
        groupsHtml += '<div class="section-group">';
        groupsHtml += '<div class="section-header">';
        groupsHtml += '<div class="section-header-dot" style="background:' + esc(grp.color) + '"></div>';
        groupsHtml += '<div class="section-header-title">' + esc(groupName) + '</div>';
        groupsHtml += '<span class="section-header-count">' + grp.docs.length + '</span>';
        groupsHtml += '</div>';
        grp.docs.forEach(function(entry) {
          groupsHtml += renderDocRow(entry.key, entry.doc);
        });
        groupsHtml += '</div>';
      });

      content.innerHTML = statsHtml + groupsHtml;
    }

    // ── AUDIT LOG ─────────────────────────────────────────────────────────
    function openAuditLog() {
      const log = ESign.getAuditLog ? ESign.getAuditLog() : [];
      const body = document.getElementById('auditModalBody');
      if (!log.length) {
        body.innerHTML = '<div class="audit-empty">No signature events recorded yet.</div>';
      } else {
        // Most recent first
        const sorted = log.slice().sort(function(a,b){ return (b.timestamp||'') > (a.timestamp||'') ? 1 : -1; });
        body.innerHTML = sorted.map(function(entry) {
          return '<div class="audit-entry">' +
            '<div class="audit-entry-head">' +
              '<div><span class="audit-signer">' + esc(entry.signerName||'—') + '</span>' +
              (entry.signerRole ? ' <span class="audit-role">· ' + esc(entry.signerRole) + '</span>' : '') + '</div>' +
              '<span class="audit-ts">' + esc(fmtDateTime(entry.timestamp)) + '</span>' +
            '</div>' +
            '<div class="audit-meaning">"' + esc(entry.meaning||'') + '"</div>' +
            '<div class="audit-record">Record: ' + esc(entry.recordType||'') + ' / ' + esc(entry.recordId||'') + '</div>' +
            (entry.contentHash ? '<div class="audit-hash">SHA-256: ' + esc(entry.contentHash) + '</div>' : '') +
          '</div>';
        }).join('');
      }
      document.getElementById('auditModalOverlay').classList.add('open');
    }

    function closeAuditLog() {
      document.getElementById('auditModalOverlay').classList.remove('open');
    }

    // ── INIT ──────────────────────────────────────────────────────────────
    renderAll();
  </script>
</body>
</html>
