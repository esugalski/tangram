<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Control — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #0B2740;
      --mid-blue:   #304F6B;
      --dark-blue:  #02192F;
      --sidebar-bg: #071e31;
      --aqua:       #0AC0E9;
      --aqua-dark:  #089bbf;
      --gray:       #D2D2D2;
      --light-gray: #F7F8FA;
      --white:      #FFFFFF;
      --sidebar-w:  232px;
      --green:      #10B981;
      --amber:      #F59E0B;
      --red:        #EF4444;
      --indigo:     #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--light-gray); color: var(--primary); display: flex; height: 100vh; overflow: hidden; }

    /* ─── SIDEBAR (shared styles) ─── */
    .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 100; }
    .sidebar::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); pointer-events: none; }
    .sidebar-header { padding: 1.25rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 0.65rem; }
    .sidebar-t-mark { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; display: block; }
    .sidebar-brand-name { font-size: 0.85rem; font-weight: 700; color: white; letter-spacing: -0.01em; line-height: 1.1; }
    .sidebar-brand-sub { font-size: 0.6rem; font-weight: 500; color: rgba(255,255,255,0.28); letter-spacing: 0.07em; text-transform: uppercase; }
    .project-switcher-wrap { padding: 0.75rem 0.75rem 0; }
    .project-switcher { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; padding: 0.55rem 0.75rem; cursor: default; display: flex; align-items: center; gap: 0.55rem; }
    .project-switcher-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--aqua); }
    .project-switcher-text { flex: 1; min-width: 0; }
    .project-switcher-label { font-size: 0.58rem; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 0.1rem; }
    .project-switcher-name { font-size: 0.8rem; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .sidebar-nav { flex: 1; padding: 0.5rem 0.5rem 0; overflow-y: auto; }
    .sidebar-nav::-webkit-scrollbar { width: 0; }
    .sidebar-section { margin-bottom: 0.25rem; }
    .sidebar-section-label { font-size: 0.57rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.18); padding: 0.6rem 0.75rem 0.2rem; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.48rem 0.75rem; border-radius: 7px; font-size: 0.79rem; font-weight: 500; color: rgba(255,255,255,0.70); cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; position: relative; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.88); }
    .sidebar-nav-item.active { background: rgba(10,192,233,0.12); color: #5DDAF5; }
    .sidebar-nav-item.active::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px; background: var(--aqua); border-radius: 0 2px 2px 0; }
    .sidebar-nav-icon { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-badge { margin-left: auto; font-size: 0.54rem; font-weight: 700; letter-spacing: 0.06em; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.22); padding: 0.14rem 0.42rem; border-radius: 3px; text-transform: uppercase; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0.5rem 0.75rem; }
    .sidebar-footer { padding: 0.85rem 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-user { display: flex; align-items: center; gap: 0.6rem; }
    .sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(10,192,233,0.15); border: 1.5px solid rgba(10,192,233,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--aqua); flex-shrink: 0; }
    .sidebar-user-name { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.62); }
    .sidebar-user-role { font-size: 0.63rem; color: rgba(255,255,255,0.25); }
    .sidebar-sign-out { margin-left: auto; }
    .sidebar-sign-out a { font-size: 0.66rem; color: rgba(255,255,255,0.22); text-decoration: none; transition: color 0.2s; }
    .sidebar-sign-out a:hover { color: rgba(255,255,255,0.5); }

    /* ─── MAIN LAYOUT ─── */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .topbar { background: white; border-bottom: 1px solid rgba(11,39,64,0.08); padding: 0 1.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
    .topbar-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
    .topbar-crumb { color: rgba(11,39,64,0.35); font-weight: 400; font-size: 0.85rem; }
    .topbar-sep { color: rgba(11,39,64,0.2); }
    .topbar-right { display: flex; align-items: center; gap: 0.65rem; }
    .btn-primary { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--aqua); color: var(--primary); font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.78rem; padding: 0.5rem 1rem; border-radius: 7px; border: none; cursor: pointer; transition: background 0.15s, transform 0.12s; box-shadow: 0 2px 8px rgba(10,192,233,0.28); white-space: nowrap; }
    .btn-primary:hover { background: var(--aqua-dark); transform: translateY(-1px); }
    .btn-primary svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ─── FILTER BAR ─── */
    .filter-bar { display: flex; align-items: center; gap: 0.4rem; padding: 0.75rem 0.5rem 0.4rem; flex-wrap: wrap; }
    .filter-btn { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; padding: 0.3rem 0.75rem; border-radius: 20px; border: 1.5px solid rgba(11,39,64,0.12); background: transparent; color: rgba(11,39,64,0.50); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-btn:hover { border-color: var(--aqua); color: var(--aqua-dark); }
    .filter-btn.active { background: rgba(10,192,233,0.1); border-color: rgba(10,192,233,0.35); color: var(--aqua-dark); font-weight: 700; }

    /* ─── TWO-COLUMN ─── */
    .content-cols { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    .list-col { width: 340px; flex-shrink: 0; border-right: 1px solid rgba(11,39,64,0.08); background: white; display: flex; flex-direction: column; overflow: hidden; }
    .list-col-body { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .list-col-body::-webkit-scrollbar { width: 4px; }
    .list-col-body::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 2px; }
    .list-col-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 0.75rem; }
    .list-col-empty svg { width: 40px; height: 40px; stroke: rgba(11,39,64,0.18); fill: none; stroke-width: 1.5; }
    .list-col-empty h3 { font-size: 0.85rem; font-weight: 600; color: rgba(11,39,64,0.40); }
    .list-col-empty p { font-size: 0.75rem; color: rgba(11,39,64,0.30); line-height: 1.6; }

    /* CR card in list */
    .cr-card { padding: 0.75rem 0.85rem; border-radius: 8px; cursor: pointer; transition: background 0.1s; border: 1.5px solid transparent; margin-bottom: 0.25rem; }
    .cr-card:hover { background: rgba(11,39,64,0.03); }
    .cr-card.selected { background: rgba(10,192,233,0.06); border-color: rgba(10,192,233,0.25); }
    .cr-card-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
    .cr-card-id { font-size: 0.66rem; font-weight: 700; letter-spacing: 0.05em; color: rgba(11,39,64,0.38); background: rgba(11,39,64,0.06); padding: 0.1rem 0.4rem; border-radius: 3px; }
    .cr-card-title { font-size: 0.78rem; font-weight: 600; color: var(--primary); line-height: 1.35; margin-bottom: 0.25rem; }
    .cr-card-meta { font-size: 0.68rem; color: rgba(11,39,64,0.42); display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .cr-target-badge { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.1rem 0.38rem; border-radius: 3px; background: rgba(11,39,64,0.07); color: rgba(11,39,64,0.55); }

    /* Status badges */
    .status-badge { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.12rem 0.45rem; border-radius: 4px; }
    .status-badge.open          { background: rgba(245,158,11,0.12); color: #b45309; }
    .status-badge.under-review  { background: rgba(99,102,241,0.1); color: #4338ca; }
    .status-badge.approved      { background: rgba(16,185,129,0.1); color: #047857; }
    .status-badge.rejected      { background: rgba(239,68,68,0.12); color: #dc2626; }
    .status-badge.implemented   { background: rgba(10,192,233,0.12); color: var(--aqua-dark); }
    .status-badge.closed        { background: rgba(11,39,64,0.07); color: rgba(11,39,64,0.45); }
    .urgency-badge { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.1rem 0.38rem; border-radius: 3px; }
    .urgency-badge.urgent  { background: rgba(239,68,68,0.1); color: #dc2626; }
    .urgency-badge.routine { background: rgba(11,39,64,0.06); color: rgba(11,39,64,0.40); }

    /* ─── DETAIL COLUMN ─── */
    .detail-col { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
    .detail-col::-webkit-scrollbar { width: 5px; }
    .detail-col::-webkit-scrollbar-thumb { background: rgba(11,39,64,0.1); border-radius: 3px; }
    .detail-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 3rem; color: rgba(11,39,64,0.28); }
    .detail-placeholder svg { width: 52px; height: 52px; stroke: rgba(11,39,64,0.15); fill: none; stroke-width: 1.5; }
    .detail-placeholder h2 { font-size: 1rem; font-weight: 600; color: rgba(11,39,64,0.32); }
    .detail-placeholder p { font-size: 0.8rem; line-height: 1.6; max-width: 320px; }

    .detail-pane { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .section-card { background: white; border: 1px solid rgba(11,39,64,0.08); border-radius: 12px; overflow: hidden; }
    .section-card-head { padding: 0.85rem 1.1rem; border-bottom: 1px solid rgba(11,39,64,0.07); display: flex; align-items: center; justify-content: space-between; }
    .section-card-title { font-size: 0.78rem; font-weight: 700; color: var(--primary); }
    .section-card-body { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.9rem; }

    /* Form fields */
    .form-row { display: flex; gap: 0.85rem; }
    .form-field { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; }
    .form-label { font-size: 0.7rem; font-weight: 600; color: var(--primary); }
    .form-input { font-family: 'Inter', sans-serif; font-size: 0.83rem; color: var(--primary); border: 1.5px solid rgba(11,39,64,0.14); border-radius: 7px; padding: 0.48rem 0.7rem; outline: none; transition: border-color 0.15s, box-shadow 0.15s; background: white; }
    .form-input:focus { border-color: var(--aqua); box-shadow: 0 0 0 3px rgba(10,192,233,0.1); }
    .form-input:disabled, .form-input.locked { background: var(--light-gray); color: rgba(11,39,64,0.55); cursor: default; border-color: rgba(11,39,64,0.08); }
    textarea.form-input { resize: vertical; min-height: 72px; line-height: 1.55; }
    select.form-input { cursor: pointer; }
    .field-locked { font-size: 0.83rem; color: var(--primary); line-height: 1.55; padding: 0.45rem 0; }
    .field-locked.empty { color: rgba(11,39,64,0.35); font-style: italic; }

    /* Target info block */
    .target-block { background: rgba(11,39,64,0.03); border: 1px solid rgba(11,39,64,0.08); border-radius: 9px; padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .target-row { display: flex; align-items: baseline; gap: 0.55rem; }
    .target-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(11,39,64,0.38); min-width: 80px; }
    .target-value { font-size: 0.8rem; font-weight: 600; color: #0B2740; }
    .target-value.muted { font-weight: 400; color: rgba(11,39,64,0.55); font-size: 0.78rem; line-height: 1.5; }

    /* Diff view */
    .diff-view { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .diff-col { display: flex; flex-direction: column; gap: 0.3rem; }
    .diff-col-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(11,39,64,0.38); margin-bottom: 0.2rem; }
    .diff-col.current { border-right: 1px solid rgba(11,39,64,0.08); padding-right: 0.75rem; }
    .diff-col.proposed { padding-left: 0; }
    .diff-text-current { font-size: 0.8rem; color: rgba(11,39,64,0.50); line-height: 1.55; background: rgba(11,39,64,0.03); border-radius: 6px; padding: 0.5rem 0.65rem; }
    .diff-text-proposed { font-size: 0.8rem; color: var(--primary); line-height: 1.55; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); border-radius: 6px; padding: 0.5rem 0.65rem; }
    .diff-field-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(11,39,64,0.35); margin-bottom: 0.15rem; }
    .diff-pair { margin-bottom: 0.75rem; }

    /* Impact table */
    .impact-table { width: 100%; border-collapse: collapse; }
    .impact-table th { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(11,39,64,0.38); padding: 0 0.5rem 0.45rem; text-align: left; }
    .impact-table td { padding: 0.4rem 0.5rem; font-size: 0.78rem; color: var(--primary); border-bottom: 1px solid rgba(11,39,64,0.05); vertical-align: middle; }
    .impact-table tr:last-child td { border-bottom: none; }
    .impact-level-badge { font-size: 0.6rem; font-weight: 700; padding: 0.1rem 0.38rem; border-radius: 3px; }
    .impact-level-badge.Direct   { background: rgba(239,68,68,0.1); color: #dc2626; }
    .impact-level-badge.Indirect { background: rgba(245,158,11,0.1); color: #b45309; }
    .impact-level-badge.None     { background: rgba(11,39,64,0.06); color: rgba(11,39,64,0.40); }
    .participant-input { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--primary); border: 1px solid rgba(11,39,64,0.12); border-radius: 6px; padding: 0.35rem 0.55rem; outline: none; width: 100%; transition: border-color 0.15s; background: white; }
    .participant-input:focus { border-color: var(--aqua); }
    .participant-input:disabled { background: var(--light-gray); color: rgba(11,39,64,0.45); cursor: not-allowed; }
    .btn-icon { width: 26px; height: 26px; border-radius: 5px; border: none; background: rgba(11,39,64,0.06); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .btn-icon:hover { background: rgba(11,39,64,0.12); }
    .btn-icon svg { width: 12px; height: 12px; stroke: rgba(11,39,64,0.55); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .btn-icon.danger:hover { background: rgba(239,68,68,0.1); }
    .btn-icon.danger:hover svg { stroke: #EF4444; }
    .btn-add-row { display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600; color: var(--aqua-dark); background: rgba(10,192,233,0.07); border: none; border-radius: 6px; padding: 0.32rem 0.7rem; cursor: pointer; transition: background 0.15s; }
    .btn-add-row:hover { background: rgba(10,192,233,0.13); }
    .btn-add-row svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Risk flag */
    .risk-row { display: flex; gap: 0.65rem; align-items: center; }
    .risk-btn { font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; padding: 0.38rem 0.85rem; border-radius: 6px; border: 1.5px solid rgba(11,39,64,0.14); background: transparent; color: rgba(11,39,64,0.50); cursor: pointer; transition: all 0.15s; }
    .risk-btn.selected.yes { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: #dc2626; }
    .risk-btn.selected.no  { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); color: #047857; }
    .risk-btn.selected.tbd { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3); color: #b45309; }
    .risk-btn:not(.selected):hover { border-color: rgba(11,39,64,0.28); color: var(--primary); }

    /* Approval / reject action area */
    .approval-actions { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.1rem; }
    .btn-approve { display: inline-flex; align-items: center; gap: 0.45rem; background: var(--aqua); color: var(--primary); font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 0.52rem 1.2rem; border-radius: 7px; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(10,192,233,0.28); transition: background 0.15s, transform 0.12s; }
    .btn-approve:hover { background: var(--aqua-dark); transform: translateY(-1px); }
    .btn-approve svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .btn-reject { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: #dc2626; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.78rem; padding: 0.5rem 1rem; border-radius: 7px; border: 1.5px solid rgba(239,68,68,0.3); cursor: pointer; transition: all 0.15s; }
    .btn-reject:hover { background: rgba(239,68,68,0.06); border-color: #EF4444; }

    /* Signed block */
    .approval-sig-block { display: flex; align-items: flex-start; gap: 0.65rem; background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.18); border-radius: 9px; padding: 0.85rem 1rem; }
    .approval-sig-block svg { width: 16px; height: 16px; stroke: #047857; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; margin-top: 2px; }
    .approval-sig-name { font-size: 0.8rem; font-weight: 600; color: #0B2740; }
    .approval-sig-role { font-size: 0.72rem; color: rgba(11,39,64,0.50); }
    .approval-sig-ts   { font-size: 0.68rem; color: rgba(11,39,64,0.38); }

    /* Implementation / closure */
    .btn-implement { display: inline-flex; align-items: center; gap: 0.45rem; background: rgba(10,192,233,0.1); color: var(--aqua-dark); font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 0.52rem 1.1rem; border-radius: 7px; border: 1.5px solid rgba(10,192,233,0.25); cursor: pointer; transition: all 0.15s; }
    .btn-implement:hover { background: rgba(10,192,233,0.18); border-color: var(--aqua); }
    .btn-close-cr { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: rgba(11,39,64,0.55); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.78rem; padding: 0.5rem 1rem; border-radius: 7px; border: 1.5px solid rgba(11,39,64,0.18); cursor: pointer; transition: all 0.15s; }
    .btn-close-cr:hover { border-color: rgba(11,39,64,0.35); color: var(--primary); }

    /* Footer */
    .detail-footer { background: white; border-top: 1px solid rgba(11,39,64,0.08); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: flex-end; gap: 0.75rem; flex-shrink: 0; }
    .btn-save-draft { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: var(--mid-blue); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.78rem; padding: 0.52rem 1rem; border-radius: 7px; border: 1.5px solid rgba(11,39,64,0.18); cursor: pointer; transition: all 0.15s; }
    .btn-save-draft:hover { border-color: var(--aqua); color: var(--aqua-dark); }
    .save-flash { font-size: 0.73rem; font-weight: 600; color: var(--green); opacity: 0; transition: opacity 0.3s; margin-right: auto; }
    .save-flash.show { opacity: 1; }

    /* New CR modal */
    .modal-overlay { position: fixed; inset: 0; z-index: 1500; display: flex; align-items: center; justify-content: center; background: rgba(2,25,47,0.5); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box { background: white; border-radius: 14px; width: 560px; max-width: calc(100vw - 2rem); max-height: 88vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(2,25,47,0.22); transform: translateY(10px) scale(0.98); transition: transform 0.22s cubic-bezier(0.4,0,0.2,1); }
    .modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
    .modal-head { padding: 1.2rem 1.4rem 1rem; border-bottom: 1px solid rgba(11,39,64,0.08); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 0.95rem; font-weight: 700; color: var(--primary); }
    .modal-close { width: 28px; height: 28px; border-radius: 6px; border: none; background: rgba(11,39,64,0.06); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .modal-close:hover { background: rgba(11,39,64,0.12); }
    .modal-close svg { width: 13px; height: 13px; stroke: var(--primary); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .modal-body { padding: 1.25rem 1.4rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-foot { padding: 1rem 1.4rem 1.25rem; border-top: 1px solid rgba(11,39,64,0.07); display: flex; justify-content: flex-end; gap: 0.65rem; }
    .btn-modal-cancel { font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600; color: rgba(11,39,64,0.55); background: transparent; border: 1.5px solid rgba(11,39,64,0.14); border-radius: 7px; padding: 0.5rem 1.1rem; cursor: pointer; transition: all 0.15s; }
    .btn-modal-cancel:hover { border-color: rgba(11,39,64,0.28); color: var(--primary); }
    .btn-modal-submit { font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700; color: var(--primary); background: var(--aqua); border: none; border-radius: 7px; padding: 0.5rem 1.25rem; cursor: pointer; box-shadow: 0 2px 8px rgba(10,192,233,0.28); transition: background 0.15s; }
    .btn-modal-submit:hover { background: var(--aqua-dark); }
    .modal-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .modal-label { font-size: 0.72rem; font-weight: 600; color: var(--primary); }
    .modal-input { font-family: 'Inter', sans-serif; font-size: 0.83rem; color: var(--primary); border: 1.5px solid rgba(11,39,64,0.14); border-radius: 7px; padding: 0.48rem 0.7rem; outline: none; transition: border-color 0.15s; background: white; width: 100%; }
    .modal-input:focus { border-color: var(--aqua); box-shadow: 0 0 0 3px rgba(10,192,233,0.1); }
    textarea.modal-input { resize: vertical; min-height: 72px; line-height: 1.55; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">
        <span class="topbar-crumb">Governance</span>
        <span class="topbar-sep">/</span>
        Change Control
      </div>
      <div class="topbar-right">
        <button class="btn-primary" onclick="openNewCRModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Change Request
        </button>
      </div>
    </div>

    <div class="content-cols">
      <!-- LIST -->
      <div class="list-col">
        <div class="filter-bar" id="filterBar">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" data-filter="open" onclick="setFilter('open',this)">Open</button>
          <button class="filter-btn" data-filter="under-review" onclick="setFilter('under-review',this)">Under Review</button>
          <button class="filter-btn" data-filter="approved" onclick="setFilter('approved',this)">Approved</button>
          <button class="filter-btn" data-filter="implemented" onclick="setFilter('implemented',this)">Implemented</button>
          <button class="filter-btn" data-filter="closed" onclick="setFilter('closed',this)">Closed</button>
        </div>
        <div class="list-col-body" id="crList"></div>
      </div>

      <!-- DETAIL -->
      <div class="detail-col" id="detailCol">
        <div class="detail-placeholder" id="detailPlaceholder">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 012 2v7"/><path d="M11 18H8a2 2 0 01-2-2V9"/></svg>
          <h2>Select or create a change request</h2>
          <p>Change requests manage all proposed changes to approved records. Initiate from any approved document or create one here.</p>
        </div>
        <div id="detailPane" style="display:none;flex:1;flex-direction:column;">
          <div class="detail-pane" id="detailPaneInner"></div>
          <div style="flex:1;"></div>
          <div class="detail-footer" id="detailFooter"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- New CR Modal -->
  <div class="modal-overlay" id="newCRModal">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-title">New Change Request</span>
        <button class="modal-close" onclick="closeNewCRModal()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="modal-field" style="flex:0 0 100px;">
            <label class="modal-label" for="cr-target-type">Record Type</label>
            <input class="modal-input" type="text" id="cr-target-type" placeholder="di, do, un, sop…">
          </div>
          <div class="modal-field" style="flex:1;">
            <label class="modal-label" for="cr-target-id">Record ID</label>
            <input class="modal-input" type="text" id="cr-target-id" placeholder="e.g. DI-001">
          </div>
          <div class="modal-field" style="flex:0 0 80px;">
            <label class="modal-label" for="cr-target-ver">Version</label>
            <input class="modal-input" type="number" id="cr-target-ver" min="1" value="1">
          </div>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="cr-target-stmt">Current Statement / Description (snapshot)</label>
          <textarea class="modal-input" id="cr-target-stmt" rows="3" placeholder="Paste the current field content being changed…"></textarea>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="cr-change-desc">Change Description</label>
          <textarea class="modal-input" id="cr-change-desc" rows="3" placeholder="Describe what is being changed and to what…"></textarea>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="cr-change-reason">Reason for Change</label>
          <textarea class="modal-input" id="cr-change-reason" rows="2" placeholder="Why is this change needed?…"></textarea>
        </div>
        <div class="form-row">
          <div class="modal-field">
            <label class="modal-label" for="cr-urgency">Urgency</label>
            <select class="modal-input" id="cr-urgency">
              <option value="routine">Routine</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="cr-proposed-stmt">Proposed Statement (new value)</label>
            <textarea class="modal-input" id="cr-proposed-stmt" rows="2" placeholder="The new content after the change…"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-modal-cancel" onclick="closeNewCRModal()">Cancel</button>
        <button class="btn-modal-submit" onclick="submitNewCR()">Create Change Request</button>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script src="esign.js"></script>
  <script src="versions.js"></script>
  <script src="approvals.js"></script>
  <script>
    initSidebar({ activePage: 'change-control' });

    // ── DATA ──────────────────────────────────────────────────────────────
    const LS_KEY = 'qms_change_requests';
    let CRS = {};
    let currentId = null;
    let activeFilter = 'all';

    const STATUS_ORDER = ['open','under-review','approved','rejected','implemented','closed'];
    const STATUS_LABELS = { open: 'Open', 'under-review': 'Under Review', approved: 'Approved', rejected: 'Rejected', implemented: 'Implemented', closed: 'Closed' };
    const STORAGE_KEYS = { di: 'qms_design_inputs', do: 'qms_design_outputs', un: 'qms_user_needs' };

    function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(CRS)); } catch(e) {} }
    function load() {
      try { const s = localStorage.getItem(LS_KEY); if (s) { const p = JSON.parse(s); CRS = Array.isArray(p) ? {} : (p||{}); } } catch(e) {}
    }

    function nextCRId() {
      const nums = Object.keys(CRS).map(function(k){ const m = (CRS[k].id||'').match(/CR-(\d+)/); return m ? parseInt(m[1]) : 0; });
      const next = nums.length ? Math.max.apply(null, nums) + 1 : 1;
      return 'CR-' + String(next).padStart(3, '0');
    }

    // ── LIST ──────────────────────────────────────────────────────────────
    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.toggle('active', b === btn); });
      renderList();
    }

    function renderList() {
      const el = document.getElementById('crList');
      let items = Object.values(CRS);
      if (activeFilter !== 'all') items = items.filter(function(cr){ return cr.status === activeFilter; });
      items.sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });

      if (!items.length) {
        el.innerHTML = '<div class="list-col-empty" style="margin-top:1rem;"><svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 012 2v7"/><path d="M11 18H8a2 2 0 01-2-2V9"/></svg><h3>No change requests</h3><p>' + (activeFilter === 'all' ? 'Create your first change request above.' : 'No ' + activeFilter + ' requests.') + '</p></div>';
        return;
      }

      el.innerHTML = items.map(function(cr) {
        const sel = cr.id === currentId ? ' selected' : '';
        const urgClass = cr.urgency === 'urgent' ? 'urgent' : 'routine';
        const urgLabel = cr.urgency === 'urgent' ? 'Urgent' : 'Routine';
        const dateStr = cr.createdAt ? new Date(cr.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
        return '<div class="cr-card' + sel + '" onclick="openCR(\'' + cr.id + '\')">' +
          '<div class="cr-card-top">' +
            '<span class="cr-card-id">' + esc(cr.id) + '</span>' +
            '<span class="cr-target-badge">' + esc((cr.targetType||'').toUpperCase()) + ' · ' + esc(cr.targetId||'') + ' v' + (cr.targetVersion||1) + '</span>' +
            '<span class="urgency-badge ' + urgClass + '">' + urgLabel + '</span>' +
            '<span class="status-badge ' + cr.status + '">' + esc(STATUS_LABELS[cr.status]||cr.status) + '</span>' +
          '</div>' +
          '<div class="cr-card-title">' + esc((cr.changeDescription||'No description').slice(0,80) + ((cr.changeDescription||'').length>80?'…':'')) + '</div>' +
          '<div class="cr-card-meta">' + dateStr + ' · by ' + esc(cr.createdBy||'—') + '</div>' +
          '</div>';
      }).join('');
    }

    // ── OPEN CR ───────────────────────────────────────────────────────────
    function openCR(id) {
      const cr = CRS[id]; if (!cr) return;
      currentId = id;
      document.getElementById('detailPlaceholder').style.display = 'none';
      const pane = document.getElementById('detailPane');
      pane.style.display = 'flex';
      renderDetail(cr);
      renderList();
    }

    function renderDetail(cr) {
      const inner = document.getElementById('detailPaneInner');
      const footer = document.getElementById('detailFooter');
      const editable = cr.status === 'open' || cr.status === 'under-review';

      let html = '';

      // ── CHANGE SUMMARY ──
      html += '<div class="section-card">';
      html += '<div class="section-card-head"><div class="section-card-title">Change Summary</div>';
      html += '<span class="status-badge ' + cr.status + '">' + esc(STATUS_LABELS[cr.status]||cr.status) + '</span></div>';
      html += '<div class="section-card-body">';

      html += '<div class="target-block">';
      html += '<div class="target-row"><span class="target-label">Target Record</span><span class="target-value">' + esc((cr.targetType||'').toUpperCase()) + ' &nbsp;·&nbsp; ' + esc(cr.targetId||'') + ' &nbsp;·&nbsp; v' + (cr.targetVersion||1) + '</span></div>';
      if (cr.targetStatement) html += '<div class="target-row"><span class="target-label">At time of request</span><span class="target-value muted">' + esc(cr.targetStatement) + '</span></div>';
      html += '</div>';

      if (editable) {
        html += '<div class="form-field"><div class="form-label">Change Description</div><textarea class="form-input" id="field-desc" rows="3" oninput="markDirty()">' + esc(cr.changeDescription||'') + '</textarea></div>';
        html += '<div class="form-field"><div class="form-label">Reason for Change</div><textarea class="form-input" id="field-reason" rows="2" oninput="markDirty()">' + esc(cr.changeReason||'') + '</textarea></div>';
        html += '<div class="form-field"><div class="form-label">Urgency</div><select class="form-input" id="field-urgency" onchange="markDirty()"><option value="routine"' + (cr.urgency==='routine'?' selected':'') + '>Routine</option><option value="urgent"' + (cr.urgency==='urgent'?' selected':'') + '>Urgent</option></select></div>';
      } else {
        html += '<div class="form-field"><div class="form-label">Change Description</div><div class="field-locked' + (cr.changeDescription ? '' : ' empty') + '">' + esc(cr.changeDescription||'—') + '</div></div>';
        html += '<div class="form-field"><div class="form-label">Reason</div><div class="field-locked' + (cr.changeReason ? '' : ' empty') + '">' + esc(cr.changeReason||'—') + '</div></div>';
        html += '<div class="form-field"><div class="form-label">Urgency</div><div class="field-locked">' + esc(cr.urgency||'routine') + '</div></div>';
        if (cr.createdBy) html += '<div class="form-field"><div class="form-label">Requested by</div><div class="field-locked">' + esc(cr.createdBy) + ' · ' + (cr.createdAt ? new Date(cr.createdAt).toLocaleDateString('en-US',{dateStyle:'medium'}) : '—') + '</div></div>';
      }
      html += '</div></div>';

      // ── PROPOSED CHANGES (diff view) ──
      if (cr.proposedFields && Object.keys(cr.proposedFields).length) {
        html += '<div class="section-card">';
        html += '<div class="section-card-head"><div class="section-card-title">Proposed Changes</div></div>';
        html += '<div class="section-card-body">';
        html += '<div class="diff-view">';
        html += '<div class="diff-col current"><div class="diff-col-label">Current (v' + (cr.targetVersion||1) + ')</div>';
        html += '<div class="diff-pair"><div class="diff-text-current">' + esc(cr.targetStatement||'—') + '</div></div>';
        html += '</div>';
        html += '<div class="diff-col proposed"><div class="diff-col-label">Proposed</div>';
        Object.keys(cr.proposedFields).forEach(function(field) {
          html += '<div class="diff-pair"><div class="diff-field-label">' + esc(field) + '</div><div class="diff-text-proposed">' + esc(cr.proposedFields[field]) + '</div></div>';
        });
        html += '</div>';
        html += '</div></div></div>';
      } else if (editable) {
        html += '<div class="section-card">';
        html += '<div class="section-card-head"><div class="section-card-title">Proposed Changes</div></div>';
        html += '<div class="section-card-body">';
        html += '<div class="form-field"><div class="form-label">Proposed New Statement / Content</div><textarea class="form-input" id="field-proposed-stmt" rows="4" placeholder="Enter the proposed new content for the changed field…" oninput="markDirty()">' + esc((cr.proposedFields && cr.proposedFields.statement)||'') + '</textarea></div>';
        html += '</div></div>';
      }

      // ── IMPACT ASSESSMENT ──
      html += '<div class="section-card">';
      html += '<div class="section-card-head"><div class="section-card-title">Impact Assessment</div>';
      if (editable) html += '<button class="btn-add-row" onclick="addImpactedDoc()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>';
      html += '</div>';
      html += '<div class="section-card-body">';

      // Risk flag
      const riskVal = cr.riskImpact || 'tbd';
      html += '<div class="form-field"><div class="form-label">Risk Impact?</div><div class="risk-row">';
      ['yes','no','tbd'].forEach(function(v) {
        const l = { yes: 'Yes — update FMEA', no: 'No', tbd: 'TBD' }[v];
        const sel = riskVal === v ? ' selected ' + v : '';
        if (editable) html += '<button class="risk-btn' + sel + '" onclick="setRiskImpact(\'' + v + '\')">' + l + '</button>';
        else if (riskVal === v) html += '<span class="risk-btn selected ' + v + '" style="cursor:default;">' + l + '</span>';
      });
      html += '</div></div>';

      if (riskVal === 'yes') {
        if (editable) html += '<div class="form-field"><div class="form-label">Risk Notes</div><textarea class="form-input" id="field-risk-notes" rows="2" placeholder="e.g. Update FMEA-003…" oninput="markDirty()">' + esc(cr.riskNotes||'') + '</textarea></div>';
        else if (cr.riskNotes) html += '<div class="form-field"><div class="form-label">Risk Notes</div><div class="field-locked">' + esc(cr.riskNotes) + '</div></div>';
      }

      // Impacted docs table
      const impacted = cr.impactedDocs || [];
      if (impacted.length || editable) {
        html += '<div class="form-field"><div class="form-label">Impacted Documents</div>';
        if (impacted.length) {
          html += '<table class="impact-table"><thead><tr><th>Type</th><th>ID</th><th>Ver</th><th>Impact</th><th>Notes</th>' + (editable ? '<th></th>' : '') + '</tr></thead><tbody>';
          impacted.forEach(function(d, i) {
            html += '<tr>';
            html += '<td>' + esc((d.type||'').toUpperCase()) + '</td>';
            html += '<td style="font-weight:700;">' + esc(d.id||'') + '</td>';
            html += '<td>v' + (d.version||1) + '</td>';
            if (editable) {
              html += '<td><select class="participant-input" style="width:90px;" onchange="updateImpact(' + i + ',\'impact\',this.value);markDirty()"><option' + (d.impact==='Direct'?' selected':'') + '>Direct</option><option' + (d.impact==='Indirect'?' selected':'') + '>Indirect</option><option' + (d.impact==='None'?' selected':'') + '>None</option></select></td>';
              html += '<td><input class="participant-input" type="text" value="' + esc(d.notes||'') + '" placeholder="Notes" oninput="updateImpact(' + i + ',\'notes\',this.value);markDirty()"></td>';
              html += '<td><button class="btn-icon danger" onclick="removeImpact(' + i + ')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button></td>';
            } else {
              html += '<td><span class="impact-level-badge ' + (d.impact||'') + '">' + esc(d.impact||'—') + '</span></td>';
              html += '<td style="color:rgba(11,39,64,0.55);">' + esc(d.notes||'—') + '</td>';
            }
            html += '</tr>';
          });
          html += '</tbody></table>';
        } else if (editable) {
          html += '<div style="font-size:0.75rem;color:rgba(11,39,64,0.35);font-style:italic;padding:0.3rem 0;">No impacted documents added. Use "Add" to link related records.</div>';
        }
        html += '</div>';
      }
      html += '</div></div>';

      // ── APPROVAL ──
      html += '<div class="section-card">';
      html += '<div class="section-card-head"><div class="section-card-title">Approval</div></div>';
      if (cr.approvalSignature) {
        const ts = new Date(cr.approvalSignature.timestamp).toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'});
        html += '<div class="approval-sig-block" style="margin:0.85rem 1.1rem 1rem;">';
        html += '<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
        html += '<div><div class="approval-sig-name">' + esc(cr.approvalSignature.signerName) + '</div>';
        html += '<div class="approval-sig-role">' + esc(cr.approvalSignature.signerRole) + '</div>';
        html += '<div class="approval-sig-ts">' + ts + '</div></div></div>';
        if (cr.status === 'rejected') {
          html += '<div style="padding:0 1.1rem 1rem;font-size:0.78rem;color:#dc2626;">Request rejected.</div>';
        }
      } else if (editable || cr.status === 'open' || cr.status === 'under-review') {
        html += '<div class="approval-actions">';
        html += '<button class="btn-approve" onclick="approveCR()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approve Change</button>';
        html += '<button class="btn-reject" onclick="rejectCR()">Reject</button>';
        html += '</div>';
      } else {
        html += '<div style="padding:0.85rem 1.1rem;font-size:0.78rem;color:rgba(11,39,64,0.45);font-style:italic;">No approval action taken.</div>';
      }
      html += '</div>';

      // ── IMPLEMENTATION ──
      if (cr.status === 'approved' || cr.status === 'implemented') {
        html += '<div class="section-card">';
        html += '<div class="section-card-head"><div class="section-card-title">Implementation</div>';
        if (cr.newVersion) html += '<span class="status-badge implemented">v' + cr.newVersion + ' created</span>';
        html += '</div>';
        html += '<div class="section-card-body">';
        if (cr.status === 'approved') {
          html += '<div class="form-field"><div class="form-label">Implementation Notes</div><textarea class="form-input" id="field-impl-notes" rows="2" placeholder="Describe how the change was applied…" oninput="markDirty()">' + esc(cr.implementationNotes||'') + '</textarea></div>';
          html += '<div style="margin-top:0.4rem;"><button class="btn-implement" onclick="markImplemented()">Mark as Implemented</button></div>';
          html += '<div style="font-size:0.72rem;color:rgba(11,39,64,0.40);margin-top:0.5rem;">Marking implemented will apply the proposed changes to the target record and create a new version.</div>';
        } else {
          if (cr.implementationNotes) html += '<div class="form-field"><div class="form-label">Implementation Notes</div><div class="field-locked">' + esc(cr.implementationNotes) + '</div></div>';
          const implDate = cr.implementedAt ? new Date(cr.implementedAt).toLocaleDateString('en-US',{dateStyle:'medium'}) : '—';
          html += '<div style="font-size:0.78rem;color:rgba(11,39,64,0.55);">Implemented ' + implDate + (cr.newVersion ? ' · Created version ' + cr.newVersion : '') + '</div>';
          if (cr.status === 'implemented') {
            html += '<div style="margin-top:0.75rem;"><button class="btn-close-cr" onclick="closeCR()">Close Request</button></div>';
          }
        }
        html += '</div></div>';
      }

      inner.innerHTML = html;

      // Footer
      if (editable) {
        footer.innerHTML = '<span class="save-flash" id="saveFlash"></span><button class="btn-save-draft" onclick="saveCR()">Save</button>';
      } else {
        footer.innerHTML = '<span class="save-flash show" style="opacity:1;">Status: ' + esc(STATUS_LABELS[cr.status]||cr.status) + '</span>';
      }
    }

    // ── INTERACTIVE HELPERS ───────────────────────────────────────────────
    let isDirty = false;
    function markDirty() { isDirty = true; }

    function setRiskImpact(val) {
      const cr = CRS[currentId]; if (!cr) return;
      cr.riskImpact = val; markDirty();
      document.querySelectorAll('.risk-btn').forEach(function(b) {
        const isV = b.textContent.toLowerCase().includes(val) || b.getAttribute('onclick') && b.getAttribute('onclick').includes("'"+val+"'");
        // simpler: just re-render
      });
      saveCR(); renderDetail(cr);
    }

    function addImpactedDoc() {
      const cr = CRS[currentId]; if (!cr) return;
      if (!cr.impactedDocs) cr.impactedDocs = [];
      cr.impactedDocs.push({ type: '', id: '', version: 1, impact: 'Direct', notes: '' });
      save(); renderDetail(cr);
    }
    function removeImpact(i) {
      const cr = CRS[currentId]; if (!cr) return;
      cr.impactedDocs.splice(i, 1); save(); renderDetail(cr);
    }
    function updateImpact(i, field, val) {
      const cr = CRS[currentId]; if (!cr || !cr.impactedDocs[i]) return;
      cr.impactedDocs[i][field] = val;
    }

    function collectFields(cr) {
      const desc = document.getElementById('field-desc');
      const reason = document.getElementById('field-reason');
      const urgency = document.getElementById('field-urgency');
      const proposedStmt = document.getElementById('field-proposed-stmt');
      const riskNotes = document.getElementById('field-risk-notes');
      const implNotes = document.getElementById('field-impl-notes');
      if (desc)    cr.changeDescription = desc.value;
      if (reason)  cr.changeReason      = reason.value;
      if (urgency) cr.urgency           = urgency.value;
      if (proposedStmt && proposedStmt.value) {
        if (!cr.proposedFields) cr.proposedFields = {};
        cr.proposedFields.statement = proposedStmt.value;
      }
      if (riskNotes) cr.riskNotes = riskNotes.value;
      if (implNotes) cr.implementationNotes = implNotes.value;
    }

    function saveCR() {
      const cr = CRS[currentId]; if (!cr) return;
      collectFields(cr);
      save(); isDirty = false; renderList();
      const flash = document.getElementById('saveFlash');
      if (flash) { flash.textContent = 'Saved ✓'; flash.classList.add('show'); setTimeout(function(){ flash.classList.remove('show'); }, 2000); }
    }

    // ── APPROVAL ──────────────────────────────────────────────────────────
    function approveCR() {
      const cr = CRS[currentId]; if (!cr) return;
      collectFields(cr);
      save();
      const snapshot = JSON.parse(JSON.stringify(cr));
      Approvals.initiate({
        recordId:       cr.id,
        recordType:     'cr',
        meaning:        'I approve this change request. The proposed change has been evaluated and is authorized for implementation.',
        recordSnapshot: snapshot,
        onComplete: function(sigs) {
          cr.approvalSignature = sigs[sigs.length - 1];
          cr.approvalSignatures = sigs;
          cr.status = 'approved';
          save();
          Approvals.clearInstance('cr', cr.id);
          renderDetail(cr);
          renderList();
        },
      });
    }

    function rejectCR() {
      const cr = CRS[currentId]; if (!cr) return;
      if (!confirm('Reject this change request? This will mark it as rejected.')) return;
      cr.status = 'rejected';
      save();
      renderDetail(cr);
      renderList();
    }

    // ── IMPLEMENTATION ────────────────────────────────────────────────────
    function markImplemented() {
      const cr = CRS[currentId]; if (!cr) return;
      const implNotes = document.getElementById('field-impl-notes');
      if (implNotes) cr.implementationNotes = implNotes.value;

      // Apply the change to the target document using versions.js
      const storageKey = STORAGE_KEYS[cr.targetType];
      let applied = false;
      if (storageKey && cr.proposedFields && Object.keys(cr.proposedFields).length) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (raw) {
            const parsed = JSON.parse(raw);
            const items = Array.isArray(parsed) ? {} : parsed;
            // Find item by ID
            const key = Object.keys(items).find(function(k) { return items[k].id === cr.targetId; });
            if (key && items[key]) {
              const item = items[key];
              Versions.applyChange(item, cr.proposedFields, {
                id:                  cr.id,
                changeReason:        cr.changeReason || cr.changeDescription,
                changeDescription:   cr.changeDescription,
                approvalSignature:   cr.approvalSignature,
              });
              cr.newVersion = item.version;
              if (!Array.isArray(parsed)) {
                localStorage.setItem(storageKey, JSON.stringify(items));
              }
              applied = true;
            }
          }
        } catch(e) { console.error('Version apply error:', e); }
      }

      cr.status = 'implemented';
      cr.implementedAt = new Date().toISOString();
      if (!cr.newVersion) cr.newVersion = (cr.targetVersion||1) + 1;
      save();
      renderDetail(cr);
      renderList();

      if (applied) {
        alert('Change applied. ' + cr.targetType.toUpperCase() + ' ' + cr.targetId + ' is now at version ' + cr.newVersion + '.');
      } else {
        alert('Change request marked as implemented. If this document type is supported (DI, DO, UN), version was incremented automatically. For other types, apply the change manually in the relevant system.');
      }
    }

    function closeCR() {
      const cr = CRS[currentId]; if (!cr) return;
      cr.status = 'closed';
      cr.closedAt = new Date().toISOString();
      save();
      renderDetail(cr);
      renderList();
    }

    // ── NEW CR MODAL ──────────────────────────────────────────────────────
    function openNewCRModal() {
      ['cr-target-type','cr-target-id','cr-target-stmt','cr-change-desc','cr-change-reason','cr-proposed-stmt'].forEach(function(id) {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      const verEl = document.getElementById('cr-target-ver'); if (verEl) verEl.value = 1;
      document.getElementById('newCRModal').classList.add('open');
    }

    function closeNewCRModal() {
      document.getElementById('newCRModal').classList.remove('open');
    }

    function submitNewCR() {
      const targetType = (document.getElementById('cr-target-type').value || '').trim().toLowerCase();
      const targetId   = (document.getElementById('cr-target-id').value   || '').trim().toUpperCase();
      const targetVer  = parseInt(document.getElementById('cr-target-ver').value) || 1;
      const targetStmt = (document.getElementById('cr-target-stmt').value || '').trim();
      const changeDesc = (document.getElementById('cr-change-desc').value || '').trim();
      const changeRsn  = (document.getElementById('cr-change-reason').value || '').trim();
      const urgency    = document.getElementById('cr-urgency').value || 'routine';
      const proposed   = (document.getElementById('cr-proposed-stmt').value || '').trim();

      if (!targetId || !changeDesc) { alert('Record ID and Change Description are required.'); return; }

      const user = ESign.getCurrentUser();
      const id = nextCRId();
      CRS[id] = {
        id: id,
        status: 'open',
        createdAt: new Date().toISOString(),
        createdBy: user ? user.name : 'Unknown',
        urgency: urgency,
        targetType: targetType || 'unknown',
        targetId: targetId,
        targetVersion: targetVer,
        targetStatement: targetStmt,
        changeDescription: changeDesc,
        changeReason: changeRsn,
        proposedFields: proposed ? { statement: proposed } : {},
        impactedDocs: [],
        riskImpact: 'tbd',
        riskNotes: '',
        approvalSignature: null,
        implementationNotes: '',
        implementedAt: null,
        newVersion: null,
        closedAt: null,
      };

      // Auto-suggest impacted docs from tracesTo/tracedBy if target is di/do/un
      autosuggestImpact(CRS[id]);

      save();
      closeNewCRModal();
      renderList();
      openCR(id);
    }

    function autosuggestImpact(cr) {
      const storageKey = STORAGE_KEYS[cr.targetType];
      if (!storageKey) return;
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        const items = Array.isArray(parsed) ? {} : parsed;
        const key = Object.keys(items).find(function(k) { return items[k].id === cr.targetId; });
        if (!key || !items[key]) return;
        const item = items[key];
        const linked = [...(item.tracesTo||[]), ...(item.tracedBy||[])];
        linked.forEach(function(lid) {
          const existing = cr.impactedDocs.find(function(d){ return d.id === lid; });
          if (!existing) {
            cr.impactedDocs.push({ type: guessType(lid), id: lid, version: 1, impact: 'Indirect', notes: '' });
          }
        });
      } catch(e) {}
    }

    function guessType(id) {
      if (/^UN/i.test(id)) return 'un';
      if (/^DI/i.test(id)) return 'di';
      if (/^DO/i.test(id)) return 'do';
      return '';
    }

    // ── UTILS ─────────────────────────────────────────────────────────────
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── INIT ──────────────────────────────────────────────────────────────
    load();
    renderList();

    // Listen for propose-change events from other pages
    window.addEventListener('storage', function(e) {
      if (e.key === LS_KEY) { load(); renderList(); if (currentId) { const cr = CRS[currentId]; if(cr) renderDetail(cr); } }
    });
  </script>
</body>
