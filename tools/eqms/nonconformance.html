<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonconformances — Tangram eQMS</title>
  <link rel="icon" type="image/png" href="../../brand_assets/Tangram-T%20mark%20reverse_Square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="qms-shared.css?v=1776901546755">
  <style>
    .disp-pill { display: inline-flex; align-items: center; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em; padding: 0.1rem 0.4rem; border-radius: 3px; text-transform: uppercase; }
    .disp-pill.pending { background: rgba(11,39,64,0.06); color: rgba(11,39,64,0.55); }
    .disp-pill.rework { background: rgba(99,102,241,0.12); color: #4338ca; }
    .disp-pill.repair { background: rgba(10,192,233,0.12); color: #089bbf; }
    .disp-pill.uai { background: rgba(245,158,11,0.14); color: #b45309; }
    .disp-pill.scrap { background: rgba(239,68,68,0.14); color: #dc2626; }
    .disp-pill.rts { background: rgba(147,51,234,0.12); color: #7e22ce; }

    .nc-card { padding: 0.7rem 0.85rem; border-radius: 8px; cursor: pointer; border: 1.5px solid transparent; margin-bottom: 0.28rem; }
    .nc-card:hover { background: rgba(11,39,64,0.03); }
    .nc-card.selected { background: rgba(10,192,233,0.06); border-color: rgba(10,192,233,0.25); }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <div id="topbar-root"></div>
    <div id="module-header-root"></div>
    <nav id="subnav-root"></nav>
    <div class="page-scroll">
    <div class="doc-approval-bar">
      <div class="proc-status-pill draft" id="proc-status-pill"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Draft · Rev A</div>
      <div style="flex:1;"></div>
      <div id="approval-route-panel"></div>
      <button class="btn-approve" id="approve-btn" onclick="initiateApproval()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approve log</button>
    </div>
    <div class="doc-lock-banner" id="doc-lock" style="display:none;"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> This NC log is approved. Existing records are locked. New nonconformances can still be logged.</div>

    <div class="content-cols">
      <div class="list-col">
        <div class="list-col-head"><input class="list-col-search" id="search" placeholder="Search NCs…" oninput="renderList()"></div>
        <div class="list-col-body" id="list-body"></div>
      </div>
      <div class="detail-col">
        <div class="detail-placeholder" id="placeholder">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <h2>Select a nonconformance</h2>
          <p>Pick an NC on the left, or open a new one.</p>
          <div id="intro-slot" style="max-width:640px;margin-top:1.4rem;"></div>
        </div>
        <div class="detail-pane" id="pane" style="display:none;"></div>
      </div>
    </div>
    </div><!-- /page-scroll -->
  </div><!-- /main -->
  <div id="glance-root"></div>

  <script src="ai-assist.js?v=1776901546755"></script>
  <script src="esign.js?v=1776901546755"></script>
  <script src="approvals.js?v=1776901546755"></script>
  <script src="seed-demo.js?v=1776901546755"></script>

  <script src="sidebar.js?v=1776901546755"></script>
  <script src="shell.js"></script>
  <script>
    'use strict';
    const KEY = 'qms_nonconformances';
    let DATA = load();
    let currentId = null;

    function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
    function save() { localStorage.setItem(KEY, JSON.stringify(DATA)); }
    function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function newId() {
      let n = 1;
      Object.keys(DATA).forEach(function(id){ const m = id.match(/^NC-(\d+)$/); if (m) n = Math.max(n, parseInt(m[1],10)+1); });
      return 'NC-' + String(n).padStart(3,'0');
    }

    const DISP_LABEL = { pending:'Pending', rework:'Rework', repair:'Repair', uai:'Use as-is', scrap:'Scrap', rts:'Return to supplier' };

    function newNC() {
      const id = newId();
      DATA[id] = {
        id: id,
        title: '',
        foundDate: new Date().toISOString().slice(0,10),
        foundBy: '',
        stage: 'incoming',  // incoming / in-process / finished / field
        productRef: '', lot: '', quantity: 1,
        description: '',
        segregationRef: '',
        disposition: 'pending',
        dispositionJustification: '',
        approver: '',
        closureDate: '',
        status: 'open',   // open / closed
        capaLink: '',
      };
      save();
      renderList();
      open(id);
    }

    function open(id) {
      currentId = id;
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('pane').style.display = 'flex';
      renderDetail();
      renderList();
      applyLockState();
    }

    function renderList() {
      const q = (document.getElementById('search').value || '').toLowerCase();
      const host = document.getElementById('list-body');
      const list = Object.values(DATA).filter(function(n){ return !q || (n.title+' '+n.id+' '+n.productRef).toLowerCase().indexOf(q) !== -1; });
      list.sort(function(a,b){ return (b.foundDate||'') < (a.foundDate||'') ? -1 : 1; });

      if (!list.length) { host.innerHTML = '<div class="list-empty"><div class="list-empty-icon"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="list-empty-title">No NCs logged</div><div class="list-empty-body">Log nonconformances when incoming, in-process, or finished products don\'t meet specifications.</div></div>'; return; }

      host.innerHTML = list.map(function(n){
        const sel = n.id === currentId ? ' selected' : '';
        const stBadge = n.status === 'closed' ? '<span class="badge green">Closed</span>' : '<span class="badge amber">Open</span>';
        return '<div class="nc-card'+sel+'" onclick="open(\''+n.id+'\')">' +
          '<div class="item-card-top"><span class="item-card-id">'+esc(n.id)+'</span>'+stBadge+'<span class="disp-pill '+n.disposition+'">'+esc(DISP_LABEL[n.disposition]||n.disposition)+'</span></div>' +
          '<div class="item-card-title">'+esc(n.title || 'Untitled')+'</div>' +
          '<div class="item-card-meta">'+esc(n.foundDate||'—')+' · '+esc(n.productRef||'—')+' · Qty '+esc(String(n.quantity||1))+'</div>' +
        '</div>';
      }).join('');
    }

    function renderDetail() {
      const n = DATA[currentId]; if (!n) return;
      const pane = document.getElementById('pane');
      const closed = n.status === 'closed';
      pane.innerHTML =
        '<div style="display:flex;align-items:flex-start;gap:0.7rem;">' +
          '<span class="item-card-id" style="font-size:0.72rem;padding:0.2rem 0.55rem;">'+esc(n.id)+'</span>' +
          '<input class="form-input" value="'+esc(n.title)+'" oninput="u(\'title\',this.value);renderList()" placeholder="Short description" style="flex:1;font-weight:600;font-size:0.95rem;">' +
          '<button class="btn-icon danger" onclick="del()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>' +
        '</div>' +

        (closed ? '<div class="banner success"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Closed on '+esc(n.closureDate||'—')+' — disposition: '+esc(DISP_LABEL[n.disposition]||n.disposition)+'</div>' : '') +

        '<div class="card"><div class="card-head"><div class="card-title">1 · Detection</div></div><div class="card-body">' +
          '<div class="learn-only" style="margin-bottom:0.55rem;">' + LearnMode.hint('Capture when/where/who detected the NC. Lot/serial numbers matter — an auditor will want to trace every unit in that lot.') + '</div>' +
          '<div class="form-row-3" style="margin-bottom:0.75rem;">' +
            '<div class="form-field"><label class="form-label">Found date</label><input class="form-input" type="date" value="'+esc(n.foundDate||'')+'" onchange="u(\'foundDate\',this.value);renderList()"></div>' +
            '<div class="form-field"><label class="form-label">Found by</label><input class="form-input" value="'+esc(n.foundBy||'')+'" oninput="u(\'foundBy\',this.value)"></div>' +
            '<div class="form-field"><label class="form-label">Stage</label><select class="form-select" onchange="u(\'stage\',this.value)">' +
              ['incoming','in-process','finished','field'].map(function(s){ return '<option value="'+s+'" '+(n.stage===s?'selected':'')+'>'+s+'</option>'; }).join('') +
            '</select></div>' +
          '</div>' +
          '<div class="form-row-3">' +
            '<div class="form-field"><label class="form-label">Part / product ref</label><input class="form-input" value="'+esc(n.productRef||'')+'" oninput="u(\'productRef\',this.value);renderList()" placeholder="e.g. PN-1024"></div>' +
            '<div class="form-field"><label class="form-label">Lot / batch</label><input class="form-input" value="'+esc(n.lot||'')+'" oninput="u(\'lot\',this.value)"></div>' +
            '<div class="form-field"><label class="form-label">Quantity affected</label><input class="form-input" type="number" min="0" value="'+esc(n.quantity||1)+'" oninput="u(\'quantity\',parseInt(this.value,10)||0)"></div>' +
          '</div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">2 · Description &amp; containment</div></div><div class="card-body">' +
          '<div class="form-field" style="margin-bottom:0.75rem;"><div class="field-label-row"><label class="form-label">Description of nonconformity</label>'+AIAssist.genBtn('f-description','aiDescription()')+'</div><textarea class="form-textarea" id="f-description" rows="3" oninput="u(\'description\',this.value)" placeholder="Exactly how the product/process failed to meet specification. Cite the spec where possible.">'+esc(n.description||'')+'</textarea></div>' +
          '<div class="form-field"><label class="form-label">Segregation / hold reference</label><input class="form-input" value="'+esc(n.segregationRef||'')+'" oninput="u(\'segregationRef\',this.value)" placeholder="Hold tag ID, quarantine location, etc."></div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">3 · Disposition</div></div><div class="card-body">' +
          '<div class="learn-only" style="margin-bottom:0.55rem;">' + LearnMode.hint('Disposition = what happens to the nonconforming units. "Use as-is" requires documented justification and typically approval from the original design authority (not just QA).') + '</div>' +
          '<div class="form-row" style="margin-bottom:0.75rem;">' +
            '<div class="form-field"><label class="form-label">Disposition</label><select class="form-select" onchange="u(\'disposition\',this.value);renderList()">' +
              ['pending','rework','repair','uai','scrap','rts'].map(function(d){ return '<option value="'+d+'" '+(n.disposition===d?'selected':'')+'>'+DISP_LABEL[d]+'</option>'; }).join('') +
            '</select></div>' +
            '<div class="form-field"><label class="form-label">Approver</label><input class="form-input" value="'+esc(n.approver||'')+'" oninput="u(\'approver\',this.value)"></div>' +
          '</div>' +
          '<div class="form-field"><div class="field-label-row"><label class="form-label">Justification</label>'+AIAssist.genBtn('f-dispositionJustification','aiJustification()')+'</div><textarea class="form-textarea" id="f-dispositionJustification" rows="3" oninput="u(\'dispositionJustification\',this.value)" placeholder="Why this disposition is appropriate. Mandatory for use-as-is.">'+esc(n.dispositionJustification||'')+'</textarea></div>' +
        '</div></div>' +

        '<div class="card"><div class="card-head"><div class="card-title">4 · Closure &amp; escalation</div></div><div class="card-body">' +
          '<div class="form-row-3" style="margin-bottom:0.7rem;">' +
            '<div class="form-field"><label class="form-label">Status</label><select class="form-select" onchange="u(\'status\',this.value);renderDetail();renderList()">' +
              ['open','closed'].map(function(s){ return '<option value="'+s+'" '+(n.status===s?'selected':'')+'>'+s+'</option>'; }).join('') +
            '</select></div>' +
            '<div class="form-field"><label class="form-label">Closure date</label><input class="form-input" type="date" value="'+esc(n.closureDate||'')+'" onchange="u(\'closureDate\',this.value)"></div>' +
            '<div class="form-field"><label class="form-label">Linked CAPA</label><input class="form-input" value="'+esc(n.capaLink||'')+'" oninput="u(\'capaLink\',this.value)" placeholder="e.g. CAPA-007"></div>' +
          '</div>' +
          '<div class="banner info learn-only"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>Escalate to CAPA if: the same NC has happened before, the impact is major, or the root cause isn\'t contained by disposition alone.</div></div>' +
        '</div></div>';
    }

    function u(field, val) { if (!currentId) return; DATA[currentId][field] = val; save(); }
    function del() {
      if (!confirm('Delete ' + currentId + '?')) return;
      delete DATA[currentId]; save(); currentId = null;
      document.getElementById('pane').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      renderList();
    }

    function renderIntro() {
      document.getElementById('intro-slot').innerHTML = LearnMode.introCard({
        id: 'nc-intro',
        tag: 'Nonconformance · FDA 21 CFR 820.90, ISO 13485 §8.3',
        title: 'What is a nonconformance?',
        what: 'Anything that doesn\'t meet its specified requirement — a part out of tolerance, a process step skipped, a test result failing. Separate from a complaint (which comes from a customer) and from a CAPA (which addresses the systemic cause).',
        why: 'Nonconformance control is required by both FDA and ISO. Without it, bad product can reach patients; it\'s also the source data for CAPA trending.',
        facts: [
          { label: 'Key obligations', value: 'Identify, segregate, document, disposition' },
          { label: 'Disposition options', value: 'Rework / repair / use-as-is / scrap / return' },
          { label: 'Escalates to', value: 'CAPA when systemic' },
        ],
        checklist: [
          'Capture lot/serial detail (traceability)',
          'Segregate physical product before disposition',
          'Justify "use-as-is" with design authority approval',
          'Close with a decision + signature',
          'Escalate trends or repeat NCs to CAPA',
        ],
        standards: ['FDA 21 CFR 820.90', 'ISO 13485:2016 §8.3 (Control of nonconforming product)']
      });
    }

    // ── Module-level approval ──────────────────────────────────────────────
    const AKEY = 'qms_nc_approval';
    let MOD = (function(){ try { return JSON.parse(localStorage.getItem(AKEY)) || { approved:false, revision:'A', approvedAt:null, approvedBy:null, signatures:null, revHistory:[], approvedIds:[] }; } catch(e) { return { approved:false, revision:'A', approvedAt:null, approvedBy:null, signatures:null, revHistory:[], approvedIds:[] }; } })();
    function saveMod() { localStorage.setItem(AKEY, JSON.stringify(MOD)); }

    function applyLockState() {
      if (!MOD.approved) return;
      document.querySelectorAll('#pane .form-input, #pane .form-textarea, #pane .form-select').forEach(function(el){ el.disabled = true; });
      document.querySelectorAll('#pane .btn-icon, #pane .add-row-btn').forEach(function(el){ el.disabled = true; el.style.pointerEvents = 'none'; el.style.opacity = '0.5'; });
    }
    function unlockFields() {
      document.querySelectorAll('#pane .form-input, #pane .form-textarea, #pane .form-select').forEach(function(el){ el.disabled = false; });
      document.querySelectorAll('#pane .btn-icon, #pane .add-row-btn').forEach(function(el){ el.disabled = false; el.style.pointerEvents = ''; el.style.opacity = ''; });
    }

    function updateStatus() {
      var pill = document.getElementById('proc-status-pill');
      var btn = document.getElementById('approve-btn');
      var lock = document.getElementById('doc-lock');
      if (!pill) return;
      var rev = MOD.revision || 'A';
      if (MOD.approved) {
        pill.className = 'proc-status-pill approved';
        pill.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approved · Rev ' + rev;
        if (btn) { btn.className = 'btn-revise'; btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Initiate Revision'; btn.onclick = initiateRevision; }
        if (lock) lock.style.display = '';
        if (window.Approvals) Approvals.renderStatusPanel('nonconformance', 'module', document.getElementById('approval-route-panel'));
      } else {
        pill.className = 'proc-status-pill draft';
        pill.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Draft · Rev ' + rev;
        if (btn) { btn.className = 'btn-approve'; btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Approve log'; btn.onclick = initiateApproval; }
        if (lock) lock.style.display = 'none';
        unlockFields();
      }
    }

    function initiateApproval() {
      if (!window.Approvals) { alert('Approval module not loaded.'); return; }
      Approvals.initiate({
        recordType: 'nonconformance', recordId: 'module',
        meaning: 'I have reviewed and approve this Nonconformance log as of the date of this signature, in accordance with FDA 21 CFR 820.90 and ISO 13485 §8.3.',
        recordSnapshot: DATA,
        onComplete: function(sigs) {
          MOD.approved = true; MOD.approvedAt = sigs[sigs.length-1].timestamp;
          MOD.approvedBy = sigs[sigs.length-1].signerName; MOD.signatures = sigs;
          MOD.revision = MOD.revision || 'A'; MOD.approvedIds = Object.keys(DATA);
          saveMod(); updateStatus();
        },
        onCancel: function() {}
      });
    }

    function initiateRevision() {
      if (!confirm('Start a new revision? This will unlock all existing records.')) return;
      var hist = MOD.revHistory || [];
      if (MOD.approved) hist.push({ revision: MOD.revision||'A', approvedAt: MOD.approvedAt, approvedBy: MOD.approvedBy });
      var cur = MOD.revision || 'A'; var code = cur.charCodeAt(0);
      var next = (cur.length === 1 && code < 90) ? String.fromCharCode(code + 1) : cur + '1';
      MOD.approved = false; MOD.revision = next; MOD.approvedAt = null;
      MOD.approvedBy = null; MOD.signatures = null; MOD.approvedIds = []; MOD.revHistory = hist;
      saveMod();
      if (window.Approvals) Approvals.clearInstance('nonconformance', 'module');
      updateStatus();
    }

    document.addEventListener('qms-learn-mode-changed', function(){ if (currentId) { renderDetail(); applyLockState(); } });

    function aiDescription() {
      var n = DATA[currentId] || {};
      return AIAssist.ctxLines() +
        (n.id ? '\nNC ID: ' + n.id : '') +
        (n.stage ? '\nDetection stage: ' + n.stage : '') +
        (n.productRef ? '\nProduct: ' + n.productRef : '') +
        (n.lot ? '\nLot/batch: ' + n.lot : '') +
        (n.quantity ? '\nQuantity affected: ' + n.quantity : '') +
        '\n\nWrite a clear nonconformity description. State exactly how the product or process failed to meet specification — cite the specific requirement or specification it violated. Include the detection method and where in the process it was found. Be factual and specific. 2–4 sentences.';
    }
    function aiJustification() {
      var n = DATA[currentId] || {};
      return AIAssist.ctxLines() +
        (n.id ? '\nNC ID: ' + n.id : '') +
        (n.description ? '\nNonconformity: ' + n.description : '') +
        (n.disposition ? '\nDisposition chosen: ' + n.disposition : '') +
        '\n\nWrite the disposition justification for this nonconformity. Explain why the chosen disposition is appropriate — for use-as-is, demonstrate that the nonconformity does not affect fit, form, function, safety, or regulatory compliance, and cite the engineering or quality basis. For rework or scrap, state the basis. 3–5 sentences.';
    }
    AIAssist.register('f-description', aiDescription);
    AIAssist.register('f-dispositionJustification', aiJustification);

    initShell({
      activePage: 'capa-ncr',
      topbar: { searchPlaceholder: 'Search nonconformances…' },
      moduleHeader: 'CAPA / NCR',
      subNav: { module: 'capa-ncr', activeHref: 'nonconformance.html' }
    });
    renderIntro();
    renderList();
    updateStatus();
  </script>
</body>
</html>
